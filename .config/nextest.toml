# Nextest configuration for coxswain e2e suites.
# Reference: https://nextest.rs/configuration/
#
# Two in-cluster profiles, run as two passes per suite:
#   e2e        — parallel pass: every test EXCEPT the global-config mutators.
#   e2e-serial — serial pass (test-threads=1): the global-config mutators and
#                the resilience suite, which need exclusive use of the shared
#                control plane.
# The `default` profile (used by `cargo test` for unit tests) is untouched.

# ---------------------------------------------------------------------------
# Experimental features
# ---------------------------------------------------------------------------
# setup-scripts: run a command once before any tests start within a profile.
# Required until setup-scripts graduates from experimental in nextest.
[experimental]
setup-scripts = true

# ---------------------------------------------------------------------------
# Setup script
# ---------------------------------------------------------------------------
# e2e-setup runs bootstrap_cluster() once before any test starts: it builds the
# Docker image, installs Gateway API CRDs, cert-manager, coxswain CRDs, and the
# shared Helm release, then exports COXSWAIN_E2E_BOOTSTRAPPED=1 so test
# processes skip the heavy setup. Running bootstrap outside the per-test
# process avoids the Helm/CRD races that happen when nextest's
# concurrently-started per-test processes all attempt installs at once. It is
# idempotent, so it is a fast no-op on the second (serial) pass.
#
# If COXSWAIN_E2E_BOOTSTRAPPED is already set the script no-ops: CI's
# toolchain-free archive runners have no `cargo`, so they bootstrap once with
# the prebuilt `e2e_setup` binary and export the variable themselves (see
# .github/workflows/e2e.yml). Locally the variable is unset, so this builds and
# runs the binary via cargo.
[scripts.setup.e2e-setup]
command = ["bash", "-c", 'test -n "${COXSWAIN_E2E_BOOTSTRAPPED:-}" || cargo run --quiet -p coxswain-e2e --bin e2e_setup']
slow-timeout = { period = "900s", terminate-after = 1 }

# Marks the serial pass so the harness's mutation-site guard (helm_install in
# bootstrap.rs) permits non-default HelmOverrides. Attached ONLY to the
# e2e-serial profile below; in the parallel `e2e` profile the var is unset, so
# any test that reconfigures the shared release panics loudly at the mutation
# site instead of corrupting concurrent tests. Setup scripts export env to the
# profile's tests via the file named by $NEXTEST_ENV.
[scripts.setup.e2e-serial-marker]
command = ["bash", "-c", 'echo "COXSWAIN_E2E_SERIAL=1" >> "$NEXTEST_ENV"']

# ---------------------------------------------------------------------------
# Global-config mutators
# ---------------------------------------------------------------------------
# These tests reconfigure the ONE shared proxy/controller via `helm upgrade`
# (or install a global catchall route). The upgrade rolls the shared
# Deployment and the new config is proxy-wide, so a mutator running
# concurrently with ANY other test against that proxy corrupts it — a cap-1
# test-group is insufficient (it serializes members with each other but not
# with ungrouped tests). They therefore run alone, in the serial pass.
#
# When per-scope control lands these move back to the parallel pass:
#   proxy_protocol_*        -> #327 (per-listener PROXY protocol)
#   allow_source_range_*    -> #327 (need PROXY protocol to drive a real client IP)
#   deny_source_range_*     -> #327 (need PROXY protocol to drive a real client IP)
#   access_log_*            -> #279 (per-Ingress access-log)
#
# Flake isolation (NOT global-config mutators): the two `timeouts_*_returns_504`
# routing tests drive a deliberately slow upstream so the proxy holds connections
# open until a 504 fires. Run concurrently with the high-volume `count_backends`
# distribution tests (also in the routing binary), they raise connection-setup
# tail latency on the single shared proxy enough to trip the 5 s client timeout.
# They mutate no global config, so correctness never required serialization —
# they sit in the serial pass purely to keep the parallel routing pass stable.
#
# Same category: the two `route_propagation_time_*_apply_to_first_success`
# routing tests measure apply -> first-successful-request wall time and assert a
# hard upper bound. Under the concurrent parallel pass, contention for the single
# shared control plane (watch/debounce/discovery-push convergence) and, for the
# Gateway API variant, simultaneous per-Gateway VIP provisioning inflate that
# number from ~1.5 s to occasionally >10 s — verified reproducible on `main`
# without any product change (~1-in-3), so it is measurement contention, not a
# regression. As pure measurements they mutate no global config; they run in the
# serial pass so the number reflects true uncontended convergence and the bound
# stays a meaningful regression guard rather than a coin flip.
#
# Same category: `isolated_route_change_debounces_well_under_fixed_floor`
# (observability) reads the `coxswain_controller_reconcile_debounce_seconds`
# histogram after one isolated Ingress apply and asserts a sub-0.3 s mean wait.
# In the parallel pass, concurrent tests churn the shared control plane so the
# histogram folds in unrelated reconcile cycles (some at the 500 ms debounce
# ceiling), inflating the mean past the bound — measurement contention, not a
# regression. It runs in the serial pass so the isolated change is the only load.
#
# The two profiles below split on exactly this set via `default-filter`, so the
# run command stays uniform (`-E 'binary(<suite>)'`) for both passes.

# ---------------------------------------------------------------------------
# e2e — parallel pass
# ---------------------------------------------------------------------------
[profile.e2e]
# Everything except the mutators and the (always-serial) resilience suite.
default-filter = '''
  not (
    test(=default_backend_serves_unmatched_requests) | test(=default_backend_alone_serves_all_hosts)
    | test(=proxy_protocol_http_v1_forwarded) | test(=proxy_protocol_https_v2_forwarded)
    | test(=allow_source_range_in_range_allowed) | test(=allow_source_range_out_of_range_rejected)
    | test(=deny_source_range_blocks_listed_client) | test(=deny_source_range_allows_unlisted_client) | test(=deny_takes_precedence_over_allow_when_both_match)
    | test(=forwarded_header_all_private_under_trusted_peer_falls_back_to_l4) | test(=mapped_v6_client_matches_deny_v4_cidr)
    | test(=custom_forwarded_header_from_trusted_peer_resolves_client_ip) | test(=spoofed_forwarded_header_from_untrusted_peer_is_rejected)
    | test(=forwarded_header_forged_leftmost_cannot_bypass_allow_list) | test(=forwarded_header_ignored_without_trusted_cidrs_fail_closed)
    | test(=status_reports_load_balancer_ip) | test(=gateway_address_empty_allocates_dynamically) | test(=ingress_status_skips_unowned_ingress_class)
    | test(=access_log_path_mode_pattern_uses_rule_pattern) | test(=access_log_path_mode_none_omits_path) | test(=access_log_disabled_emits_nothing)
    | test(=timeouts_request_returns_504) | test(=timeouts_backend_request_returns_504)
    | test(=route_propagation_time_gateway_api_apply_to_first_success) | test(=route_propagation_time_ingress_apply_to_first_success)
    | test(=isolated_route_change_debounces_well_under_fixed_floor)
    | test(=proxy_generated_forwarded_reaches_backend_and_overrides_spoof)
    | test(=cert_manager_http01_challenge_issues_and_serves_certificate)
    | test(=gateway_api_disabled_skips_gateway_reconcile) | test(=ingress_disabled_skips_ingress_reconcile)
    | test(=namespace_relay_provisioned_and_gcd_over_dedicated_gateway_lifecycle) | test(=namespace_relay_not_provisioned_below_threshold)
    | test(=namespace_relay_gcd_and_traffic_continues_when_relay_disabled) | test(=namespace_relay_not_provisioned_when_relay_disabled_despite_demand)
    | test(=relay_policy_force_on_provisions_relay_with_overrides) | test(=relay_policy_force_off_gcs_provisioned_relay)
    | test(=relay_policy_autoscaling_sizes_relay_without_hpa) | test(=relay_policy_uncapped_autoscaling_falls_back_to_static)
    | test(=relay_deactivated_after_cooldown_below_break_even)
    | test(=relay_scale_down_debounced_by_stabilization_window)
    | test(=namespace_relay_orphan_gcd_after_controller_restart_in_hysteresis_midrange) | test(=namespace_relay_not_provisioned_after_restart_below_threshold)
    | test(=shared_relay_provisioned_when_pool_meets_break_even) | test(=shared_relay_below_break_even_stays_direct)
    | test(=shared_pool_repoints_direct_when_relay_disabled)
    | test(=watch_namespace_list_serves_listed_and_ignores_unlisted)
    | test(=shared_proxy_pool_survives_helm_upgrade_without_field_manager_fight) | test(=shared_proxy_pool_absent_when_disabled)
  )
  and not binary(resilience)
  and not binary(status_conditions)
  and not binary(discovery)
'''

# 3 concurrent tests against the shared cluster. With per-test namespace cleanup
# now running synchronously (NamespaceGuard::Drop), peak pod count is bounded by
# the live set — 3 tests × up to 3 backends = 9 echo pods — which fits the 4-vCPU
# CI runner. Raise only after confirming headroom with a larger suite.
test-threads = 3

# Collect all failures per suite — don't stop on the first failing test.
fail-fast = false

[[profile.e2e.scripts]]
filter = 'all()'
setup = ['e2e-setup']

# ---------------------------------------------------------------------------
# e2e-serial — serial pass
# ---------------------------------------------------------------------------
[profile.e2e-serial]
# Only the global-config mutators and the resilience suite (restarts/migrates
# the shared controller). One at a time, so each owns the shared control plane.
default-filter = '''
  test(=default_backend_serves_unmatched_requests) | test(=default_backend_alone_serves_all_hosts)
  | test(=proxy_protocol_http_v1_forwarded) | test(=proxy_protocol_https_v2_forwarded)
  | test(=allow_source_range_in_range_allowed) | test(=allow_source_range_out_of_range_rejected)
  | test(=deny_source_range_blocks_listed_client) | test(=deny_source_range_allows_unlisted_client) | test(=deny_takes_precedence_over_allow_when_both_match)
  | test(=forwarded_header_all_private_under_trusted_peer_falls_back_to_l4) | test(=mapped_v6_client_matches_deny_v4_cidr)
  | test(=custom_forwarded_header_from_trusted_peer_resolves_client_ip) | test(=spoofed_forwarded_header_from_untrusted_peer_is_rejected)
  | test(=forwarded_header_forged_leftmost_cannot_bypass_allow_list) | test(=forwarded_header_ignored_without_trusted_cidrs_fail_closed)
  | test(=status_reports_load_balancer_ip) | test(=gateway_address_empty_allocates_dynamically) | test(=ingress_status_skips_unowned_ingress_class)
  | test(=access_log_path_mode_pattern_uses_rule_pattern) | test(=access_log_path_mode_none_omits_path) | test(=access_log_disabled_emits_nothing)
  | test(=timeouts_request_returns_504) | test(=timeouts_backend_request_returns_504)
  | test(=route_propagation_time_gateway_api_apply_to_first_success) | test(=route_propagation_time_ingress_apply_to_first_success)
  | test(=isolated_route_change_debounces_well_under_fixed_floor)
  | test(=proxy_generated_forwarded_reaches_backend_and_overrides_spoof)
  | test(=cert_manager_http01_challenge_issues_and_serves_certificate)
  | test(=gateway_api_disabled_skips_gateway_reconcile) | test(=ingress_disabled_skips_ingress_reconcile)
  | test(=namespace_relay_provisioned_and_gcd_over_dedicated_gateway_lifecycle) | test(=namespace_relay_not_provisioned_below_threshold)
  | test(=namespace_relay_gcd_and_traffic_continues_when_relay_disabled) | test(=namespace_relay_not_provisioned_when_relay_disabled_despite_demand)
  | test(=relay_policy_force_on_provisions_relay_with_overrides) | test(=relay_policy_force_off_gcs_provisioned_relay)
  | test(=relay_policy_autoscaling_sizes_relay_without_hpa) | test(=relay_policy_uncapped_autoscaling_falls_back_to_static)
  | test(=relay_deactivated_after_cooldown_below_break_even)
  | test(=relay_scale_down_debounced_by_stabilization_window)
  | test(=namespace_relay_orphan_gcd_after_controller_restart_in_hysteresis_midrange) | test(=namespace_relay_not_provisioned_after_restart_below_threshold)
  | test(=shared_relay_provisioned_when_pool_meets_break_even) | test(=shared_relay_below_break_even_stays_direct)
  | test(=shared_pool_repoints_direct_when_relay_disabled)
  | test(=watch_namespace_list_serves_listed_and_ignores_unlisted)
  | test(=shared_proxy_pool_survives_helm_upgrade_without_field_manager_fight) | test(=shared_proxy_pool_absent_when_disabled)
  | binary(resilience)
  | binary(status_conditions)
  | binary(discovery)
'''

test-threads = 1
fail-fast = false

[[profile.e2e-serial.scripts]]
filter = 'all()'
setup = ['e2e-setup', 'e2e-serial-marker']
