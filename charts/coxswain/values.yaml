# Helm chart for Coxswain — Kubernetes Ingress & Gateway API controller.
#
# Coxswain ships as two cooperating pods in the default topology:
#  - `controller` — leader-elected writer; status patches; future
#    per-Gateway provisioning. Cluster-wide reads + write verbs on the
#    `*/status` subresources.
#  - `proxy.shared` — read-only data plane serving Ingress + non-dedicated
#    Gateway traffic. Cluster-wide reads, zero writes — the ServiceAccount
#    has no write verbs at all.
#
# Set `controller.enabled: false` to omit the writer (rarely useful — the
# proxy depends on it for accurate status); set `proxy.shared.enabled: false`
# or `proxy.shared.replicas: 0` for a strict-multi-tenant install where every
# Gateway uses a dedicated per-Gateway proxy.

nameOverride: ""
fullnameOverride: ""

# -- Container image, shared by both pods.
image:
  repository: ghcr.io/coxswain-labs/coxswain
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  # Use Always when tag is "latest" or a mutable rolling tag.
  pullPolicy: IfNotPresent
  pullSecrets: []

# -- Override the namespace all resources deploy into. Empty means the release
# namespace (the value passed to `helm --namespace`), matching the convention
# used by ingress-nginx, cert-manager, Traefik, and Envoy Gateway.
namespaceOverride: ""

# -- Namespace to deploy into.
namespace:
  # Create the namespace as part of this release. Set false when it already
  # exists or you rely on `helm --create-namespace`.
  create: true

# -- GatewayClass controllerName this install claims.
controllerName: coxswain-labs.dev/gateway-controller

# -- Kubernetes namespace to watch. Empty = cluster-wide. Both pods receive
# the same value via env var.
watchNamespace: ""

# -- COXSWAIN_LOG_FORMAT — "json" for production; "console" for development.
logFormat: json

# -- COXSWAIN_LOG — log verbosity / per-crate filter (RUST_LOG syntax).
logFilter: info

# -- Pod-level security context, applied to both pods.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Security mode, applied to both pods.
# rootless: false (default) — container binds ports ≤1024 directly via
#   CAP_NET_BIND_SERVICE. Works on PSS "baseline" and "privileged".
# rootless: true — proxy container binds 8080/8443 instead of 80/443, and
#   NET_BIND_SERVICE is dropped. The gateway Service still exposes 80/443,
#   mapping to the higher container ports. Required for PSS "restricted".
security:
  rootless: false

# -- Container-level security context, applied to both pods.
# When security.rootless is true, capabilities.add is overridden to [] regardless
# of what is set here.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# -- Liveness probe. Calls /healthz on the health port (always 200).
livenessProbe:
  httpGet:
    path: /healthz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe. Calls /readyz; 503 until all subsystem checks are Ready/Degraded.
readinessProbe:
  httpGet:
    path: /readyz
    port: health
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 6

# -- Bind address shared by the health and admin servers on both pods.
# COXSWAIN_MANAGEMENT_BIND_ADDRESS — set to a management-network IP to restrict
# /healthz, /readyz, /metrics, /routes, /status access; leave as 0.0.0.0 to keep
# kubelet probes and Prometheus scraping working out of the box.
management:
  bindAddress: "0.0.0.0"

# -- Health endpoint port (COXSWAIN_HEALTH_PORT). Serves /healthz and /readyz.
# The bind address is controlled by management.bindAddress.
health:
  port: 8081

# -- Admin endpoint port (COXSWAIN_ADMIN_PORT). Serves /metrics, /routes, /status.
# The bind address is controlled by management.bindAddress.
admin:
  port: 8082

# -- Discovery gRPC server port (COXSWAIN_DISCOVERY_PORT).
# The controller binds this port; shared and dedicated proxies connect to it.
discovery:
  port: 50051

# -- GatewayClass resource. Set create: false if you manage it externally.
gatewayClass:
  create: true
  # Must match controllerName above.
  name: coxswain

# -- IngressClass resource. Set create: false if you manage it externally.
ingressClass:
  create: true
  name: coxswain

# =============================================================================
# Controller pod — leader-elected writer.
# =============================================================================
controller:
  # Render the controller Deployment + RBAC + Service + PDB. Disabling here
  # omits every controller-related object from the install. Without a running
  # controller no status patches will be written, but the shared-proxy data
  # plane keeps serving traffic from the routing tables it builds itself.
  enabled: true

  # Number of controller replicas. The controller is leader-elected via Lease;
  # extra replicas are HA failover, not throughput. Set to 0 to keep the
  # Deployment around (faster to bring back) but run no pods.
  replicas: 1

  # CPU / memory resource requests and limits.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

  # ServiceAccount settings.
  serviceAccount:
    create: true
    # Defaults to "<release>-coxswain-controller" when empty.
    name: ""
    annotations: {}

  # Whether to render the ClusterRole, ClusterRoleBinding, leader-election
  # Role + RoleBinding. Disable only if RBAC is managed externally.
  rbac:
    create: true

  # PodDisruptionBudget to protect rolling upgrades.
  podDisruptionBudget:
    enabled: true
    # maxUnavailable: 0 keeps at least one leader-eligible replica during a
    # node drain; harmless when replicas == 1 because there is nothing else to
    # disrupt.
    maxUnavailable: 0

  # Extra pod metadata.
  podAnnotations: {}
  podLabels: {}

  # Scheduling constraints.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""

  # COXSWAIN_IMAGE — image used for dedicated-mode proxy Deployments
  # provisioned by the controller operator. Defaults to the main image
  # (`image.repository:image.tag`) when empty.
  coxswainImage: ""

  # COXSWAIN_CONTROLLER_LEASE_TTL — how long a leader lease stays valid
  # without renewal.
  leaseTtl: 15s
  # COXSWAIN_CONTROLLER_LEASE_RENEW_INTERVAL — how often the leader renews
  # its lease.
  leaseRenewInterval: 5s

  # COXSWAIN_STATUS_ADDRESS — external IP/hostname written to Ingress and
  # Gateway status. Required for cert-manager HTTP-01 + external-dns.
  statusAddress: ""

  # Enable the Gateway API surface (GatewayClass, HTTPRoute, etc.). When
  # false, --disable-gateway-api is passed to both the controller and the
  # shared proxy; no Gateway API reflectors are started and gateway_api_crds
  # is not registered as a health check.
  gatewayApi:
    enabled: true

  # Enable the Ingress surface. When false, --disable-ingress is passed to
  # both pods; no Ingress reflectors are started, ingress listener ports are
  # not bound, and the shared-proxy Service exposes no Ingress ports.
  ingress:
    enabled: true

# =============================================================================
# Discovery control plane — controller-as-CA, SVID bootstrap, mTLS stream (#423).
# =============================================================================
discovery:
  # Port the controller's mTLS Stream listener binds (routing snapshots). The
  # shared proxy and the discovery Service both target this port.
  port: 50051
  # Port the controller's server-auth-only bootstrap listener binds (SVID
  # issuance for fresh proxies presenting an SA token + CSR).
  bootstrapPort: 50052
  # SPIFFE trust domain written into every issued SVID. Must match across the
  # controller and all proxies; the Kubernetes default is `cluster.local`.
  trustDomain: cluster.local
  # COXSWAIN_DISCOVERY_SVID_TTL — lifetime of SVIDs issued to proxies. Proxies
  # refresh at ~50% of this. Short TTLs improve revocation responsiveness.
  svidTtl: 24h
  ca:
    # CA provisioning mode:
    #   auto     — the controller self-generates the CA Secret if absent (no
    #              external tooling). A namespace-scoped secrets-create Role is
    #              rendered for this.
    #   external — the CA Secret must pre-exist (cert-manager or an operator);
    #              the controller fails closed if it is missing and the
    #              secrets-create Role is not rendered.
    mode: auto
    # Name of the Secret (type kubernetes.io/tls or Opaque, keys tls.crt/tls.key)
    # holding the CA cert + key, in the install namespace.
    secretName: coxswain-discovery-ca

# =============================================================================
# Proxy pod — read-only data plane.
# =============================================================================
proxy:
  # Shared-pool proxy (serves Ingress + non-dedicated Gateway traffic).
  shared:
    # Render the shared-proxy Deployment + Services + PDB. Set to false
    # for a strict-multi-tenant install where every Gateway runs a dedicated
    # proxy provisioned by the controller.
    enabled: true

    # Service type for the per-Gateway VIP Services the controller provisions
    # in shared mode (#472). Each owned Gateway gets its OWN Service mapping its
    # advertised listener port (e.g. 443) to a distinct internal port on the
    # shared proxy, so cross-Gateway hostname isolation falls out of port keying.
    #
    # LoadBalancer (default) gives each Gateway its own external address — works
    # on cloud LBs and MetalLB, which assign a distinct IP per Service and route
    # IP:port independently. NOT supported by host-port-binding LBs (k3s/OrbStack
    # klipper-lb), where multiple Services sharing port 443 collide on the host —
    # use ClusterIP there (a stable in-cluster VIP per Gateway, typically fronted
    # by an external ingress/LB). NodePort is rejected (cannot preserve the
    # advertised port). Independent of `service.gateway.type` (the shared-proxy
    # Service, which always stays a single LoadBalancer for the Ingress plane).
    vipServiceType: LoadBalancer

    # Number of shared-proxy replicas. Read-only data plane; scaling is
    # horizontal and stateless (each replica independently receives routing
    # snapshots from the controller via gRPC discovery). Set to 0 to keep
    # the Deployment around but run no pods (cheaper "off" toggle than
    # enabled: false).
    replicas: 1

    # CPU / memory resource requests and limits.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # ServiceAccount settings.
    serviceAccount:
      create: true
      # Defaults to "<release>-coxswain-shared-proxy" when empty.
      name: ""
      annotations: {}

    # PodDisruptionBudget.
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1

    # Extra pod metadata.
    podAnnotations: {}
    podLabels: {}

    # Scheduling constraints.
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    priorityClassName: ""

    # COXSWAIN_PROXY_THREADS — worker threads per proxy service.
    threads: 2

    # COXSWAIN_PROXY_UPSTREAM_KEEPALIVE_POOL_SIZE — maximum idle upstream
    # connections held in Pingora's keepalive pool.  Connections beyond this
    # limit are evicted on an LRU basis.  Raise when high-cardinality
    # upstream fleets cause frequent reconnects; lower to reduce fd usage.
    upstreamKeepalivePoolSize: 128

    # COXSWAIN_PROXY_BIND_ADDRESS — IP address all proxy data-plane listeners
    # bind to (independent from management.bindAddress).
    bindAddress: "0.0.0.0"

    # COXSWAIN_PROXY_SHUTDOWN_GRACE_PERIOD — drain window before final shutdown.
    shutdownGracePeriod: 30s
    # COXSWAIN_PROXY_SHUTDOWN_TIMEOUT — hard deadline after grace period expires.
    shutdownTimeout: 5s
    # COXSWAIN_PROXY_LISTENER_DRAIN_TIMEOUT — per-listener drain window when a
    # Gateway port is removed; connections in flight are given this long to
    # complete before being force-closed.  Distinct from shutdownGracePeriod
    # (process-wide) — tune based on your longest expected upstream latency.
    listenerDrainTimeout: 30s

    # COXSWAIN_PROXY_ACCEPT_PROXY_PROTOCOL — enable HAProxy PROXY protocol v1/v2.
    acceptProxyProtocol: false
    # COXSWAIN_PROXY_TRUSTED_SOURCES — CIDRs allowed to send PROXY headers
    # (comma-joined when rendered).
    trustedSources: []

    # COXSWAIN_PROXY_DEFAULT_REQUEST_TIMEOUT — global default total request timeout.
    # Empty = disabled. Human-readable: "30s", "1m".
    defaultRequestTimeout: ""
    # COXSWAIN_PROXY_DEFAULT_BACKEND_REQUEST_TIMEOUT — global default backend timeout.
    # Empty = disabled.
    defaultBackendRequestTimeout: ""

    # COXSWAIN_INGRESS_DEFAULT_BACKEND — fallback backend for unmatched
    # Ingress traffic. Format: <namespace>/<service>:<port>, e.g.
    # default/my-404-page:80
    ingressDefaultBackend: ""

    # COXSWAIN_ACCESS_LOG — enable per-request access logging.
    # Set to false to disable entirely (useful for high-traffic benchmarking).
    accessLog: true
    # COXSWAIN_ACCESS_LOG_PATH_MODE — what the access log emits for the `path`
    # field. Three modes:
    #   full    (default) The concrete normalised request path, e.g. /users/42.
    #             Required for security log analysis: the only mode that exposes
    #             path-traversal attempts, encoded payloads (%2f, %2e, ..), and
    #             other abnormal characters to WAF / SIEM pipelines. Higher
    #             cardinality than pattern.
    #   pattern The matched route pattern, e.g. /users/. Reduces cardinality
    #             but hides the actual request path from log analysis. Any
    #             security scanning on the path field will miss attacks when
    #             this mode is active. Use only when the log pipeline genuinely
    #             cannot handle high-cardinality path fields.
    #   none    Path field omitted entirely. Same security caveat as pattern.
    # Prefer pipeline-side path redaction over changing this value away from full.
    accessLogPathMode: full

  # Dedicated-mode proxy provisioning. The pods themselves are not rendered
  # by Helm — the controller provisions one Deployment / Service /
  # ServiceAccount per Gateway with `parametersRef`, in the Gateway's own
  # namespace. The dedicated proxy is a pure discovery client (it receives its
  # routing world over the discovery gRPC stream) and makes zero Kubernetes API
  # calls, so its ServiceAccount carries no RoleBindings — there are no
  # cluster-wide RBAC objects to render here.

  # Ingress listener settings. Controls the static HTTP/HTTPS listener ports
  # for classic `Ingress` resources. Gateway listener ports are allocated
  # dynamically via per-Gateway VIP Services and are independent of this block.
  ingress:
    # HTTP listener (port 80). Clients always connect on `port`; the container
    # binds on `port` normally, or 8080 when security.rootless is true. Both
    # pods take the value as COXSWAIN_INGRESS_HTTP_PORT: the proxy binds it
    # for data-plane traffic; the controller compares Gateway listener ports
    # against it for the `PortUnavailable` status condition.
    http:
      port: 80

    # HTTPS / TLS listener (port 443). Same dual-pod semantics as `http`.
    https:
      port: 443

# -- Service settings.
service:
  # External data-plane Service backing the shared-proxy pods.
  gateway:
    type: LoadBalancer
    annotations: {}
    # Pin the load-balancer to a specific IP (cloud-provider dependent).
    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    # Set to Local to preserve client IPs at the cost of uneven load distribution.
    externalTrafficPolicy: ""

  # Internal ClusterIP services exposing health (8081) and admin (8082) on
  # each pod. One Service per pod role; both share the same annotations.
  internal:
    annotations: {}

# -- Prometheus PodMonitor for the Prometheus Operator. Opt-in; requires the
# `monitoring.coreos.com/v1` CRD to be installed on the cluster when enabled.
# Covers both the shared-proxy pods and the operator-rendered dedicated
# proxies — a single PodMonitor selector matches every coxswain proxy pod.
podMonitor:
  enabled: false
  # Scrape interval forwarded to the rendered PodMonitor endpoint.
  interval: 15s
  # Extra labels merged onto the PodMonitor metadata (e.g. to attach the
  # resource to a specific Prometheus instance).
  labels: {}

# -- ValidatingAdmissionPolicy for ingress.coxswain-labs.dev/* annotations.
# Requires admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy (Kubernetes >= 1.30).
# The template is silently omitted on clusters that do not advertise this API version,
# so installing on an older cluster is safe (annotations fall through to the proxy's
# fail-open check and Warning events — see issue #401).
vap:
  enabled: true
