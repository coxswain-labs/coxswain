{{- if .Values.proxy.shared.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coxswain.sharedProxy.fullname" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
    app.kubernetes.io/component: shared-proxy
spec:
  {{- if not .Values.proxy.shared.autoscaling.enabled }}
  replicas: {{ .Values.proxy.shared.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "coxswain.sharedProxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coxswain.sharedProxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.proxy.shared.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        gateway.coxswain-labs.dev/admin-port: {{ .Values.admin.port | quote }}
        {{- with .Values.proxy.shared.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "coxswain.sharedProxy.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.shared.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.proxy.shared.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.shared.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.shared.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.shared.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coxswain
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "proxy", "--shared"]
          ports:
            {{- if .Values.controller.ingress.enabled }}
            - name: http
              containerPort: {{ include "coxswain.httpContainerPort" . }}
              protocol: TCP
            - name: https
              containerPort: {{ include "coxswain.httpsContainerPort" . }}
              protocol: TCP
            {{- end }}
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.admin.port }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: {{ .Values.logFilter | quote }}
            - name: COXSWAIN_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: COXSWAIN_PROXY_THREADS
              value: {{ .Values.proxy.shared.threads | quote }}
            - name: COXSWAIN_PROXY_UPSTREAM_KEEPALIVE_POOL_SIZE
              value: {{ .Values.proxy.shared.upstreamKeepalivePoolSize | quote }}
            - name: COXSWAIN_HEALTH_PORT
              value: {{ .Values.health.port | quote }}
            - name: COXSWAIN_ADMIN_PORT
              value: {{ .Values.admin.port | quote }}
            - name: COXSWAIN_PROXY_BIND_ADDRESS
              value: {{ .Values.proxy.shared.bindAddress | quote }}
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: {{ .Values.management.bindAddress | quote }}
            {{- if not .Values.controller.gatewayApi.enabled }}
            - name: COXSWAIN_DISABLE_GATEWAY_API
              value: "true"
            {{- end }}
            {{- if not .Values.controller.ingress.enabled }}
            - name: COXSWAIN_DISABLE_INGRESS
              value: "true"
            {{- else }}
            - name: COXSWAIN_INGRESS_HTTP_PORT
              value: {{ include "coxswain.httpContainerPort" . | quote }}
            - name: COXSWAIN_INGRESS_HTTPS_PORT
              value: {{ include "coxswain.httpsContainerPort" . | quote }}
            {{- end }}
            - name: COXSWAIN_CONTROLLER_NAME
              value: {{ .Values.controllerName | quote }}
            {{- if .Values.watchNamespace }}
            - name: COXSWAIN_WATCH_NAMESPACE
              value: {{ .Values.watchNamespace | quote }}
            {{- end }}
            # Discovery control plane (#423): the proxy receives pushed routing
            # snapshots over the mTLS stream and bootstraps its SVID over the
            # server-auth-only bootstrap listener. Both resolve to the discovery
            # Service in the controller's namespace.
            - name: COXSWAIN_DISCOVERY_ENDPOINT
              value: {{ include "coxswain.controller.discoveryEndpoint" . | quote }}
            - name: COXSWAIN_DISCOVERY_BOOTSTRAP_ENDPOINT
              value: {{ include "coxswain.controller.discoveryBootstrapEndpoint" . | quote }}
            - name: COXSWAIN_DISCOVERY_SA_TOKEN_PATH
              value: "/var/run/secrets/coxswain/discovery-token/token"
            - name: COXSWAIN_DISCOVERY_CA_BUNDLE_PATH
              value: "/var/run/secrets/coxswain/trust-bundle/ca.crt"
            - name: COXSWAIN_DISCOVERY_TRUST_DOMAIN
              value: {{ .Values.discovery.trustDomain | quote }}
            - name: COXSWAIN_PROXY_SHUTDOWN_GRACE_PERIOD
              value: {{ .Values.proxy.shared.shutdownGracePeriod | quote }}
            - name: COXSWAIN_PROXY_SHUTDOWN_TIMEOUT
              value: {{ .Values.proxy.shared.shutdownTimeout | quote }}
            - name: COXSWAIN_PROXY_LISTENER_DRAIN_TIMEOUT
              value: {{ .Values.proxy.shared.listenerDrainTimeout | quote }}
            {{- if .Values.proxy.shared.acceptProxyProtocol }}
            - name: COXSWAIN_INGRESS_ACCEPT_PROXY_PROTOCOL
              value: "true"
            {{- end }}
            {{- if .Values.proxy.shared.trustedSources }}
            - name: COXSWAIN_INGRESS_PROXY_TRUSTED_SOURCES
              value: {{ .Values.proxy.shared.trustedSources | join "," | quote }}
            {{- end }}
            {{- if .Values.proxy.shared.defaultRequestTimeout }}
            - name: COXSWAIN_PROXY_DEFAULT_REQUEST_TIMEOUT
              value: {{ .Values.proxy.shared.defaultRequestTimeout | quote }}
            {{- end }}
            {{- if .Values.proxy.shared.defaultBackendRequestTimeout }}
            - name: COXSWAIN_PROXY_DEFAULT_BACKEND_REQUEST_TIMEOUT
              value: {{ .Values.proxy.shared.defaultBackendRequestTimeout | quote }}
            {{- end }}
            {{- if .Values.proxy.shared.ingressDefaultBackend }}
            - name: COXSWAIN_INGRESS_DEFAULT_BACKEND
              value: {{ .Values.proxy.shared.ingressDefaultBackend | quote }}
            {{- end }}
            {{- if not .Values.proxy.shared.accessLog }}
            - name: COXSWAIN_ACCESS_LOG
              value: "false"
            {{- end }}
            {{- if ne .Values.proxy.shared.accessLogPathMode "full" }}
            - name: COXSWAIN_ACCESS_LOG_PATH_MODE
              value: {{ .Values.proxy.shared.accessLogPathMode | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.containerSecurityContext.capabilities.drop | toJson }}
              add: {{ if .Values.security.rootless }}[]{{ else }}{{ .Values.containerSecurityContext.capabilities.add | toJson }}{{ end }}
          resources:
            {{- toYaml .Values.proxy.shared.resources | nindent 12 }}
          volumeMounts:
            # Projected SA token for SVID bootstrap (#423). Read-only; compatible
            # with readOnlyRootFilesystem.
            - name: discovery-token
              mountPath: /var/run/secrets/coxswain/discovery-token
              readOnly: true
            # Public CA trust bundle published by the controller. `optional` on
            # the volume below means a pod that starts before the first publish
            # still boots; the bootstrap loop retries until the ConfigMap appears.
            - name: trust-bundle
              mountPath: /var/run/secrets/coxswain/trust-bundle
              readOnly: true
      volumes:
        # Audience-scoped projected SA token. The audience MUST match the value
        # the controller passes to TokenReview (`coxswain-discovery`).
        - name: discovery-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: coxswain-discovery
                  expirationSeconds: 3600
        # Controller-published trust bundle (public CA roots only — zero proxy
        # RBAC; the kubelet mounts it). `optional` so first-boot before the
        # publisher writes it does not block pod start.
        - name: trust-bundle
          configMap:
            name: coxswain-discovery-trust
            optional: true
{{- end }}
