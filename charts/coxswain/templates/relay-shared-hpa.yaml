{{- if and .Values.relay.shared.enabled .Values.relay.shared.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "coxswain.relayShared.fullname" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.relayShared.selectorLabels" . | nindent 4 }}
spec:
  # The shared relay's fan-out is the whole shared pool (cluster-wide, itself
  # autoscaled), so — unlike the namespace relay — it earns CPU-based
  # autoscaling here. Off by default; each replica does per-stream delta work,
  # which CPU tracks reasonably.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "coxswain.relayShared.fullname" . }}
  minReplicas: {{ .Values.relay.shared.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.relay.shared.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.relay.shared.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
