{{- if .Values.gatewayClass.create -}}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClass.name }}
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
spec:
  # Must match controllerName (COXSWAIN_CONTROLLER_NAME) in the Deployment.
  controllerName: {{ .Values.controllerName }}
{{- end }}
