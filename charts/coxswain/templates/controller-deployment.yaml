{{- if .Values.controller.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coxswain.controller.fullname" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "coxswain.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coxswain.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        gateway.coxswain-labs.dev/admin-port: {{ .Values.admin.port | quote }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "coxswain.controller.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coxswain
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "controller"]
          ports:
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.admin.port }}
              protocol: TCP
            - name: discovery
              containerPort: {{ .Values.discovery.port }}
              protocol: TCP
            - name: bootstrap
              containerPort: {{ .Values.discovery.bootstrapPort }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: {{ .Values.logFilter | quote }}
            - name: COXSWAIN_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: COXSWAIN_HEALTH_PORT
              value: {{ .Values.health.port | quote }}
            - name: COXSWAIN_ADMIN_PORT
              value: {{ .Values.admin.port | quote }}
            - name: COXSWAIN_DISCOVERY_PORT
              value: {{ .Values.discovery.port | quote }}
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: {{ .Values.management.bindAddress | quote }}
            - name: COXSWAIN_CONTROLLER_NAME
              value: {{ .Values.controllerName | quote }}
            {{- if .Values.watchNamespace }}
            - name: COXSWAIN_WATCH_NAMESPACE
              value: {{ .Values.watchNamespace | quote }}
            {{- end }}
            {{- if not .Values.controller.gatewayApi.enabled }}
            - name: COXSWAIN_DISABLE_GATEWAY_API
              value: "true"
            {{- end }}
            {{- if not .Values.controller.ingress.enabled }}
            - name: COXSWAIN_DISABLE_INGRESS
              value: "true"
            {{- else }}
            - name: COXSWAIN_INGRESS_HTTP_PORT
              value: {{ include "coxswain.httpContainerPort" . | quote }}
            - name: COXSWAIN_INGRESS_HTTPS_PORT
              value: {{ include "coxswain.httpsContainerPort" . | quote }}
            {{- end }}
            - name: COXSWAIN_CONTROLLER_LEASE_TTL
              value: {{ .Values.controller.leaseTtl | quote }}
            - name: COXSWAIN_CONTROLLER_LEASE_RENEW_INTERVAL
              value: {{ .Values.controller.leaseRenewInterval | quote }}
            # Adaptive reconcile debounce (#512).
            - name: COXSWAIN_RECONCILE_DEBOUNCE_MIN
              value: {{ .Values.controller.reconcileDebounceMin | quote }}
            - name: COXSWAIN_RECONCILE_DEBOUNCE_MAX
              value: {{ .Values.controller.reconcileDebounceMax | quote }}
            {{- if .Values.relay.dedicated.enabled }}
            # Namespace relay tiering (#584): the controller provisions a per-
            # namespace relay (SA + Deployment + Service) once a namespace's
            # desired dedicated-proxy replicas cross `minProxyReplicas`, and
            # repoints that namespace's dedicated proxies at it. These map the
            # `relay.dedicated.*` values onto the controller's `--relay-*` flags.
            - name: COXSWAIN_RELAY_ENABLED
              value: "true"
            - name: COXSWAIN_RELAY_REPLICAS
              value: {{ .Values.relay.dedicated.replicas | quote }}
            - name: COXSWAIN_RELAY_MIN_PROXY_REPLICAS
              value: {{ .Values.relay.dedicated.minProxyReplicas | quote }}
            - name: COXSWAIN_RELAY_TARGET_PROXIES_PER_REPLICA
              value: {{ .Values.relay.dedicated.targetProxiesPerReplica | quote }}
            - name: COXSWAIN_RELAY_COOLDOWN
              value: {{ .Values.relay.dedicated.cooldown | quote }}
            - name: COXSWAIN_RELAY_SCALE_DOWN_STABILIZATION
              value: {{ .Values.relay.dedicated.scaleDownStabilization | quote }}
            - name: COXSWAIN_RELAY_TOLERANCE
              value: {{ .Values.relay.dedicated.tolerance | quote }}
            - name: COXSWAIN_RELAY_CPU_REQUEST
              value: {{ .Values.relay.dedicated.resources.cpuRequest | quote }}
            - name: COXSWAIN_RELAY_MEMORY_REQUEST
              value: {{ .Values.relay.dedicated.resources.memoryRequest | quote }}
            - name: COXSWAIN_RELAY_MEMORY_LIMIT
              value: {{ .Values.relay.dedicated.resources.memoryLimit | quote }}
            {{- end }}
            {{- if .Values.relay.shared.enabled }}
            # Shared relay (#601): the shared relay is a static Helm toggle, not
            # controller-managed like namespace relays, so the controller cannot
            # discover it. This tells the controller the shared relay's Stream
            # endpoint so it hands shared-pool proxies this upstream at bootstrap
            # instead of its own — keeping shared-relay fronting working now that
            # the proxy has no COXSWAIN_DISCOVERY_ENDPOINT of its own.
            - name: COXSWAIN_SHARED_RELAY_ENDPOINT
              value: {{ include "coxswain.relayShared.discoveryEndpoint" . | quote }}
            {{- end }}
            {{- if .Values.controller.statusAddress }}
            - name: COXSWAIN_STATUS_ADDRESS
              value: {{ .Values.controller.statusAddress | quote }}
            {{- end }}
            {{- if .Values.controller.coxswainImage }}
            - name: COXSWAIN_IMAGE
              value: {{ .Values.controller.coxswainImage | quote }}
            {{- end }}
            # Shared proxy pool (#604): the controller — not Helm — owns the pool
            # Deployment/SA/HPA/PDB/internal-Service. `proxy.shared.*` values are
            # remapped to COXSWAIN_SHARED_PROXY_* env here; the controller renders
            # them onto the pod. The retained Ingress LB Service and the per-Gateway
            # VIP Services (#472) select the labels the controller stamps.
            # ENABLED + NAME are set even when the pool is disabled so the
            # controller can reclaim a previously-provisioned pool by name.
            - name: COXSWAIN_SHARED_PROXY_ENABLED
              value: {{ .Values.proxy.shared.enabled | quote }}
            - name: COXSWAIN_SHARED_PROXY_NAME
              value: {{ include "coxswain.sharedProxy.fullname" . | quote }}
            {{- if .Values.proxy.shared.enabled }}
            - name: COXSWAIN_SHARED_PROXY_SELECTOR
              value: {{ printf "app.kubernetes.io/name=%s,app.kubernetes.io/instance=%s,app.kubernetes.io/component=shared-proxy" (include "coxswain.name" .) .Release.Name | quote }}
            - name: COXSWAIN_SHARED_VIP_SERVICE_TYPE
              value: {{ .Values.proxy.shared.vipServiceType | quote }}
            - name: COXSWAIN_SHARED_PROXY_REPLICAS
              value: {{ .Values.proxy.shared.replicas | quote }}
            - name: COXSWAIN_SHARED_PROXY_CPU_REQUEST
              value: {{ .Values.proxy.shared.resources.requests.cpu | quote }}
            - name: COXSWAIN_SHARED_PROXY_MEMORY_REQUEST
              value: {{ .Values.proxy.shared.resources.requests.memory | quote }}
            - name: COXSWAIN_SHARED_PROXY_CPU_LIMIT
              value: {{ .Values.proxy.shared.resources.limits.cpu | quote }}
            - name: COXSWAIN_SHARED_PROXY_MEMORY_LIMIT
              value: {{ .Values.proxy.shared.resources.limits.memory | quote }}
            - name: COXSWAIN_SHARED_PROXY_AUTOSCALING_ENABLED
              value: {{ .Values.proxy.shared.autoscaling.enabled | quote }}
            - name: COXSWAIN_SHARED_PROXY_AUTOSCALING_MIN_REPLICAS
              value: {{ .Values.proxy.shared.autoscaling.minReplicas | quote }}
            - name: COXSWAIN_SHARED_PROXY_AUTOSCALING_MAX_REPLICAS
              value: {{ .Values.proxy.shared.autoscaling.maxReplicas | quote }}
            - name: COXSWAIN_SHARED_PROXY_AUTOSCALING_TARGET_CPU
              value: {{ .Values.proxy.shared.autoscaling.targetCPUUtilizationPercentage | quote }}
            - name: COXSWAIN_SHARED_PROXY_THREADS
              value: {{ .Values.proxy.shared.threads | quote }}
            - name: COXSWAIN_SHARED_PROXY_UPSTREAM_KEEPALIVE_POOL_SIZE
              value: {{ .Values.proxy.shared.upstreamKeepalivePoolSize | quote }}
            - name: COXSWAIN_SHARED_PROXY_SHUTDOWN_GRACE_PERIOD
              value: {{ .Values.proxy.shared.shutdownGracePeriod | quote }}
            - name: COXSWAIN_SHARED_PROXY_SHUTDOWN_TIMEOUT
              value: {{ .Values.proxy.shared.shutdownTimeout | quote }}
            - name: COXSWAIN_SHARED_PROXY_LISTENER_DRAIN_TIMEOUT
              value: {{ .Values.proxy.shared.listenerDrainTimeout | quote }}
            - name: COXSWAIN_SHARED_PROXY_ACCEPT_PROXY_PROTOCOL
              value: {{ .Values.proxy.shared.acceptProxyProtocol | quote }}
            {{- with .Values.proxy.shared.trustedSources }}
            - name: COXSWAIN_SHARED_PROXY_TRUSTED_SOURCES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.proxy.shared.defaultRequestTimeout }}
            - name: COXSWAIN_SHARED_PROXY_DEFAULT_REQUEST_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.proxy.shared.defaultBackendRequestTimeout }}
            - name: COXSWAIN_SHARED_PROXY_DEFAULT_BACKEND_REQUEST_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.proxy.shared.ingressDefaultBackend }}
            - name: COXSWAIN_SHARED_PROXY_INGRESS_DEFAULT_BACKEND
              value: {{ . | quote }}
            {{- end }}
            - name: COXSWAIN_SHARED_PROXY_ACCESS_LOG
              value: {{ .Values.proxy.shared.accessLog | quote }}
            - name: COXSWAIN_SHARED_PROXY_ACCESS_LOG_PATH_MODE
              value: {{ .Values.proxy.shared.accessLogPathMode | quote }}
            {{- /* Pod-template overlay (#604): scheduling + pod metadata + pull
                   secrets the controller strategic-merges onto the pool pod.
                   Built from proxy.shared.* + image.pullSecrets; emitted only when
                   at least one is set. */}}
            {{- $spec := dict }}
            {{- with .Values.proxy.shared.nodeSelector }}{{- $_ := set $spec "nodeSelector" . }}{{- end }}
            {{- with .Values.proxy.shared.tolerations }}{{- $_ := set $spec "tolerations" . }}{{- end }}
            {{- with .Values.proxy.shared.affinity }}{{- $_ := set $spec "affinity" . }}{{- end }}
            {{- with .Values.proxy.shared.topologySpreadConstraints }}{{- $_ := set $spec "topologySpreadConstraints" . }}{{- end }}
            {{- with .Values.proxy.shared.priorityClassName }}{{- $_ := set $spec "priorityClassName" . }}{{- end }}
            {{- with .Values.image.pullSecrets }}{{- $_ := set $spec "imagePullSecrets" . }}{{- end }}
            {{- $meta := dict }}
            {{- with .Values.proxy.shared.podLabels }}{{- $_ := set $meta "labels" . }}{{- end }}
            {{- with .Values.proxy.shared.podAnnotations }}{{- $_ := set $meta "annotations" . }}{{- end }}
            {{- $tmpl := dict }}
            {{- if $spec }}{{- $_ := set $tmpl "spec" $spec }}{{- end }}
            {{- if $meta }}{{- $_ := set $tmpl "metadata" $meta }}{{- end }}
            {{- if $tmpl }}
            - name: COXSWAIN_SHARED_PROXY_POD_TEMPLATE
              value: {{ $tmpl | toJson | quote }}
            {{- end }}
            {{- end }}
            # Discovery control-plane / CA (#423). COXSWAIN_DISCOVERY_PORT is set
            # above with the other bound ports.
            - name: COXSWAIN_DISCOVERY_BOOTSTRAP_PORT
              value: {{ .Values.discovery.bootstrapPort | quote }}
            - name: COXSWAIN_DISCOVERY_CA_SECRET
              value: {{ .Values.discovery.ca.secretName | quote }}
            - name: COXSWAIN_DISCOVERY_CA_MODE
              value: {{ .Values.discovery.ca.mode | quote }}
            - name: COXSWAIN_DISCOVERY_SVID_TTL
              value: {{ .Values.discovery.svidTtl | quote }}
            - name: COXSWAIN_DISCOVERY_TRUST_DOMAIN
              value: {{ .Values.discovery.trustDomain | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.containerSecurityContext.capabilities.drop | toJson }}
              # Controller does not bind low ports; drop NET_BIND_SERVICE regardless.
              add: []
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}
