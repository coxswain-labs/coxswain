{{- if and .Values.relay.shared.enabled .Values.relay.shared.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "coxswain.relayShared.serviceAccountName" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.relayShared.selectorLabels" . | nindent 4 }}
  {{- with .Values.relay.shared.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Zero-verb identity: like the shared proxy, the relay is a pure discovery
# client/cache with no Kubernetes API access — no Role/RoleBinding — and disables
# the default token automount (only the explicit, audience-scoped projected
# token in the Deployment is mounted).
automountServiceAccountToken: false
{{- end }}
