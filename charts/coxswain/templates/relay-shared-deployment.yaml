{{- if .Values.relay.shared.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coxswain.relayShared.fullname" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay-shared
spec:
  {{- if not .Values.relay.shared.autoscaling.enabled }}
  replicas: {{ .Values.relay.shared.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "coxswain.relayShared.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coxswain.relayShared.selectorLabels" . | nindent 8 }}
        {{- with .Values.relay.shared.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        gateway.coxswain-labs.dev/admin-port: {{ .Values.admin.port | quote }}
        {{- with .Values.relay.shared.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "coxswain.relayShared.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.relay.shared.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.relay.shared.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.relay.shared.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.relay.shared.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.relay.shared.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coxswain
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Subscribe SharedPool upstream to the controller and re-serve it
          # downstream to the shared proxies (#584). A flat passthrough cache —
          # no demux, no per-Gateway split.
          args: ["serve", "relay", "--shared"]
          ports:
            - name: discovery
              containerPort: {{ .Values.discovery.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.admin.port }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: {{ .Values.logFilter | quote }}
            - name: COXSWAIN_LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: COXSWAIN_HEALTH_PORT
              value: {{ .Values.health.port | quote }}
            - name: COXSWAIN_ADMIN_PORT
              value: {{ .Values.admin.port | quote }}
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: {{ .Values.management.bindAddress | quote }}
            - name: COXSWAIN_CONTROLLER_NAME
              value: {{ .Values.controllerName | quote }}
            # The port the relay's OWN downstream discovery server binds; the
            # shared proxies dial `coxswain.relayShared.discoveryEndpoint` here.
            - name: COXSWAIN_DISCOVERY_PORT
              value: {{ .Values.discovery.port | quote }}
            # Upstream discovery (to the controller). The relay subscribes for
            # snapshots over the mTLS stream and bootstraps its SVID over the
            # server-auth bootstrap listener — bootstrap is never tiered, so both
            # resolve to the controller's Services, exactly like a proxy.
            - name: COXSWAIN_DISCOVERY_ENDPOINT
              value: {{ include "coxswain.controller.discoveryEndpoint" . | quote }}
            - name: COXSWAIN_DISCOVERY_BOOTSTRAP_ENDPOINT
              value: {{ include "coxswain.controller.discoveryBootstrapEndpoint" . | quote }}
            - name: COXSWAIN_DISCOVERY_SA_TOKEN_PATH
              value: "/var/run/secrets/coxswain/discovery-token/token"
            - name: COXSWAIN_DISCOVERY_CA_BUNDLE_PATH
              value: "/var/run/secrets/coxswain/trust-bundle/ca.crt"
            - name: COXSWAIN_DISCOVERY_TRUST_DOMAIN
              value: {{ .Values.discovery.trustDomain | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.containerSecurityContext.capabilities.drop | toJson }}
              add: {{ if .Values.security.rootless }}[]{{ else }}{{ .Values.containerSecurityContext.capabilities.add | toJson }}{{ end }}
          resources:
            {{- toYaml .Values.relay.shared.resources | nindent 12 }}
          volumeMounts:
            # Projected SA token for SVID bootstrap (#423/#584). Read-only;
            # compatible with readOnlyRootFilesystem.
            - name: discovery-token
              mountPath: /var/run/secrets/coxswain/discovery-token
              readOnly: true
            # Public CA trust bundle: the relay verifies the controller upstream
            # AND uses it as the client-CA for the downstream proxies it serves.
            - name: trust-bundle
              mountPath: /var/run/secrets/coxswain/trust-bundle
              readOnly: true
      volumes:
        - name: discovery-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: coxswain-discovery
                  expirationSeconds: 3600
        - name: trust-bundle
          configMap:
            name: coxswain-discovery-trust
            optional: true
{{- end }}
