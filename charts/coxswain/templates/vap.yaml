{{- if and .Values.vap.enabled (.Capabilities.APIVersions.Has "admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy") }}
# ValidatingAdmissionPolicy + Binding for ingress.coxswain-labs.dev/* annotations.
# Requires Kubernetes >= 1.30 (admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy).
# Disable with: helm upgrade --reuse-values --set vap.enabled=false
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "coxswain.fullname" . }}-ingress-annotations
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["ingresses"]
  matchConditions:
    - name: has-coxswain-annotations
      expression: >-
        has(object.metadata.annotations) &&
        object.metadata.annotations.exists(k, k.startsWith('ingress.coxswain-labs.dev/'))
  variables:
    - name: ann
      expression: object.metadata.annotations
  validations:

    # ── Duration annotations ──────────────────────────────────────────────────
    # Go time.ParseDuration strings: one or more <int>[.<frac>]<unit> pairs
    # (no spaces), where unit ∈ {ns, us, ms, s, m, h}. Examples: "5s", "1m30s".

    - expression: >-
        !('ingress.coxswain-labs.dev/read-timeout' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/read-timeout'].matches(
          '^[0-9]+([.][0-9]+)?(ns|us|ms|s|m|h)([0-9]+([.][0-9]+)?(ns|us|ms|s|m|h))*$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/read-timeout: "' +
        variables.ann['ingress.coxswain-labs.dev/read-timeout'] +
        '" — must be a Go duration string (e.g. "60s", "1m")'

    - expression: >-
        !('ingress.coxswain-labs.dev/send-timeout' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/send-timeout'].matches(
          '^[0-9]+([.][0-9]+)?(ns|us|ms|s|m|h)([0-9]+([.][0-9]+)?(ns|us|ms|s|m|h))*$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/send-timeout: "' +
        variables.ann['ingress.coxswain-labs.dev/send-timeout'] +
        '" — must be a Go duration string (e.g. "60s", "1m")'

    - expression: >-
        !('ingress.coxswain-labs.dev/auth-timeout' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/auth-timeout'].matches(
          '^[0-9]+([.][0-9]+)?(ns|us|ms|s|m|h)([0-9]+([.][0-9]+)?(ns|us|ms|s|m|h))*$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/auth-timeout: "' +
        variables.ann['ingress.coxswain-labs.dev/auth-timeout'] +
        '" — must be a Go duration string (e.g. "500ms", "2s")'

    # ── Boolean annotations ───────────────────────────────────────────────────

    - expression: >-
        !('ingress.coxswain-labs.dev/use-regex' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/use-regex'].matches('^(?i)(true|false)$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/use-regex: "' +
        variables.ann['ingress.coxswain-labs.dev/use-regex'] +
        '" — must be "true" or "false"'

    - expression: >-
        !('ingress.coxswain-labs.dev/ssl-redirect' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/ssl-redirect'].matches('^(?i)(true|false)$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/ssl-redirect: "' +
        variables.ann['ingress.coxswain-labs.dev/ssl-redirect'] +
        '" — must be "true" or "false"'

    - expression: >-
        !('ingress.coxswain-labs.dev/trust-forwarded-for' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/trust-forwarded-for'].matches(
          '^(?i)(true|false)$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/trust-forwarded-for: "' +
        variables.ann['ingress.coxswain-labs.dev/trust-forwarded-for'] +
        '" — must be "true" or "false"'

    - expression: >-
        !('ingress.coxswain-labs.dev/auth-always-set-cookie' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/auth-always-set-cookie'].matches(
          '^(?i)(true|false)$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/auth-always-set-cookie: "' +
        variables.ann['ingress.coxswain-labs.dev/auth-always-set-cookie'] +
        '" — must be "true" or "false"'

    - expression: >-
        !('ingress.coxswain-labs.dev/auth-tls-pass-certificate-to-upstream' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/auth-tls-pass-certificate-to-upstream'].matches(
          '^(?i)(true|false)$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/auth-tls-pass-certificate-to-upstream: "' +
        variables.ann['ingress.coxswain-labs.dev/auth-tls-pass-certificate-to-upstream'] +
        '" — must be "true" or "false"'

    # ── Integer annotations ───────────────────────────────────────────────────

    - expression: >-
        !('ingress.coxswain-labs.dev/max-retries' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/max-retries'].matches('^[0-9]+$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/max-retries: "' +
        variables.ann['ingress.coxswain-labs.dev/max-retries'] +
        '" — must be a non-negative integer (e.g. "3")'

    - expression: >-
        !('ingress.coxswain-labs.dev/auth-tls-verify-depth' in variables.ann) ||
        (variables.ann['ingress.coxswain-labs.dev/auth-tls-verify-depth'].matches('^[0-9]+$') &&
         int(variables.ann['ingress.coxswain-labs.dev/auth-tls-verify-depth']) >= 1)
      messageExpression: >-
        'ingress.coxswain-labs.dev/auth-tls-verify-depth: "' +
        variables.ann['ingress.coxswain-labs.dev/auth-tls-verify-depth'] +
        '" — must be a positive integer >= 1 (certificate chain depth)'

    - expression: >-
        !('ingress.coxswain-labs.dev/redirect-port' in variables.ann) ||
        (variables.ann['ingress.coxswain-labs.dev/redirect-port'].matches('^[0-9]+$') &&
         int(variables.ann['ingress.coxswain-labs.dev/redirect-port']) <= 65535)
      messageExpression: >-
        'ingress.coxswain-labs.dev/redirect-port: "' +
        variables.ann['ingress.coxswain-labs.dev/redirect-port'] +
        '" — must be an integer in 0-65535'

    # ── Size-string annotations ───────────────────────────────────────────────
    # Byte count or <digits>[kmgKMG] suffix (k=1024, m=1024^2, g=1024^3).

    - expression: >-
        !('ingress.coxswain-labs.dev/max-body-size' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/max-body-size'].matches('^[0-9]+[kmgKMG]?$')
      messageExpression: >-
        'ingress.coxswain-labs.dev/max-body-size: "' +
        variables.ann['ingress.coxswain-labs.dev/max-body-size'] +
        '" — must be a byte count or size string (e.g. "8m", "512k", "10485760")'

    # ── Enum annotations ──────────────────────────────────────────────────────

    - expression: >-
        !('ingress.coxswain-labs.dev/path-normalize' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/path-normalize'].lowerAscii() in
          ['none', 'base', 'merge-slashes', 'decode-and-merge-slashes']
      messageExpression: >-
        'ingress.coxswain-labs.dev/path-normalize: "' +
        variables.ann['ingress.coxswain-labs.dev/path-normalize'] +
        '" — must be one of: none, base, merge-slashes, decode-and-merge-slashes (case-insensitive)'

    - expression: >-
        !('ingress.coxswain-labs.dev/redirect-scheme' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/redirect-scheme'] in ['http', 'https']
      messageExpression: >-
        'ingress.coxswain-labs.dev/redirect-scheme: "' +
        variables.ann['ingress.coxswain-labs.dev/redirect-scheme'] +
        '" — must be one of: http, https'

    - expression: >-
        !('ingress.coxswain-labs.dev/redirect-status-code' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/redirect-status-code'] in
          ['301', '302', '307', '308']
      messageExpression: >-
        'ingress.coxswain-labs.dev/redirect-status-code: "' +
        variables.ann['ingress.coxswain-labs.dev/redirect-status-code'] +
        '" — must be one of: 301, 302, 307, 308'

    - expression: >-
        !('ingress.coxswain-labs.dev/ssl-redirect-code' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/ssl-redirect-code'] in
          ['301', '302', '307', '308']
      messageExpression: >-
        'ingress.coxswain-labs.dev/ssl-redirect-code: "' +
        variables.ann['ingress.coxswain-labs.dev/ssl-redirect-code'] +
        '" — must be one of: 301, 302, 307, 308'

    # ── URL annotation ────────────────────────────────────────────────────────

    - expression: >-
        !('ingress.coxswain-labs.dev/auth-url' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/auth-url'].startsWith('http://') ||
        variables.ann['ingress.coxswain-labs.dev/auth-url'].startsWith('https://')
      messageExpression: >-
        'ingress.coxswain-labs.dev/auth-url: "' +
        variables.ann['ingress.coxswain-labs.dev/auth-url'] +
        '" — must be a URL starting with http:// or https://'

    # ── CIDR-list annotations ─────────────────────────────────────────────────
    # Character-set check per comma-separated token. Full structural validation
    # (prefix length, address range) is left to the proxy's fail-open check.

    - expression: >-
        !('ingress.coxswain-labs.dev/forwarded-for-trusted-cidrs' in variables.ann) ||
        variables.ann['ingress.coxswain-labs.dev/forwarded-for-trusted-cidrs'].split(',').all(tok,
          tok.trim() == '' ||
          tok.trim().matches('^[0-9a-fA-F:./]+$'))
      messageExpression: >-
        'ingress.coxswain-labs.dev/forwarded-for-trusted-cidrs: "' +
        variables.ann['ingress.coxswain-labs.dev/forwarded-for-trusted-cidrs'] +
        '" — must be a comma-separated list of CIDR blocks or IPs (e.g. "10.0.0.0/8,192.168.0.0/16")'
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "coxswain.fullname" . }}-ingress-annotations
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
spec:
  policyName: {{ include "coxswain.fullname" . }}-ingress-annotations
  validationActions: [Deny]
{{- end }}
