{{- if and .Values.proxy.shared.enabled .Values.proxy.shared.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "coxswain.sharedProxy.serviceAccountName" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.sharedProxy.selectorLabels" . | nindent 4 }}
  {{- with .Values.proxy.shared.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
