{{- if .Values.controller.enabled -}}
{{/*
Discovery gRPC Service (#423). Exposes the controller's two gRPC listeners to proxy pods:
  - stream    (mTLS mandatory): pushes routing snapshots to SVID-bearing proxies
  - bootstrap (server-auth-only): issues SVIDs to fresh proxies via SA token + CSR
The controller binary hardcodes the endpoint it hands to dedicated proxies as
`https://coxswain-controller-discovery.<namespace>.svc:<discovery-port>`
(coxswain-bin/src/lib.rs), so this Service MUST be named literally
`coxswain-controller-discovery` regardless of release name. The shared proxy
resolves the same name via the `coxswain.controller.discoveryEndpoint` helper.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: coxswain-controller-discovery
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: discovery
      port: {{ .Values.discovery.port }}
      targetPort: discovery
      protocol: TCP
    - name: bootstrap
      port: {{ .Values.discovery.bootstrapPort }}
      targetPort: bootstrap
      protocol: TCP
{{- end }}
