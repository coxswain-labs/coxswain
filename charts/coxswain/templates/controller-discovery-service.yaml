{{- if .Values.controller.enabled -}}
# Discovery control-plane Service (#423). Exposes the controller's two gRPC
# listeners to proxy pods:
#   - stream    (mTLS mandatory): pushes routing snapshots to SVID-bearing proxies
#   - bootstrap (server-auth-only): issues SVIDs to fresh proxies via SA token + CSR
# Named `coxswain-controller-discovery` (see the `coxswain.discovery.serviceName`
# helper) so the controller operator's rendered dedicated-proxy endpoint and the
# shared-proxy endpoint env both resolve to it.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coxswain.discovery.serviceName" . }}
  namespace: {{ include "coxswain.namespace" . }}
  labels:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: discovery
      port: {{ .Values.discovery.port }}
      targetPort: discovery
      protocol: TCP
    - name: bootstrap
      port: {{ .Values.discovery.bootstrapPort }}
      targetPort: bootstrap
      protocol: TCP
{{- end }}
