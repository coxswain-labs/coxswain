{{- if .Values.proxy.dedicated.rbac.create -}}
# Cluster-wide HTTPRoute read permission for dedicated-mode proxies whose
# Gateway has a listener with allowedRoutes.namespaces.from: All or
# from: Selector (#229). The controller binds this ClusterRole via a
# per-Gateway ClusterRoleBinding when the Gateway spec requires it, and
# removes the binding when the Gateway no longer needs cluster-wide reads.
#
# Load-bearing invariants:
#   - Zero write verbs. A compromised proxy must not be able to write.
#   - Limited to httproutes only — the narrowest grant that satisfies
#     from: All / from: Selector route attachment.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coxswain-gateway-proxy-cluster-wide-route-reader
  labels:
    {{- include "coxswain.labels" . | nindent 4 }}
    app.kubernetes.io/component: dedicated-proxy
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch"]
{{- end }}
