{{- if .Values.controller.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coxswain.controller.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
  {{- with .Values.service.internal.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "coxswain.controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.health.port }}
      targetPort: health
      protocol: TCP
    - name: admin
      port: {{ .Values.admin.port }}
      targetPort: admin
      protocol: TCP
{{- end }}
