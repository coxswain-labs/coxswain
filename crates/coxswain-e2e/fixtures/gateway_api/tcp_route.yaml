# TCP-proxy Gateway + TCPRoute fixture for GEP-1901 / #505 e2e tests.
# The proxy dials the bound backend and splices the raw stream — no SNI peek,
# no TLS, no HTTP parsing.
#
# Substitutions (via FixtureVars::with):
#   GATEWAY_TCP_PROXY_PORT - port for the TCP-proxy listener (8445)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-tcp-gw
  namespace: ${TESTNS}
spec:
  gatewayClassName: coxswain
  listeners:
    - name: tcp-proxy
      port: ${GATEWAY_TCP_PROXY_PORT}
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: TCPRoute
metadata:
  name: tcp-route
  namespace: ${TESTNS}
spec:
  parentRefs:
    - name: coxswain-tcp-gw
      namespace: ${TESTNS}
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
