# Gateway API dual-certificate listener (GEP-851):
# one HTTPS listener with two certificateRefs (ECDSA + RSA).
# TlsStoreBuilder sorts ECDSA first so the proxy serves the ECDSA cert.
# Placeholders replaced at test runtime:
#   TESTNS        - test namespace
#   HOSTNAME      - hostname for the HTTPS listener
#   ECDSA_SECRET  - name of the ECDSA kubernetes.io/tls Secret
#   RSA_SECRET    - name of the RSA kubernetes.io/tls Secret
#   ECDSA_CRT_B64 - base64-encoded PEM certificate (ECDSA)
#   ECDSA_KEY_B64 - base64-encoded PEM private key (ECDSA)
#   RSA_CRT_B64   - base64-encoded PEM certificate (RSA)
#   RSA_KEY_B64   - base64-encoded PEM private key (RSA)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${ECDSA_SECRET}
type: kubernetes.io/tls
data:
  tls.crt: ${ECDSA_CRT_B64}
  tls.key: ${ECDSA_KEY_B64}
---
apiVersion: v1
kind: Secret
metadata:
  name: ${RSA_SECRET}
type: kubernetes.io/tls
data:
  tls.crt: ${RSA_CRT_B64}
  tls.key: ${RSA_KEY_B64}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-dual-cert-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: https
      port: ${GATEWAY_HTTPS_PORT}
      protocol: HTTPS
      hostname: "${HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${ECDSA_SECRET}
          - kind: Secret
            name: ${RSA_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dual-cert-route
spec:
  parentRefs:
    - name: coxswain-dual-cert-test
  hostnames:
    - "${HOSTNAME}"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
