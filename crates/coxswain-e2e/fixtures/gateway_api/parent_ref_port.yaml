# parentRef.port matching fixture.
#
# One Gateway with two HTTP listeners: one on GATEWAY_HTTP_PORT (coxswain-bound) and
# one on WRONG_PORT (declared but coxswain is NOT listening on it).
#
# route-pinned:   parentRef.port=GATEWAY_HTTP_PORT  → routes to echo-a   (should be routable)
# route-wrong:    parentRef.port=WRONG_PORT → routes to echo-b   (coxswain not listening, unreachable)
# route-unpinned: no parentRef.port         → routes to echo-a   (attaches to both listeners)
#
# TESTNS and GATEWAY_HTTP_PORT are substituted at runtime.
# WRONG_PORT is substituted at runtime with a port that coxswain is NOT listening on.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: port-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: alt
      port: ${WRONG_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# Route bound to the correct listener port — should be routable.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-pinned
spec:
  parentRefs:
    - name: port-gw
      port: ${GATEWAY_HTTP_PORT}
  hostnames:
    - "pinned.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
---
# Route bound to the alt listener port — should NOT be routable on GATEWAY_HTTP_PORT.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-wrong-port
spec:
  parentRefs:
    - name: port-gw
      port: ${WRONG_PORT}
  hostnames:
    - "wrong.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-b
          port: 3000
---
# Route with no parentRef.port — should attach to BOTH listeners.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-unpinned
spec:
  parentRefs:
    - name: port-gw
  hostnames:
    - "both.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
