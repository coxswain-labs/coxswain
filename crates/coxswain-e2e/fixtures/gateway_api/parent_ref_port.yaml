# parentRef.port matching fixture.
#
# One Gateway with a single HTTP listener on HTTP_PORT.
#
# route-pinned:  parentRef.port=HTTP_PORT  → routes to echo-a   (should be routable)
# route-wrong:   parentRef.port=WRONG_PORT → routes to echo-b   (no listener, unattached)
#
# TESTNS and HTTP_PORT are substituted at runtime.
# WRONG_PORT is substituted at runtime with a port that coxswain is NOT listening on.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: port-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# Route bound to the correct listener port — should be routable.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-pinned
spec:
  parentRefs:
    - name: port-gw
      port: HTTP_PORT
  hostnames:
    - "pinned.TESTNS.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
    # Probe rule
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
---
# Route bound to a port that doesn't exist — should NOT be routable.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-wrong-port
spec:
  parentRefs:
    - name: port-gw
      port: WRONG_PORT
  hostnames:
    - "wrong.TESTNS.local"
  rules:
    - backendRefs:
        - name: echo-b
          port: 3000
