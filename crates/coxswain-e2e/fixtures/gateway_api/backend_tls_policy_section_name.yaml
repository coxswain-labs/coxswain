# BackendTLSPolicy section-name routing fixture.
# See the test in `tests/gateway_api.rs` for substitution contract — the apply
# layer does a global text replace, and any token names listed here would expand
# into the comment header and break the YAML.
#
# Layout:
#   - One Service with TWO named ports (https-1/443 and https-2/8443) targeting the same pod.
#   - One Gateway plus one HTTPRoute with two backendRefs (one per port).
#   - One policy bound to (Service, sectionName=https-1) with hostname A.
#   - One policy bound to the whole Service (no sectionName) with hostname B.
# Expected behaviour:
#   - Traffic to port 443 uses the section-name policy.
#   - Traffic to port 8443 uses the no-section-name policy.
# Both must succeed because the backend cert covers both hostnames as SANs.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-tls-ca
data:
  ca.crt: |
    CA_PEM
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-tls-route
spec:
  parentRefs:
    - name: backend-tls-gw
  hostnames:
    - backend-tls.TESTNS.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /port-443
      backendRefs:
        - name: echo-tls
          port: 443
    - matches:
        - path:
            type: PathPrefix
            value: /port-8443
      backendRefs:
        - name: echo-tls
          port: 8443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: echo-tls-policy-section
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-tls
      sectionName: https-1
  validation:
    hostname: SNI_PRIMARY
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: echo-tls-ca
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: echo-tls-policy-catchall
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-tls
  validation:
    hostname: SNI_SECONDARY
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: echo-tls-ca
