# HTTPRoute combined header + method matching fixture.
# TESTNS is substituted with the test namespace at runtime.
#
# Routes:
#   /combined + GET  + X-Env: prod    → echo-a  (AND: both predicates must match)
#   /combined + POST + X-Env: staging → echo-a  (OR:  second match, same backend)
#   / (catch-all probe)               → echo-b
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "echo.TESTNS.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /combined
          method: GET
          headers:
            - name: X-Env
              type: Exact
              value: prod
        - path:
            type: PathPrefix
            value: /combined
          method: POST
          headers:
            - name: X-Env
              type: Exact
              value: staging
      backendRefs:
        - name: echo-a
          port: 3000
    - backendRefs:
        - name: echo-b
          port: 3000

    # Probe rule — used by wait_for_route to detect when the HTTPRoute is live.
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
