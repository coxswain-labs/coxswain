# Gateway backend client-certificate sad path (GEP-3155, #87): missing Secret.
#
# Gateway with spec.tls.backend.clientCertificateRef pointing to a Secret that
# does not exist.  The controller must write ResolvedRefs=False/InvalidClientCertificateRef
# on the Gateway.
#
# Placeholder:
#   GATEWAY_HTTP_PORT — filled by Harness::apply
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-cc-missing-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: does-not-exist
