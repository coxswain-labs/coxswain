# RetryPolicy ExtensionRef on HTTPRoute (#445) — apply backends::GO_HTTPBIN first.
#
# A RetryPolicy CR retries on HTTP 503 with attempts=2 and a 200ms backoff. The
# route forwards to go-httpbin, whose /status/503 endpoint always returns 503, so
# the proxy exhausts its budget (final 503) after firing two retries — observable
# via coxswain_proxy_upstream_retries_total{condition="http-code"} and the elapsed
# time (>= 2 backoffs).
#
# Gateway: coxswain-test on GATEWAY_HTTP_PORT.
# Route host: gwretry.TESTNS.local, path / -> go-httpbin:3000.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: RetryPolicy
metadata:
  name: retry-503
spec:
  attempts: 2
  backoff: 200ms
  codes: [503]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: retry-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "gwretry.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: RetryPolicy
            name: retry-503
      backendRefs:
        - name: go-httpbin
          port: 3000
