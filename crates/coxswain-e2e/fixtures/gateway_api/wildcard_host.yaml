# HTTPRoute wildcard host fixture.
# Mirrors the *.wildcard.local scenario from DEVELOPMENT.md.
# TESTNS is substituted with the test namespace at runtime.
#
# Routes:
#   *.wildcard.TESTNS.local / → echo-c
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "*.wildcard.TESTNS.local"
  rules:
    - backendRefs:
        - name: echo-c
          port: 3000
