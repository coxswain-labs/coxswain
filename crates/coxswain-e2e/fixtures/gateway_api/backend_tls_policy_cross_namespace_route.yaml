---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-tls-route
spec:
  parentRefs:
    - name: backend-tls-gw
  hostnames:
    - backend-tls.${TESTNS}.local
  rules:
    - backendRefs:
        - name: echo-tls
          port: 8443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: echo-tls-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-tls
  validation:
    hostname: ${TLS_HOSTNAME}
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: echo-tls-ca
        namespace: ${TENANTNS}
