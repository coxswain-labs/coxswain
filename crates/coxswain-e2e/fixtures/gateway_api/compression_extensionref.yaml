# Compression ExtensionRef fixture (apply backends::ECHO first).
#
# A Compression CR enables gzip + brotli (minSize: 1, so the small echo JSON
# body always qualifies). An HTTPRoute references it via an ExtensionRef
# filter. The proxy must negotiate Content-Encoding per the client's
# Accept-Encoding, preferring brotli when both are enabled and offered.
#
# Gateway: coxswain-compression on GATEWAY_HTTP_PORT.
# Route host: gwcompression.TESTNS.local, path / -> echo-a:3000.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-compression
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: Compression
metadata:
  name: compression
spec:
  gzip: true
  brotli: true
  level: 6
  minSize: 1
  types:
    - application/json
    - text/html
    - text/plain
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: compression-route
spec:
  parentRefs:
    - name: coxswain-compression
  hostnames:
    - "gwcompression.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: Compression
            name: compression
      backendRefs:
        - name: echo-a
          port: 3000
