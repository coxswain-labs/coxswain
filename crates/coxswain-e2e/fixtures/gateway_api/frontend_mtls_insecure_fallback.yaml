# Gateway frontend mTLS with AllowInsecureFallback mode — GEP-91 (#86).
#
# Same layout as frontend_mtls_configmap.yaml but sets
# spec.tls.frontend.default.validation.mode: AllowInsecureFallback.
# The proxy requests the client cert but never aborts the handshake if it is
# absent or invalid; authorization is delegated to the backend.
#
# Placeholders:
#   HOSTNAME        — listener hostname and HTTPRoute hostname
#   SECRET_NAME     — name of the kubernetes.io/tls server-cert Secret
#   TLS_CRT_B64     — base64-encoded PEM server certificate
#   TLS_KEY_B64     — base64-encoded PEM server private key
#   CA_CRT_PEM      — PEM-encoded CA certificate (stored verbatim in ConfigMap)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${SECRET_NAME}
type: kubernetes.io/tls
data:
  tls.crt: ${TLS_CRT_B64}
  tls.key: ${TLS_KEY_B64}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-ca-fallback
data:
  ca.crt: |
    ${CA_CRT_PEM}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-frontend-fallback
spec:
  gatewayClassName: coxswain
  listeners:
    - name: https
      port: ${GATEWAY_HTTPS_PORT}
      protocol: HTTPS
      hostname: "${HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${SECRET_NAME}
        frontend:
          default:
            validation:
              mode: AllowInsecureFallback
              caCertificateRefs:
                - group: ""
                  kind: ConfigMap
                  name: frontend-ca-fallback
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-fallback-route
spec:
  parentRefs:
    - name: coxswain-frontend-fallback
  hostnames:
    - "${HOSTNAME}"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
