# ClientTrafficPolicy fixture enabling PROXY protocol for a Gateway.
# (Substitution token names NOT mentioned in this comment header.)
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: ${CTP_NAME}
  namespace: ${TESTNS}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: ${GATEWAY_NAME}
  proxyProtocol:
    enabled: true
    trustedSources:
    - ${TRUSTED_SOURCES}
