# BackendTLSPolicy conflict-resolution fixture.
# (Substitution token names are intentionally NOT mentioned in this comment header
# — String::replace is global and multi-line CA tokens would break YAML if they
# expanded inside a `#` line. See callers in tests/gateway_api.rs for the
# substitution contract: TLS hostname, CA PEM, HTTP port.)
#
# Two policies target the same Service WITHOUT sectionName. Lexicographic ordering
# of the policy names ("aaa-policy" < "zzz-policy") combined with identical (None)
# creationTimestamp acts as the tiebreaker — "aaa-policy" wins, "zzz-policy" must
# end up `Accepted=False/Conflicted` with the test Gateway listed under
# `status.ancestors[]`.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-tls-ca
data:
  ca.crt: |
    CA_PEM
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: GATEWAY_HTTP_PORT
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-tls-route
spec:
  parentRefs:
    - name: backend-tls-gw
  hostnames:
    - backend-tls.TESTNS.local
  rules:
    - backendRefs:
        - name: echo-tls
          port: 8443
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: aaa-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-tls
  validation:
    hostname: TLS_HOSTNAME
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: echo-tls-ca
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: zzz-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-tls
  validation:
    hostname: TLS_HOSTNAME
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: echo-tls-ca
