# HTTPRoute with rules that omit / empty their backendRefs (#517).
#
# Gateway API `HTTPRouteNoBackendRefs`: a rule with no backends must route with a
# distinct 500 (not fall through to a 404). One rule carries real backendRefs
# (routes 200), one omits the field entirely, and one sets it to an empty list.
#
# Placeholders:
#   TESTNS — test namespace (substituted at runtime)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: no-backend-refs-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "no-backends.${TESTNS}.local"
  rules:
    # Real backendRefs — routes to the backend (200).
    - matches:
        - path:
            type: PathPrefix
            value: /forward
      backendRefs:
        - name: echo-a
          port: 3000
    # backendRefs present but empty — must return 500.
    - matches:
        - path:
            type: PathPrefix
            value: /empty
      backendRefs: []
    # backendRefs omitted entirely — must return 500.
    - matches:
        - path:
            type: PathPrefix
            value: /omitted
