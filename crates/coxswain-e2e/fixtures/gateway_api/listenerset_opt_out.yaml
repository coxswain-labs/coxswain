---
# GEP-1713 sad path: the Gateway does NOT set spec.allowedListeners, so it
# defaults to `from: None` and rejects every ListenerSet. The ListenerSet must be
# Accepted=False/NotAllowed and its listener never programmed/exposed.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: team-ls
spec:
  parentRef:
    name: coxswain-test
  listeners:
    - name: ls-http
      port: 8001
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
