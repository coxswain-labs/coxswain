# CoxswainExternalAuth gRPC transport (#23). Apply backends::ECHO and
# backends::EXT_AUTHZ_GRPC first.
#
# A CoxswainExternalAuth with protocol: GRPC points at ext-authz-grpc:9000 (Istio's
# Envoy ext_authz sample server). An HTTPRoute references it via an ExtensionRef
# filter. The proxy speaks the envoy.service.auth.v3 Check proto to the auth pod:
#   * a request with `x-ext-authz: allow` is allowed → echo-a,
#   * a request without it is denied (PermissionDenied) → 403.
#
# Gateway: coxswain-extauth-grpc on GATEWAY_HTTP_PORT.
# Route host: gwextauthgrpc.TESTNS.local, path / -> echo-a:3000.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-extauth-grpc
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainExternalAuth
metadata:
  name: extauth-grpc
spec:
  protocol: GRPC
  backendRef:
    name: ext-authz-grpc
    port: 9000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: extauth-grpc-route
spec:
  parentRefs:
    - name: coxswain-extauth-grpc
  hostnames:
    - "gwextauthgrpc.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: ExternalAuth
            name: extauth-grpc
      backendRefs:
        - name: echo-a
          port: 3000
