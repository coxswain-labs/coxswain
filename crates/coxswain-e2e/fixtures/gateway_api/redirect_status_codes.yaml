---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "redirect.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: Exact
            value: /303
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 303
            hostname: "target.local"
    - matches:
        - path:
            type: Exact
            value: /307
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 307
            hostname: "target.local"
    - matches:
        - path:
            type: Exact
            value: /308
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 308
            hostname: "target.local"

    # Probe rule
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
