# Gateway frontend client-certificate mTLS fixture — GEP-91 (#86).
#
# Applies:
#   1. A kubernetes.io/tls Secret (server certificate for the HTTPS listener).
#   2. A ConfigMap containing the CA bundle under key `ca.crt` (Core-support ref).
#   3. A Gateway with a single HTTPS listener that carries
#      spec.tls.frontend.default.validation (AllowValidOnly, the default).
#   4. An HTTPRoute routing the listener to echo-a.
#
# The proxy aborts every TLS handshake that lacks a valid client certificate.
#
# Placeholders:
#   HOSTNAME        — listener hostname and HTTPRoute hostname
#   SECRET_NAME     — name of the kubernetes.io/tls server-cert Secret
#   TLS_CRT_B64     — base64-encoded PEM server certificate
#   TLS_KEY_B64     — base64-encoded PEM server private key
#   CA_CRT_PEM      — PEM-encoded CA certificate (stored verbatim in ConfigMap)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${SECRET_NAME}
type: kubernetes.io/tls
data:
  tls.crt: ${TLS_CRT_B64}
  tls.key: ${TLS_KEY_B64}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-ca
data:
  ca.crt: |
    ${CA_CRT_PEM}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-frontend-mtls
spec:
  gatewayClassName: coxswain
  listeners:
    - name: https
      port: ${GATEWAY_HTTPS_PORT}
      protocol: HTTPS
      hostname: "${HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${SECRET_NAME}
        frontend:
          default:
            validation:
              caCertificateRefs:
                - group: ""
                  kind: ConfigMap
                  name: frontend-ca
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-mtls-route
spec:
  parentRefs:
    - name: coxswain-frontend-mtls
  hostnames:
    - "${HOSTNAME}"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
