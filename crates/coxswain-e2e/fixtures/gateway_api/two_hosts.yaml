# Two independent HTTPRoutes, each a single host routed to a distinct
# backend, sharing one Gateway. TESTNS is substituted with the test namespace
# at runtime.
#
# Routes:
#   host-a.TESTNS.local / → echo-a
#   host-b.TESTNS.local / → echo-b
#
# Used by #511 partitioned-rebuild tests: each host compiles into its own
# (port, host) routing-table partition in build_gateway_routes, so mutating
# one route must leave the other host's compiled partition untouched. Unlike
# the Ingress TWO_HOSTS fixture, this exercises the actual partitioned code
# path — build_ingress_routes is not partitioned (#511 scope).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-a
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "host-a.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-b
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "host-b.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-b
          port: 3000
