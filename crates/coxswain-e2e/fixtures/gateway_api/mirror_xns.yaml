# HTTPRoute cross-namespace RequestMirror fixture — GEP-3171 (#261).
# TESTNS   = primary namespace (this fixture is applied here)
# TENANTNS = namespace holding the mirror backend + ReferenceGrant
#
# Pair with gwa::CROSS_NAMESPACE_TENANT (echo-d + ReferenceGrant) applied to TENANTNS.
#
# Routes:
#   PathPrefix /mirror-xns/path  → echo-a  (cross-ns mirror: echo-d in TENANTNS, 100%)
#   Exact      /mirror-xns/probe → echo-a  (readiness probe)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mirror-xns-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "mirror-xns.${TESTNS}.local"
  rules:
    # Rule 1: mirror to echo-d in a different namespace (requires ReferenceGrant).
    - matches:
        - path:
            type: PathPrefix
            value: /mirror-xns/path
      filters:
        - type: RequestMirror
          requestMirror:
            backendRef:
              name: echo-d
              namespace: ${TENANTNS}
              port: 3000
      backendRefs:
        - name: echo-a
          port: 3000

    # Probe rule.
    - matches:
        - path:
            type: Exact
            value: /mirror-xns/probe
      backendRefs:
        - name: echo-a
          port: 3000
