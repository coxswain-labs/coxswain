# Mixed-validity Gateway fixture (#570): one serviceable HTTP listener and one
# HTTPS listener whose Secret is malformed. The valid listener must program
# (and serve) while the invalid one carries its per-listener negative
# conditions — the invalid listener must not hold the Gateway's top-level
# Programmed hostage.
# Placeholders replaced at test runtime:
#   TESTNS            - test namespace
#   LISTENER_HOSTNAME - hostname for the broken HTTPS listener
#   SECRET_NAME       - name of the malformed Secret (created by the test)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-mixed-tls
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: ${GATEWAY_HTTPS_PORT}
      protocol: HTTPS
      hostname: "${LISTENER_HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${SECRET_NAME}
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mixed-echo-route
spec:
  parentRefs:
    - name: coxswain-mixed-tls
      sectionName: http
  hostnames:
    - "echo.${TESTNS}.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000

    # Probe rule — used by wait_for_route to detect when the HTTPRoute is live.
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
