# HTTPRoute method matching fixture.
# TESTNS is substituted with the test namespace at runtime.
#
# Routes:
#   GET  /method → echo-a
#   POST /method → echo-b
#   / (catch-all probe) → echo-a
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "echo.TESTNS.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /method
          method: GET
      backendRefs:
        - name: echo-a
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /method
          method: POST
      backendRefs:
        - name: echo-b
          port: 3000
    - backendRefs:
        - name: echo-a
          port: 3000

    # Probe rule — used by wait_for_route to detect when the HTTPRoute is live.
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
