# HTTPRoute for the endpoint serving-condition drain test.
# Routes all traffic to echo-a. The test injects an orphan EndpointSlice for
# echo-a that has serving:false/ready:true (simulating the rolling-deploy race
# window) and verifies that the bad endpoint is never selected.
# TESTNS is substituted with the test namespace at runtime.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: GATEWAY_HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "serving.TESTNS.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
