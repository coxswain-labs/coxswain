# Two section-scoped CTPs targeting the same listener — conflict test.
# (Substitution token names NOT mentioned in this comment header.)
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: aaa-ctp
  namespace: ${TESTNS}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: ${GATEWAY_NAME}
    sectionName: ${SECTION_NAME}
  proxyProtocol:
    enabled: true
    trustedSources:
    - 0.0.0.0/0
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: zzz-ctp
  namespace: ${TESTNS}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: ${GATEWAY_NAME}
    sectionName: ${SECTION_NAME}
  proxyProtocol:
    enabled: true
    trustedSources:
    - 0.0.0.0/0
