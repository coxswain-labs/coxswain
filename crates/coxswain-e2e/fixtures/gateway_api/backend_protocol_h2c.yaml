---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: h2c-gateway
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: GATEWAY_HTTP_PORT
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: h2c-route
spec:
  parentRefs:
    - name: h2c-gateway
  hostnames:
    - h2c.TESTNS.local
  rules:
    - backendRefs:
        - name: h2c-echo
          port: 3001
