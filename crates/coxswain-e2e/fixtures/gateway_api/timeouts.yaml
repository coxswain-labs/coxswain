# HTTPRoute timeouts fixture.
# Exercises timeouts.request and timeouts.backendRequest (both yield 504 on read timeout).
# TESTNS is substituted with the test namespace at runtime.
#
# Depends on the slow-echo backend (accepts TCP but never sends HTTP data),
# which makes the proxy's upstream read timeout fire deterministically.
#
# Routes:
#   /request-timeout   → 500ms total request budget        → 504 Gateway Timeout
#   /backend-timeout   → 500ms backend request read budget → 504 Gateway Timeout
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: timeout-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "timeout.TESTNS.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /request-timeout
      timeouts:
        request: "500ms"
      backendRefs:
        - name: slow-echo
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /backend-timeout
      timeouts:
        backendRequest: "500ms"
      backendRefs:
        - name: slow-echo
          port: 3000
