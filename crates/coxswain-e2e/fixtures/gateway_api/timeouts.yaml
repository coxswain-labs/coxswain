# HTTPRoute timeouts fixture.
# Exercises timeouts.request (504) and timeouts.backendRequest (502).
# TESTNS is substituted with the test namespace at runtime.
#
# Depends on the slow-echo backend (accepts TCP but never sends HTTP data),
# which makes the proxy's upstream read timeout fire deterministically.
#
# Routes:
#   /request-timeout   → 500ms total request budget  → 504 Gateway Timeout
#   /backend-timeout   → 500ms backend request budget → 502 Bad Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: timeout-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "timeout.TESTNS.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /request-timeout
      timeouts:
        request: "500ms"
      backendRefs:
        - name: slow-echo
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /backend-timeout
      timeouts:
        backendRequest: "500ms"
      backendRefs:
        - name: slow-echo
          port: 3000
