# CoxswainExternalAuth ExtensionRef — allow path (#23). Apply backends::ECHO and
# backends::AUTH_STUB first.
#
# A CoxswainExternalAuth (HTTP transport) points at auth-allow:4000 (returns 200).
# An HTTPRoute references it via an ExtensionRef filter. The proxy runs the check,
# the auth service allows, and the request reaches echo-a.
#
# Depends on backends::AUTH_STUB (auth-allow:4000 → 200) and backends::ECHO.
# Gateway: coxswain-extauth on GATEWAY_HTTP_PORT.
# Route host: gwextauthallow.TESTNS.local, path / -> echo-a:3000.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-extauth
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainExternalAuth
metadata:
  name: extauth-allow
spec:
  protocol: HTTP
  backendRef:
    name: auth-allow
    port: 4000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: extauth-allow-route
spec:
  parentRefs:
    - name: coxswain-extauth
  hostnames:
    - "gwextauthallow.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: ExternalAuth
            name: extauth-allow
      backendRefs:
        - name: echo-a
          port: 3000
