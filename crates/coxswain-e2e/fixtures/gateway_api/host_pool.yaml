# HTTPRoute backend pool fixture.
# Mirrors the split.local scenario from DEVELOPMENT.md.
# TESTNS is substituted with the test namespace at runtime.
#
# Routes:
#   /  → echo-a + echo-b (round-robin across both)
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pool-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "pool.TESTNS.local"
  rules:
    # Probe rule — used by wait_for_route to detect when the HTTPRoute is live.
    - matches:
        - path:
            type: Exact
            value: /probe
      backendRefs:
        - name: echo-a
          port: 3000
    - backendRefs:
        - name: echo-a
          port: 3000
        - name: echo-b
          port: 3000
