# CoxswainBackendPolicy sessionPersistence: Cookie fixture (#554) on the
# Gateway API surface — this is new capability: HTTPRoute never had a session
# persistence binding of any kind before #554.
#
# One Service with three pods so weighted round-robin spreads across pods and
# the affinity cookie pins to exactly one.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-aff
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-aff
  template:
    metadata:
      labels:
        app: echo-aff
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: echo
          image: ${ECHO_IMAGE}
          ports:
            - containerPort: 3000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: echo-aff
spec:
  selector:
    app: echo-aff
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: session-cookie-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "session-cookie.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-aff
          port: 3000
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainBackendPolicy
metadata:
  name: echo-aff-cookie-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-aff
  sessionPersistence:
    type: Cookie
    sessionName: SESSIONID
