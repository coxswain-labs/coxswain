# HTTPS Gateway with a RequestRedirect filter.
# Verifies that the redirect Location header uses the HTTPS scheme, not "http".
# Placeholders replaced at test runtime:
#   TESTNS        - test namespace
#   LISTENER_HOST - hostname for the HTTPS listener
#   SECRET_NAME   - kubernetes.io/tls Secret name
#   TLS_CRT_B64   - base64-encoded PEM cert
#   TLS_KEY_B64   - base64-encoded PEM key
---
apiVersion: v1
kind: Secret
metadata:
  name: SECRET_NAME
type: kubernetes.io/tls
data:
  tls.crt: TLS_CRT_B64
  tls.key: TLS_KEY_B64
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-tls-redirect
spec:
  gatewayClassName: coxswain
  listeners:
    - name: https
      port: HTTPS_PORT
      protocol: HTTPS
      hostname: "LISTENER_HOST"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: SECRET_NAME
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-redirect-route
spec:
  parentRefs:
    - name: coxswain-tls-redirect
  hostnames:
    - "LISTENER_HOST"
  rules:
    # Redirect rule — returns 302 with a new path; no backend needed.
    - matches:
        - path:
            type: Exact
            value: /tls-redirect
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 302
            path:
              type: ReplaceFullPath
              replaceFullPath: /tls-redirected

    # Probe rule — used by wait_for_https_route to detect when the route is live.
    - matches:
        - path:
            type: Exact
            value: /tls-redirect/probe
      backendRefs:
        - name: echo-a
          port: 3000
