# cert-manager Gateway API TLS fixture.
# Uses a Certificate resource (rather than the Gateway annotation shim) so the
# test does not require cert-manager's optional Gateway API integration feature
# gate.  cert-manager provisions the kubernetes.io/tls Secret directly from the
# Certificate; Coxswain hot-loads it via its Secret watch.
# Placeholders replaced at test runtime:
#   TESTNS            - test namespace
#   LISTENER_HOSTNAME - hostname for the HTTPS listener and HTTPRoute
#   SECRET_NAME       - name of the kubernetes.io/tls Secret cert-manager creates
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-tls-cert
spec:
  secretName: SECRET_NAME
  issuerRef:
    name: coxswain-e2e-selfsigned
    kind: ClusterIssuer
  dnsNames:
    - LISTENER_HOSTNAME
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-cert-manager-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: https
      port: GATEWAY_HTTPS_PORT
      protocol: HTTPS
      hostname: "LISTENER_HOSTNAME"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: SECRET_NAME
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cert-manager-route
spec:
  parentRefs:
    - name: coxswain-cert-manager-test
  hostnames:
    - "LISTENER_HOSTNAME"
  rules:
    - backendRefs:
        - name: echo-a
          port: 3000
