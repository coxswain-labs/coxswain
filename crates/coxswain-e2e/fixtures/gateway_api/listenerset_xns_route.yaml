---
# GEP-1713 `ListenerSetAllowedRoutesCrossNamespace` (#515), primary namespace side.
#
# A ListenerSet with two listeners on different ports: `ls-same` defaults its
# `allowedRoutes.namespaces` to `Same` (the ListenerSet's OWN namespace, not the
# parent Gateway's — see `listener_merge.rs::ls_route_namespaces`), and `ls-all`
# widens it to `All`. Pair with `listenerset_xns_tenant.yaml` applied to a
# SEPARATE namespace: a route attaching to `ls-same` from that tenant namespace
# must be rejected; the same route attaching to `ls-all` must be accepted.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  allowedListeners:
    namespaces:
      from: Same
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: team-ls
spec:
  parentRef:
    name: coxswain-test
  listeners:
    - name: ls-same
      port: 8001
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: ls-all
      port: 8002
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
