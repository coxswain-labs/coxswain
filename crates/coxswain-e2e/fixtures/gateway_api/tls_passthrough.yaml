# TLS-passthrough Gateway + TLSRoute fixture for GEP-2643 / #70 e2e tests.
# The proxy peeks the ClientHello SNI and forwards the raw encrypted stream to
# the backend — no TLS termination at the proxy.
#
# Substitutions (via FixtureVars::with):
#   GATEWAY_TLS_PASSTHROUGH_PORT - port for the passthrough listener (8444)
#   PASSTHROUGH_HOSTNAME         - SNI hostname for the TLSRoute rule
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-passthrough-gw
  namespace: ${TESTNS}
spec:
  gatewayClassName: coxswain
  listeners:
    - name: tls-passthrough
      port: ${GATEWAY_TLS_PASSTHROUGH_PORT}
      protocol: TLS
      hostname: "${PASSTHROUGH_HOSTNAME}"
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: TLSRoute
metadata:
  name: tls-passthrough-route
  namespace: ${TESTNS}
spec:
  parentRefs:
    - name: coxswain-passthrough-gw
      namespace: ${TESTNS}
  hostnames:
    - "${PASSTHROUGH_HOSTNAME}"
  rules:
    - backendRefs:
        - name: echo-tls
          port: 8443
