# CoxswainBackendPolicy connect-timeout fixture (#354).
#
# A Service with NO selector, backed by a hand-written EndpointSlice whose single
# address is 192.0.2.1 (RFC 5737 TEST-NET-1 — guaranteed never routable). A TCP
# connect to it black-holes: the SYN is dropped, so connect() hangs until a timeout
# fires (never ECONNREFUSED, which would be instant and bypass the connect phase).
#
# A CoxswainBackendPolicy attached to the Service sets spec.timeouts.connect: 500ms.
# With it, the proxy abandons the TCP-connect after 500ms and returns 502
# (ConnectTimedout). Without it the connect would hang past the test client's budget
# and no clean 502 would ever return — so the prompt 502 IS the proof the policy's
# connect timeout reached the Gateway-API upstream.
#
# Route: backend-policy-connect.TESTNS.local / -> blackhole:80 (192.0.2.1, black-holed)
---
apiVersion: v1
kind: Service
metadata:
  name: blackhole
spec:
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: blackhole-manual
  labels:
    kubernetes.io/service-name: blackhole
addressType: IPv4
ports:
  - port: 80
endpoints:
  - addresses:
      - 192.0.2.1
    conditions:
      ready: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-policy-connect-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "backend-policy-connect.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: blackhole
          port: 80
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainBackendPolicy
metadata:
  name: blackhole-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: blackhole
  timeouts:
    connect: "500ms"
