# Gateway backend client-certificate (GEP-3155, #87): cross-namespace ref
# (certs namespace side, Secret ONLY — deliberately no ReferenceGrant).
#
# Pairs with backend_client_cert_cross_ns.yaml (the referencing Gateway) and
# backend_client_cert_grant.yaml (the grant, applied separately so a test can
# prove the grant toggle ALONE flips the data-plane behaviour).
#
# Placeholders:
#   SECRET_NAME     — name of the client-cert Secret
#   CLIENT_CERT_B64 — base64-encoded PEM of the client certificate (tls.crt)
#   CLIENT_KEY_B64  — base64-encoded PEM of the client private key (tls.key)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${SECRET_NAME}
type: kubernetes.io/tls
data:
  tls.crt: ${CLIENT_CERT_B64}
  tls.key: ${CLIENT_KEY_B64}
