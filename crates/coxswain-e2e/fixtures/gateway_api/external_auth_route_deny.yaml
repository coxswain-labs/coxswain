# CoxswainExternalAuth ExtensionRef — deny path (#23). Apply backends::ECHO and
# backends::AUTH_STUB first.
#
# A CoxswainExternalAuth (HTTP transport) points at auth-deny:4001 (returns 403).
# An HTTPRoute references it via an ExtensionRef filter. The proxy runs the check,
# the auth service denies, and the proxy returns 403 — echo-a is never reached.
#
# Depends on backends::AUTH_STUB (auth-deny:4001 → 403) and backends::ECHO.
# Gateway: coxswain-extauth on GATEWAY_HTTP_PORT.
# Route host: gwextauthdeny.TESTNS.local, path / -> echo-a:3000 (never reached).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-extauth
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainExternalAuth
metadata:
  name: extauth-deny
spec:
  protocol: HTTP
  backendRef:
    name: auth-deny
    port: 4001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: extauth-deny-route
spec:
  parentRefs:
    - name: coxswain-extauth
  hostnames:
    - "gwextauthdeny.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: ExternalAuth
            name: extauth-deny
      backendRefs:
        - name: echo-a
          port: 3000
