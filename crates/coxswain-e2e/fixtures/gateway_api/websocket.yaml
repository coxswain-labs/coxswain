---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ws-gateway
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: HTTP_PORT
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ws-route
spec:
  parentRefs:
    - name: ws-gateway
  hostnames:
    - ws.TESTNS.local
  rules:
    - backendRefs:
        - name: ws-echo
          port: 8080
