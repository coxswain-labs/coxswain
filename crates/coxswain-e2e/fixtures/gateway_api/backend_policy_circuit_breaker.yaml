# CoxswainBackendPolicy circuit-breaker fixture (#478) — Gateway-API parity for
# the Ingress `circuit-breaker-*` annotation family.
#
# A CoxswainBackendPolicy attached to the go-httpbin Service sets spec.circuitBreaker
# with the same knobs as the Ingress fixture: threshold=50%, minRequests=4,
# window=500ms, openDuration=2s.
#
# window=500ms is sub-second on purpose: failsafe's EWMA time gate
# (elapsed_millis >= window.as_secs()*1000) is always satisfied because
# 500ms.as_secs()*1000 == 0, so the breaker can trip as soon as minRequests is met
# without sleeping in the test body. go-httpbin's /status/:code drives upstream codes.
#
# Shared by the open and recover tests.
# Route: backend-policy-breaker.TESTNS.local / -> go-httpbin:3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-test
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend-policy-breaker-route
spec:
  parentRefs:
    - name: coxswain-test
  hostnames:
    - "backend-policy-breaker.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: go-httpbin
          port: 3000
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainBackendPolicy
metadata:
  name: go-httpbin-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: go-httpbin
  circuitBreaker:
    threshold: 50
    window: "500ms"
    openDuration: "2s"
    minRequests: 4
