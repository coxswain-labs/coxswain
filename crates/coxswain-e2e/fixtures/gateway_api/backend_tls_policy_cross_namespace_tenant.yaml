---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-tls-ca
data:
  ca.crt: |
    ${CA_PEM}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-ca
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: BackendTLSPolicy
      namespace: ${TESTNS}
  to:
    - group: ""
      kind: ConfigMap
      name: echo-tls-ca
