# JwtAuth ExtensionRef fixture (#441; apply backends::ECHO first).
#
# A JwtAuth CR carries an inline JWKS (one ES256 test key, kid=e2e-test-key);
# an HTTPRoute references it via an ExtensionRef filter. The proxy must:
#   * admit a request carrying a valid, signed, unexpired bearer token whose
#     iss matches, and forward the verified `sub` claim as `x-user-id`;
#   * reject a request with a missing/invalid/expired/wrong-issuer token
#     with 401 + WWW-Authenticate: Bearer.
#
# The matching PRIVATE key lives only in the Rust test code
# (crates/coxswain-e2e/tests/security.rs `jwt_fixtures::sign_test_token`) —
# this fixture carries the public JWKS only.
#
# Gateway: coxswain-jwtauth on GATEWAY_HTTP_PORT.
# Route host: gwjwtauth.TESTNS.local, path / -> echo-a:3000.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-jwtauth
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: JwtAuth
metadata:
  name: jwtauth
spec:
  issuer: https://issuer.e2e.coxswain-labs.dev
  jwks:
    inline:
      jwks:
        keys:
          - kty: EC
            crv: P-256
            kid: e2e-test-key
            alg: ES256
            x: ScOuAzhxBbDIGzXwHlAcn0nHt8tE9OvqRHm3RIGQjk8
            "y": JiMe4KXWaBgWIBD1TTkwQdJNbLkO5AEiRQSdv8dbQyg
  claimToHeaders:
    - claim: sub
      header: x-user-id
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwtauth-route
spec:
  parentRefs:
    - name: coxswain-jwtauth
  hostnames:
    - "gwjwtauth.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.coxswain-labs.dev
            kind: JwtAuth
            name: jwtauth
      backendRefs:
        - name: echo-a
          port: 3000
