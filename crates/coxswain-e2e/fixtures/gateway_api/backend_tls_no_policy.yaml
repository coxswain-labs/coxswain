# Upstream-TLS-requires-BackendTLSPolicy fixture (#466).
# Gateway + HTTPRoute to the TLS-only echo backend (port 8443) with NO
# BackendTLSPolicy. The backend Service declares `appProtocol: https`, which used
# to originate upstream TLS — it no longer does (that path was removed: TLS comes
# only from a BackendTLSPolicy). So the proxy connects in CLEARTEXT to the TLS-only
# port and the request fails (502), proving appProtocol does not originate TLS.
#   * proxy HTTP listener port filled by Harness::apply.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: no-policy-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: no-policy-route
spec:
  parentRefs:
    - name: no-policy-gw
  hostnames:
    - no-policy.${TESTNS}.local
  rules:
    - backendRefs:
        - name: echo-tls
          port: 8443
