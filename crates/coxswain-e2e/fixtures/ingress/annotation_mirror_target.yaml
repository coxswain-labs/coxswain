# mirror-target annotation fixture (apply backends::ECHO first).
#
# The Ingress mirrors every request to echo-b while primary traffic reaches echo-a.
# max-body-size is set so body-buffering mode is active for POST requests.
# The proxy must:
#   * forward the primary request to echo-a (200, primary response visible to client), and
#   * asynchronously copy each request to echo-b (access-log mirror=true row appears).
#
# Host: mirror.TESTNS.local -> echo-a:3000 (primary); mirror -> echo-b.TESTNS.svc:3000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mirror-target-ingress
  annotations:
    ingress.coxswain-labs.dev/mirror-target: "echo-b.${TESTNS}.svc:3000"
    ingress.coxswain-labs.dev/max-body-size: "1k"
spec:
  ingressClassName: coxswain
  rules:
    - host: mirror.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
