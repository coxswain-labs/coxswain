# Per-class connect-timeout default via IngressClass.spec.parameters (#190).
#
# Proves the class-defaults merge is not rewrite-specific: a class-level
# connect-timeout reaches the data plane and shortens the connect deadline.
#
# Black-hole backend (192.0.2.1, RFC 5737 TEST-NET-1): the SYN is dropped so
# connect() hangs. With the class default connect-timeout 500ms the proxy gives
# up after 500ms and returns 502 — the prompt 502 is the proof the class default
# applied. The Ingress sets NO connect-timeout of its own.
#
# The IngressClass is cluster-scoped and uniquely named; the test wraps it in an
# IngressClassGuard. The namespace placeholder is substituted at apply time.
#
# Route: clstimeout.TESTNS.local / -> blackhole:80 (SYN black-holed)
---
apiVersion: ingress.coxswain-labs.dev/v1alpha1
kind: CoxswainIngressClassParameters
metadata:
  name: timeout-defaults
  namespace: ${TESTNS}
spec:
  defaultAnnotations:
    ingress.coxswain-labs.dev/connect-timeout: "500ms"
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: coxswain-clstimeout-${TESTNS}
spec:
  controller: coxswain-labs.dev/gateway-controller
  parameters:
    apiGroup: ingress.coxswain-labs.dev
    kind: CoxswainIngressClassParameters
    name: timeout-defaults
    namespace: ${TESTNS}
    scope: Namespace
---
apiVersion: v1
kind: Service
metadata:
  name: blackhole
spec:
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: blackhole-manual
  labels:
    kubernetes.io/service-name: blackhole
addressType: IPv4
ports:
  - port: 80
endpoints:
  - addresses:
      - 192.0.2.1
    conditions:
      ready: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clstimeout-ingress
spec:
  ingressClassName: coxswain-clstimeout-${TESTNS}
  rules:
    - host: clstimeout.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blackhole
                port:
                  number: 80
