# rate-limit fixture (#552) — byHeader field, paired with auth-basic-secret
# (#411 negative case).
#
# When a header-keyed RateLimit is paired with an auth annotation, the controller
# must NOT emit a Warning InvalidAnnotation Event (the auth layer prevents bypass).
#
# Uses auth-htpasswd-bcrypt-only (bcrypt credentials only) so no SHA1 advisory fires
# on top of the rate-limit check. Expects 401 on unauthenticated requests.
#
# Host: ratelimitheaderauth.TESTNS.local -> echo-a:3000.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: RateLimit
metadata:
  name: by-header-auth
spec:
  requestsPerSecond: 1
  byHeader: X-Api-Key
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limit-by-header-auth-ingress
  annotations:
    ingress.coxswain-labs.dev/rate-limit: "${TESTNS}/by-header-auth"
    ingress.coxswain-labs.dev/auth-basic-secret: "${TESTNS}/auth-htpasswd-bcrypt-only"
spec:
  ingressClassName: coxswain
  rules:
    - host: ratelimitheaderauth.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
