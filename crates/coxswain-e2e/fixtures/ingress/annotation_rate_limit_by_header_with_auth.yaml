# rate-limit-by header fixture that also sets auth-url (#411 negative case).
#
# When rate-limit-by: header:* is paired with an auth annotation, the controller
# must NOT emit a Warning InvalidAnnotation Event (the auth layer prevents bypass).
#
# Points auth-url at a non-existent service — this fixture tests event behaviour,
# not proxy traffic; the route is never exercised for traffic assertions.
#
# Host: ratelimitheaderauth.TESTNS.local -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limit-by-header-auth-ingress
  annotations:
    ingress.coxswain-labs.dev/rate-limit-rps: "1"
    ingress.coxswain-labs.dev/rate-limit-by: "header:X-Api-Key"
    ingress.coxswain-labs.dev/auth-url: "http://auth-stub.${TESTNS}.svc.cluster.local/allow"
spec:
  ingressClassName: coxswain
  rules:
    - host: ratelimitheaderauth.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
