# ssl-redirect annotation with TLS termination (HTTPS no-op verification).
# TESTNS is substituted with the test namespace.
# Requires: SECRET_NAME, TLS_CRT_B64, TLS_KEY_B64.
#
# HTTP:  ssl-redirect-tls.TESTNS.local / -> 308 (http port only)
# HTTPS: ssl-redirect-tls.TESTNS.local / -> 200 from echo-a (redirect not applied on TLS listener)
---
apiVersion: v1
kind: Secret
metadata:
  name: ${SECRET_NAME}
type: kubernetes.io/tls
data:
  tls.crt: ${TLS_CRT_B64}
  tls.key: ${TLS_KEY_B64}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ssl-redirect-tls-ingress
  annotations:
    ingress.coxswain-labs.dev/ssl-redirect: "true"
spec:
  ingressClassName: coxswain
  tls:
    - hosts:
        - ssl-redirect-tls.${TESTNS}.local
      secretName: ${SECRET_NAME}
  rules:
    - host: ssl-redirect-tls.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
