# VAP rejection fixture: invalid enum annotation value.
#
# `session-affinity: "invalid"` is not a valid enum member (valid values:
# cookie, header). The VAP must reject this Ingress at admission.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vap-reject-enum
  annotations:
    ingress.coxswain-labs.dev/session-affinity: "invalid"
spec:
  ingressClassName: coxswain
  rules:
    - host: vap-enum.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
