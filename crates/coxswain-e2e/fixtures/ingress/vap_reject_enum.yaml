# VAP rejection fixture: invalid enum annotation value.
#
# `path-normalize: "invalid"` is not a valid enum member (valid values: none,
# base, merge-slashes, decode-and-merge-slashes). The VAP must reject this
# Ingress at admission (retargeted from `session-affinity` after #554
# converged it to `CoxswainBackendPolicy`, which is not VAP-validated by
# design).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vap-reject-enum
  annotations:
    ingress.coxswain-labs.dev/path-normalize: "invalid"
spec:
  ingressClassName: coxswain
  rules:
    - host: vap-enum.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
