# basic-auth fixture pointing at the bcrypt-only htpasswd Secret.
#
# Used to verify that an Ingress using an auth-basic-secret with no SHA1 entries
# receives no InvalidAnnotation Warning Event (#412 negative case).
#
# Host: authbasicbcrypt.TESTNS.local / -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-basic-bcrypt-only-ingress
  annotations:
    ingress.coxswain-labs.dev/auth-basic-secret: "${TESTNS}/auth-htpasswd-bcrypt-only"
spec:
  ingressClassName: coxswain
  rules:
    - host: authbasicbcrypt.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
