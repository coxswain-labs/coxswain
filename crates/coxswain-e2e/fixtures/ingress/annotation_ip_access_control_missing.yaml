# ip-access-control fixture (#553 sad path) — apply backends::ECHO first. The
# annotation references an IpAccessControl CR that does not exist. Unlike the
# auth annotation family (ext-auth/auth-basic-secret/auth-jwt), a missing
# IpAccessControl CR must fail **open** — all requests pass through unfiltered.
#
# Host: iacmissing.TESTNS.local -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ip-access-control-missing-ingress
  annotations:
    ingress.coxswain-labs.dev/ip-access-control: "${TESTNS}/does-not-exist"
spec:
  ingressClassName: coxswain
  rules:
    - host: iacmissing.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
