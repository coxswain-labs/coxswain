# htpasswd Secret for basic-auth e2e tests.
#
# Must carry the ingress.coxswain-labs.dev/auth-basic: "true" label so the
# reflector's label-scoped watcher picks it up. Without the label the proxy
# fails closed with 503 (see annotation_auth_basic_unlabeled.yaml for that
# negative test).
#
# Credentials (password "secret" for both):
#   alice  bcrypt  ($2y$04$...) — tested by request_allowed_when_basic_auth_bcrypt_credential_valid
#   bob    SHA1    ({SHA}...) — tested by request_allowed_when_basic_auth_sha1_credential_valid
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-htpasswd
  labels:
    ingress.coxswain-labs.dev/auth-basic: "true"
type: Opaque
data:
