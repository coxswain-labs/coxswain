# Ingress with load-balance: ip_hash, routing to the two-replica echo Service (#275).
# A fixed client IP (the test runner) must consistently hash to the same endpoint,
# so all sequential requests land on the same pod.
# Apply backends::ECHO_TWO_REPLICAS before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lb-iphash
  annotations:
    ingress.coxswain-labs.dev/load-balance: "ip_hash"
spec:
  ingressClassName: coxswain
  rules:
    - host: lb.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-two-replicas
                port:
                  number: 3000
