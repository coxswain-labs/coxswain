# circuit-breaker-threshold VAP fixture (#29).
#
# The `circuit-breaker-threshold` annotation carries a non-numeric value. The
# VAP rejects the Ingress at admission time — exercises the general
# ">= 1 positive integer" VAP rule shape (retargeted from rate-limit-rps
# after #552 converged rate-limit to a CR reference with no VAP rule).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: circuit-breaker-threshold-invalid-ingress
  annotations:
    ingress.coxswain-labs.dev/circuit-breaker-threshold: "notanumber"
spec:
  ingressClassName: coxswain
  rules:
    - host: cbthresholdinvalid.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
