# trust-forwarded-for annotation fixture (apply backends::ECHO first).
#
# The Ingress trusts X-Forwarded-For and restricts access to forwarded clients
# in 203.0.113.0/24. With trust-forwarded-for enabled the proxy uses the first
# non-private IP from the header as the effective client IP for allow-source-range.
#
# e2e drives the L4 peer via the PROXY protocol so tests control both the L4 addr
# and the forwarded header independently.
#
# Host: trustfwd.TESTNS.local -> echo-a:3000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trust-forwarded-for-ingress
  annotations:
    ingress.coxswain-labs.dev/trust-forwarded-for: "true"
    ingress.coxswain-labs.dev/allow-source-range: "203.0.113.0/24"
spec:
  ingressClassName: coxswain
  rules:
    - host: trustfwd.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
