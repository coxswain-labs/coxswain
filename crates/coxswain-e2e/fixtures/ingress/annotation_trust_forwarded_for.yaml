# trust-forwarded-for annotation fixture, WITHOUT forwarded-for-trusted-cidrs
# (apply backends::ECHO first).
#
# trust-forwarded-for is enabled but no trusted proxy CIDRs are configured, so the
# proxy is fail-closed: it trusts NO peer and ignores the forwarded header entirely,
# using the L4 peer address as the effective client IP for ip-access-control. This
# fixture exercises that fail-closed behaviour; the trusted-cidrs happy path lives in
# annotation_trust_forwarded_for_cidrs.yaml.
#
# e2e drives the L4 peer via the PROXY protocol so tests control both the L4 addr
# and the forwarded header independently.
#
# Host: trustfwd.TESTNS.local -> echo-a:3000.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: IpAccessControl
metadata:
  name: trustfwd-allow
spec:
  allow:
    - 203.0.113.0/24
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trust-forwarded-for-ingress
  annotations:
    ingress.coxswain-labs.dev/trust-forwarded-for: "true"
    ingress.coxswain-labs.dev/ip-access-control: "${TESTNS}/trustfwd-allow"
spec:
  ingressClassName: coxswain
  rules:
    - host: trustfwd.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
