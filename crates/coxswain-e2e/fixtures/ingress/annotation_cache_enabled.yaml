# cache-enabled annotation fixture (apply backends::ECHO first).
#
# Opts the route into RFC 7234 response caching and injects a response
# Cache-Control via the response-header-set annotation so the echo backend's
# replies are admitted to (or excluded from) the cache. The CACHE_CONTROL value
# is templated so one fixture covers both the cacheable (max-age) and
# non-cacheable (no-store) cases.
#
# The proxy must:
#   * serve the second identical GET from cache (an Age header appears), and
#   * never cache when the injected directive is no-store, and
#   * bypass the cache for requests carrying Authorization.
#
# Host: cache.TESTNS.local -> echo-a:3000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cache-ingress
  annotations:
    ingress.coxswain-labs.dev/cache-enabled: "true"
    ingress.coxswain-labs.dev/response-header-set: "Cache-Control: ${CACHE_CONTROL}"
spec:
  ingressClassName: coxswain
  rules:
    - host: cache.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
