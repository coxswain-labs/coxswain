# htpasswd Secret with bcrypt-only credentials.
#
# Carries ingress.coxswain-labs.dev/auth-basic: "true" so the reflector picks it up.
# Contains alice (bcrypt only) — no SHA1 entries.
# Used to verify that a bcrypt-only secret emits no InvalidAnnotation Warning Event (#412).
#
# Credentials (password "secret"):
#   alice  bcrypt  ($2y$04$...)
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-htpasswd-bcrypt-only
  labels:
    ingress.coxswain-labs.dev/auth-basic: "true"
type: Opaque
data:
  auth: YWxpY2U6JDJ5JDA0JHdyUkZRU0NCZXpZTFR5V1hKS1dldXVPaHRGdWtyQWo3UHpQWXRRc09ORWg4ck9PampJTGFLCg==
