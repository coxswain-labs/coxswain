# compression fixture (#550 sad path): the annotation references a
# Compression CR that does not exist. Unlike the auth annotation family
# (ext-auth/auth-basic-secret/auth-jwt), a missing Compression CR must fail
# **open** — the route still serves 200, uncompressed, never 503.
#
# Host: compression-missing.TESTNS.local / -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compression-missing-ingress
  annotations:
    ingress.coxswain-labs.dev/compression: "${TESTNS}/does-not-exist"
spec:
  ingressClassName: coxswain
  rules:
    - host: compression-missing.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
