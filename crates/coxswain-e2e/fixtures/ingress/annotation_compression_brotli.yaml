apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compression-brotli-ingress
  annotations:
    ingress.coxswain-labs.dev/compression-gzip: "true"
    ingress.coxswain-labs.dev/compression-brotli: "true"
    ingress.coxswain-labs.dev/compression-min-size: "1"
spec:
  ingressClassName: coxswain
  rules:
    - host: compression-brotli.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
