# path-normalize: none fixture (hardened #483).
# `none` was dropped: it no longer disables normalization but falls back to the
# secure `base` floor, so the request path is still decoded / dot-segment
# removed before routing and forwarding.
#
# Route on pn-none.<namespace>.local:
#   /v1 → echo-a
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pn-none
  annotations:
    ingress.coxswain-labs.dev/path-normalize: none
spec:
  ingressClassName: coxswain
  rules:
    - host: pn-none.${TESTNS}.local
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
