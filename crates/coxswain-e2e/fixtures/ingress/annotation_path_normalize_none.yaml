# path-normalize: none fixture.
# Normalization is fully disabled: the raw request path is matched and
# forwarded without any decoding or dot-segment removal.
#
# Route on pn-none.<namespace>.local:
#   /v1 → echo-a
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pn-none
  annotations:
    ingress.coxswain-labs.dev/path-normalize: none
spec:
  ingressClassName: coxswain
  rules:
    - host: pn-none.${TESTNS}.local
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
