# Ingress with load-balance: hash:uri, routing to the two-replica echo Service (#276).
# Every request to the same URI must consistently hash to the same endpoint
# (HRW/rendezvous hashing), pinning it to one pod.
# Apply backends::ECHO_TWO_REPLICAS before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lb-hash-uri
  annotations:
    ingress.coxswain-labs.dev/load-balance: "hash:uri"
spec:
  ingressClassName: coxswain
  rules:
    - host: lb.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-two-replicas
                port:
                  number: 3000
