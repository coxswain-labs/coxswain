# ip-access-control fixture (#553): the annotation names an IpAccessControl CR
# with BOTH allow and deny set, to verify evaluation order (apply backends::ECHO first).
#
# The CR allows 203.0.113.0/24 but blocks 203.0.113.5/32 specifically.
# Deny is evaluated before allow, so a client in both the allow and deny ranges
# must be rejected with 403 (deny wins). A client in the allow range but not in
# the deny range must be admitted (200).
#
# Host: denyallow.TESTNS.local -> echo-a:3000.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: IpAccessControl
metadata:
  name: deny-and-allow
spec:
  allow:
    - 203.0.113.0/24
  deny:
    - 203.0.113.5/32
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deny-and-allow-source-range-ingress
  annotations:
    ingress.coxswain-labs.dev/ip-access-control: "${TESTNS}/deny-and-allow"
spec:
  ingressClassName: coxswain
  rules:
    - host: denyallow.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
