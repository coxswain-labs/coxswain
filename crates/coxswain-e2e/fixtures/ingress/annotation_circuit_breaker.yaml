# Circuit-breaker annotation e2e fixture (#282).
# Uses failsafe EWMA semantics: threshold=50% error rate, min-requests=4
# (must see 4 samples before evaluating), window=500ms, open-duration=2s.
#
# window=500ms is deliberate: failsafe's time gate requires elapsed_millis >=
# window.as_secs()*1000; with a sub-second window that product is 0, so the gate
# is always satisfied — the breaker can trip as soon as min-requests is met without
# sleeping in the test body.
#
# Annotation keys exercised (satisfies check-annotation-coverage.sh):
#   ingress.coxswain-labs.dev/circuit-breaker-threshold
#   ingress.coxswain-labs.dev/circuit-breaker-window
#   ingress.coxswain-labs.dev/circuit-breaker-open-duration
#   ingress.coxswain-labs.dev/circuit-breaker-min-requests
#   ingress.coxswain-labs.dev/circuit-breaker-max-open-duration
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: annotation-circuit-breaker
  annotations:
    kubernetes.io/ingress.class: coxswain
    ingress.coxswain-labs.dev/circuit-breaker-threshold: "50"
    ingress.coxswain-labs.dev/circuit-breaker-window: "500ms"
    ingress.coxswain-labs.dev/circuit-breaker-open-duration: "2s"
    ingress.coxswain-labs.dev/circuit-breaker-min-requests: "4"
spec:
  rules:
    - host: breaker.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-httpbin
                port:
                  number: 3000
