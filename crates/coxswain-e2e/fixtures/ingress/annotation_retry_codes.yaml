# retry fixture (#551, formerly #445's inline retry-attempts/retry-codes/
# retry-backoff cluster) — apply backends::GO_HTTPBIN first.
#
# attempts:2 + codes:[503] + backoff:200ms against go-httpbin, whose /status/503
# always returns 503. The proxy fires two retries (each after the 200ms
# backoff) before the final 503 — observable via the retry metric and elapsed
# time. TESTNS is substituted with the test namespace.
#
# Route: ingretry.TESTNS.local / -> go-httpbin:3000
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: RetryPolicy
metadata:
  name: retry-codes
spec:
  attempts: 2
  codes: [503]
  backoff: 200ms
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retry-codes-ingress
  annotations:
    ingress.coxswain-labs.dev/retry: "${TESTNS}/retry-codes"
spec:
  ingressClassName: coxswain
  rules:
    - host: ingretry.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: go-httpbin
                port:
                  number: 3000
