# Routing-conflict fixture for the /api/v1/problems route-identity test.
# Two distinct Ingresses claim the same host+path (conflict.TESTNS.local/), so
# one is shadowed and recorded as a conflict (with the rejected route's identity).
# Both point at echo-a so the winning rule serves 200 (lets the test know the
# table is built). TESTNS is substituted at runtime. Requires backends::ECHO.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conflict-a
spec:
  ingressClassName: coxswain
  rules:
    - host: conflict.TESTNS.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conflict-b
spec:
  ingressClassName: coxswain
  rules:
    - host: conflict.TESTNS.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
