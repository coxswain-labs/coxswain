# Routing-conflict fixture for the /api/v1/problems route-identity test.
# A "/shadow" prefix rule fully shadows a "/shadow/" prefix rule (the latter's
# matchit patterns collide with the former), so the "/shadow/" rule is silently
# dropped and recorded as a conflict. Both rules point at echo-a so the winning
# rule serves 200 (lets the test know the table is built). TESTNS is substituted
# at runtime. Requires backends::ECHO (echo-a) applied first.
#
# conflict.TESTNS.local /shadow  → echo-a   (winner, serves 200)
# conflict.TESTNS.local /shadow/ → echo-a   (shadowed → conflict)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conflict-ingress
spec:
  ingressClassName: coxswain
  rules:
    - host: conflict.TESTNS.local
      http:
        paths:
          - path: /shadow
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
          - path: /shadow/
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
