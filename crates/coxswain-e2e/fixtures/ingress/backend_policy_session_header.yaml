# CoxswainBackendPolicy sessionPersistence: Header fixture (#554, converged from
# the former session-affinity/session-header Ingress annotations).
#
# One Service with three pods. The value of X-Session-Id is rendezvous-hashed
# over the live endpoints to consistently pick one pod; no cookie is ever set.
# A request without the header round-robins.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-aff
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-aff
  template:
    metadata:
      labels:
        app: echo-aff
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: echo
          image: ${ECHO_IMAGE}
          ports:
            - containerPort: 3000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: echo-aff
spec:
  selector:
    app: echo-aff
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: affinity-header
spec:
  ingressClassName: coxswain
  rules:
    - host: affinity.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-aff
                port:
                  number: 3000
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainBackendPolicy
metadata:
  name: echo-aff-header-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-aff
  sessionPersistence:
    type: Header
    sessionName: X-Session-Id
