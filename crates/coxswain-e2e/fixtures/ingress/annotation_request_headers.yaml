# request-header-{set,add,remove} annotation fixture.
# TESTNS is substituted with the test namespace.
#
# Route: req-headers.TESTNS.local / -> echo-a
#   request-header-set:    X-Custom-Set: coxswain
#   request-header-add:    X-Custom-Add: appended
#   request-header-remove: X-Remove-Me (strips client-supplied header before forwarding)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: req-headers-ingress
  annotations:
    ingress.coxswain-labs.dev/request-header-set: "X-Custom-Set: coxswain"
    ingress.coxswain-labs.dev/request-header-add: "X-Custom-Add: appended"
    ingress.coxswain-labs.dev/request-header-remove: "X-Remove-Me"
spec:
  ingressClassName: coxswain
  rules:
    - host: req-headers.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
