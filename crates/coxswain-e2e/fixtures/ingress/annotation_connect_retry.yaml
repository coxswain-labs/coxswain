# connect-retry annotation fixture.
# A Service that selects echo-a pods but on port 9999 (not listening), so every
# upstream TCP connect attempt fails with ECONNREFUSED.
# max-retries: 2 means the proxy makes 3 total attempts before returning 502.
# TESTNS is substituted with the test namespace.
#
# Route: retry.TESTNS.local / → echo-a-wrongport:9999 (ECONNREFUSED)
---
apiVersion: v1
kind: Service
metadata:
  name: echo-a-wrongport
spec:
  selector:
    app: echo-a
  ports:
    - port: 9999
      targetPort: 9999
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retry-ingress
  annotations:
    ingress.coxswain-labs.dev/max-retries: "2"
    ingress.coxswain-labs.dev/retry-on: connect-failure
spec:
  ingressClassName: coxswain
  rules:
    - host: retry.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a-wrongport
                port:
                  number: 9999
