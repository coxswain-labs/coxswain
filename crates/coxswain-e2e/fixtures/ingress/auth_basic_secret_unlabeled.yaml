# Unlabeled htpasswd Secret for the fail-closed e2e test.
#
# This Secret intentionally omits the ingress.coxswain-labs.dev/auth-basic:
# "true" label, so the reflector's label-scoped watcher never includes it in
# the auth_secrets store. When the Ingress references it via auth-basic-secret,
# the reconciler resolves it as IngressAuthConfig::Unavailable and the proxy
# returns 503 (fail-closed). This documents the least-privilege invariant:
# the proxy does not broaden its Secret watch to all Secrets in the cluster.
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-htpasswd-unlabeled
type: Opaque
data:
  auth: YWxpY2U6JDJ5JDA0JHdyUkZRU0NCZXpZTFR5V1hKS1dldXVPaHRGdWtyQWo3UHpQWXRRc09ORWg4ck9PampJTGFLCg==
