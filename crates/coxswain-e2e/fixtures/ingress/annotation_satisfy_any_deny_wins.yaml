# satisfy:any + deny-source-range override fixture: deny-source-range always
# blocks regardless of satisfy mode or auth result.
#
# satisfy: any — but deny-source-range is checked first and always blocks.
# deny-source-range: 203.0.113.0/24 (the client IP falls inside — blocked).
# allow-source-range: 203.0.113.0/24 (would admit, but deny runs first).
# auth-url: auth-allow stub (would admit, but deny runs before auth).
#
# Host: satisfyanydenywin.TESTNS.local -> echo-a:3000 (never reached — 403).
# Apply backends::ECHO + backends::AUTH_STUB before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: satisfy-any-deny-wins-ingress
  annotations:
    ingress.coxswain-labs.dev/satisfy: "any"
    ingress.coxswain-labs.dev/deny-source-range: "203.0.113.0/24"
    ingress.coxswain-labs.dev/allow-source-range: "203.0.113.0/24"
    ingress.coxswain-labs.dev/auth-url: "http://auth-allow.${TESTNS}.svc.cluster.local:4000/"
spec:
  ingressClassName: coxswain
  rules:
    - host: satisfyanydenywin.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
