# rate-limit fixture (#552) — byHeader field, no auth annotation.
#
# The RateLimit CR keys the rate limit on the X-Rate-Key request header (1 req/s
# cap). When the header is absent the rate limiter must fail-open — all requests
# pass. The proxy must:
#   * serve requests that carry distinct X-Rate-Key values independently (each key gets
#     its own bucket), and
#   * serve all requests that lack X-Rate-Key, even at arbitrarily high rates (fail-open).
#
# Host: ratelimitheader.TESTNS.local -> echo-a:3000.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: RateLimit
metadata:
  name: by-header
spec:
  requestsPerSecond: 1
  byHeader: X-Rate-Key
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limit-by-header-ingress
  annotations:
    ingress.coxswain-labs.dev/rate-limit: "${TESTNS}/by-header"
spec:
  ingressClassName: coxswain
  rules:
    - host: ratelimitheader.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
