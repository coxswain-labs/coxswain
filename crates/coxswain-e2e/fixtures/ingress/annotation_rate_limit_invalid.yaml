# rate-limit-rps invalid annotation fixture (apply backends::ECHO first).
#
# The `rate-limit-rps` annotation carries a non-numeric value. The reflector must
# log a warning and fail-open — no rate limiting is applied and all traffic is served.
#
# Host: ratelimitinvalid.TESTNS.local -> echo-a:3000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limit-invalid-ingress
  annotations:
    ingress.coxswain-labs.dev/rate-limit-rps: "notanumber"
spec:
  ingressClassName: coxswain
  rules:
    - host: ratelimitinvalid.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
