# satisfy:any + auth-deny fixture: IP in-range admits despite auth denying; IP
# out-of-range is denied when auth also denies (both gates fail).
#
# satisfy: any — allow IP *or* auth; deny only if both fail.
# allow-source-range: 203.0.113.0/24 (drives the IP allow gate).
# auth-url: auth-deny stub (always returns 403).
#
# Host: satisfyanydeny.TESTNS.local -> echo-a:3000.
# Apply backends::ECHO + backends::AUTH_STUB before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: satisfy-any-authdeny-ingress
  annotations:
    ingress.coxswain-labs.dev/satisfy: "any"
    ingress.coxswain-labs.dev/allow-source-range: "203.0.113.0/24"
    ingress.coxswain-labs.dev/auth-url: "http://auth-deny.${TESTNS}.svc.cluster.local:4001/"
spec:
  ingressClassName: coxswain
  rules:
    - host: satisfyanydeny.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
