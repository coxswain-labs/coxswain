# auth-response-headers fixture: on allow, proxy copies X-Auth-User from the
# auth response onto the upstream request.
#
# auth-allow returns X-Auth-User: testuser. The annotation lists it in
# auth-response-headers, so the proxy injects it into the upstream request.
# echo-a reflects all request headers in its JSON body — the test asserts
# that body.headers["x-auth-user"] == "testuser".
#
# Host: authhdr.TESTNS.local / -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-hdrs-ingress
  annotations:
    ingress.coxswain-labs.dev/auth-url: "http://auth-allow.${TESTNS}.svc.cluster.local:4000/"
    ingress.coxswain-labs.dev/auth-response-headers: "X-Auth-User"
spec:
  ingressClassName: coxswain
  rules:
    - host: authhdr.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
