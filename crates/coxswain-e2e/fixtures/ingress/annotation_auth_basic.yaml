# basic-auth fixture: auth-basic-secret points at the labeled htpasswd Secret.
#
# Requests with valid Authorization: Basic credentials reach echo-a (200).
# Requests with invalid credentials receive 401 + WWW-Authenticate.
# Requests with no credentials receive 401 + WWW-Authenticate.
#
# Credential encoding (password "secret"):
#   alice:secret  -> Authorization: Basic YWxpY2U6c2VjcmV0
#   bob:secret    -> Authorization: Basic Ym9iOnNlY3JldA==
#
# Host: authbasic.TESTNS.local / -> echo-a:3000 (reached on allow).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-basic-ingress
  annotations:
    ingress.coxswain-labs.dev/auth-basic-secret: "${TESTNS}/auth-htpasswd"
spec:
  ingressClassName: coxswain
  rules:
    - host: authbasic.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
