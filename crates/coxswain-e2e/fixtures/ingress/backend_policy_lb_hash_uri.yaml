# CoxswainBackendPolicy loadBalancer.algorithm: hash:uri fixture (#554), routing
# to the two-replica echo Service. Every request to the same URI must
# consistently hash to the same endpoint (HRW/rendezvous hashing), pinning it
# to one pod. Apply backends::ECHO_TWO_REPLICAS before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lb-hash-uri
spec:
  ingressClassName: coxswain
  rules:
    - host: lb.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-two-replicas
                port:
                  number: 3000
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainBackendPolicy
metadata:
  name: echo-two-replicas-hash-uri-policy
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: echo-two-replicas
  loadBalancer:
    algorithm: "hash:uri"
