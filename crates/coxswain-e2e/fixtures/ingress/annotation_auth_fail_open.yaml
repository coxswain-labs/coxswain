# ext_authz fail-open fixture (#23): ext-auth-backend points at slow-echo (never
# responds), so the auth check times out after 500ms.  ext-auth-fail-closed:
# "false" makes the proxy fail OPEN — the request proceeds to echo-a unauthorized
# instead of returning 503.  Contrast with annotation_auth_timeout.yaml, which
# omits the flag and fails closed (503).
#
# Depends on backends::SLOW_ECHO (slow-echo:3000, never responds) and
# backends::ECHO (echo-a:3000).
#
# Host: authfailopen.TESTNS.local / -> echo-a:3000 (reached: auth failed open).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-fail-open-ingress
  annotations:
    ingress.coxswain-labs.dev/ext-auth-backend: "slow-echo:3000"
    ingress.coxswain-labs.dev/ext-auth-timeout: "500ms"
    ingress.coxswain-labs.dev/ext-auth-fail-closed: "false"
spec:
  ingressClassName: coxswain
  rules:
    - host: authfailopen.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
