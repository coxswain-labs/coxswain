# Ingress with an unknown load-balance value (#275, #29 VAP).
# The VAP must reject this at admission time; no backend setup needed.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lb-unknown
  annotations:
    ingress.coxswain-labs.dev/load-balance: "bogus"
spec:
  ingressClassName: coxswain
  rules:
    - host: lb.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-two-replicas
                port:
                  number: 3000
