# CA Secret for per-Ingress client-certificate mTLS e2e tests (#267).
#
# Must carry the ingress.coxswain-labs.dev/auth-tls=true label so the reflector's
# label-scoped watcher picks it up.  Without the label the proxy fails closed
# (ClientCertConfigState::Unavailable) for every Ingress that references it via
# ingress.coxswain-labs.dev/auth-tls-secret, and every TLS handshake to that
# host is aborted.
#
# Placeholder: CA_CRT_B64 — base64-encoded PEM of the CA certificate (ca.crt key).
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-tls-ca
  labels:
    ingress.coxswain-labs.dev/auth-tls: "true"
type: Opaque
data:
  ca.crt: ${CA_CRT_B64}
