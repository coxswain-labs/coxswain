# Ingress with load-balance: hash:header=x-hash-key, routing to the two-replica echo
# Service (#276). Requests carrying the same X-Hash-Key value must consistently hash
# to the same endpoint; requests without the header fall back to round-robin.
# Apply backends::ECHO_TWO_REPLICAS before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lb-hash-header
  annotations:
    ingress.coxswain-labs.dev/load-balance: "hash:header=x-hash-key"
spec:
  ingressClassName: coxswain
  rules:
    - host: lb.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-two-replicas
                port:
                  number: 3000
