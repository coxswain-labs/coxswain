# deny-source-range annotation fixture (apply backends::ECHO first).
#
# The Ingress blocks access from clients in 203.0.113.0/24. The proxy must:
#   * reject a request whose real client IP is in-range with 403, and
#   * serve a request whose real client IP is out-of-range (echo backend identity, 200).
#
# e2e drives the real client IP via the PROXY protocol (the in-cluster LB NATs the
# L4 peer), so these tests run with --proxy-accept-proxy-protocol and a permissive
# trusted-sources CIDR.
#
# Host: denyrange.TESTNS.local -> echo-a:3000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deny-source-range-ingress
  annotations:
    ingress.coxswain-labs.dev/deny-source-range: "203.0.113.0/24"
spec:
  ingressClassName: coxswain
  rules:
    - host: denyrange.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
