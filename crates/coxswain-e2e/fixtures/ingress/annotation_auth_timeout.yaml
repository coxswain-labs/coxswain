# ext_authz timeout fixture: auth-url points at slow-echo (never responds).
#
# auth-timeout: 500ms — the proxy gives up on the auth sub-request after
# 500ms and returns 503 (fail-closed). echo-a is never reached.
#
# Depends on backends::SLOW_ECHO being applied first (creates slow-echo Service
# on port 3000 — accepts TCP connections but never sends any response).
#
# Host: authtimeout.TESTNS.local / -> echo-a:3000 (never reached; auth 503 fires).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-timeout-ingress
  annotations:
    ingress.coxswain-labs.dev/auth-url: "http://slow-echo.${TESTNS}.svc.cluster.local:3000/"
    ingress.coxswain-labs.dev/auth-timeout: "500ms"
spec:
  ingressClassName: coxswain
  rules:
    - host: authtimeout.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
