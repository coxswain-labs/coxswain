# Invalid session-cookie-name fixture for the Warning Event test (#401).
#
# `session-cookie-name: "bad;name"` is not a valid RFC 6265 cookie token
# (semicolon is a separator character). The controller falls back to the default
# cookie name and emits a Warning InvalidAnnotation Event on the Ingress. The
# route still serves (fail-open). This annotation is not in the VAP, so the
# apply succeeds and the runtime diagnostics path is exercised.
#
# Requires backends::ECHO.
# Host: affinity-bad.TESTNS.local → echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: session-cookie-invalid-ingress
  annotations:
    ingress.coxswain-labs.dev/session-affinity: "cookie"
    ingress.coxswain-labs.dev/session-cookie-name: "bad;name"
spec:
  ingressClassName: coxswain
  rules:
    - host: affinity-bad.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
