# satisfy:any + auth-allow fixture: IP out-of-range is still admitted because
# the auth stub returns 200 (either gate passing is sufficient).
#
# satisfy: any — allow IP *or* auth; deny only if both fail.
# allow-source-range: 203.0.113.0/24 (IP gate will fail for out-of-range clients).
# auth-url: auth-allow stub (always returns 200).
#
# Host: satisfyanyallow.TESTNS.local -> echo-a:3000.
# Apply backends::ECHO + backends::AUTH_STUB before this fixture.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: satisfy-any-authallow-ingress
  annotations:
    ingress.coxswain-labs.dev/satisfy: "any"
    ingress.coxswain-labs.dev/allow-source-range: "203.0.113.0/24"
    ingress.coxswain-labs.dev/auth-url: "http://auth-allow.${TESTNS}.svc.cluster.local:4000/"
spec:
  ingressClassName: coxswain
  rules:
    - host: satisfyanyallow.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
