# rate-limit fixture (#552 sad path) — apply backends::ECHO first. The
# annotation references a RateLimit CR that does not exist. Unlike the auth
# annotation family (ext-auth/auth-basic-secret/auth-jwt), a missing RateLimit
# CR must fail **open** — all requests pass through unthrottled.
#
# Host: ratelimitmissing.TESTNS.local -> echo-a:3000.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-limit-missing-ingress
  annotations:
    ingress.coxswain-labs.dev/rate-limit: "${TESTNS}/does-not-exist"
spec:
  ingressClassName: coxswain
  rules:
    - host: ratelimitmissing.${TESTNS}.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 3000
