# Two-replica echo backend for ip_hash and fallback load-balance tests (#275).
# Uses the same echo-basic image as echo.yaml but with replicas: 2 so the Ingress
# has two distinct endpoints for consistent-hash pinning and round-robin spread tests.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-two-replicas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-two-replicas
  template:
    metadata:
      labels:
        app: echo-two-replicas
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: echo
          image: ${ECHO_IMAGE}
          ports:
            - containerPort: 3000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: echo-two-replicas
spec:
  selector:
    app: echo-two-replicas
  ports:
    - port: 3000
      targetPort: 3000
