# Standalone go-httpbin backend for circuit-breaker e2e tests (#282).
# Exposes /status/:code so tests can drive configurable HTTP status codes
# to the upstream — e.g. /status/500 to trip the circuit breaker and
# /status/200 to let the half-open probe succeed and close it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-httpbin
  template:
    metadata:
      labels:
        app: go-httpbin
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: go-httpbin
          image: ${GO_HTTPBIN_IMAGE}
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: go-httpbin
spec:
  selector:
    app: go-httpbin
  ports:
    - port: 3000
      targetPort: 3000
