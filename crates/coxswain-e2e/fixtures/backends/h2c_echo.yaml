# H2C echo backend for e2e tests.
# Uses the same gcr.io/k8s-staging-gateway-api/echo-basic image as the upstream
# Gateway API conformance suite. Port 3000 speaks HTTP/1.1; port 3001 speaks
# HTTP/2 cleartext (h2c, prior knowledge) and rejects non-h2c connections with
# "Expected h2c request". The Service declares appProtocol: kubernetes.io/h2c
# so Coxswain uses BackendProtocol::H2c and connects via h2c on port 3001.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: h2c-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: h2c-echo
  template:
    metadata:
      labels:
        app: h2c-echo
    spec:
      containers:
        - name: echo
          image: gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-v1.5.1
          ports:
            - containerPort: 3000
            - containerPort: 3001
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: h2c-echo
spec:
  selector:
    app: h2c-echo
  ports:
    - port: 3001
      targetPort: 3001
      appProtocol: kubernetes.io/h2c
