# A "black-hole" backend for timeout e2e tests.
# Accepts TCP connections on port 3000 but never sends any HTTP response,
# so Pingora's upstream read_timeout fires deterministically.
#
# Uses busybox nc with -lk (persistent server) and -e /bin/sleep 30:
# each accepted connection is handed off to "sleep 30", which keeps the socket
# open for 30 s without writing any data.  This prevents the early-EOF that the
# plain "nc -l | while true" loop produces (nc closes its write side as soon as
# its stdin hits EOF, giving Pingora a ConnectionClosed instead of ReadTimedout).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-echo
  template:
    metadata:
      labels:
        app: slow-echo
    spec:
      containers:
        - name: slow-echo
          image: ${BUSYBOX_IMAGE}
          command:
            - /bin/sh
            - -c
            - "nc -lk -p 3000 -e /bin/sleep 30"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: slow-echo
spec:
  selector:
    app: slow-echo
  ports:
    - port: 3000
      targetPort: 3000
