# TLS echo backend for BackendTLSPolicy e2e tests.
# Uses the same gcr.io/k8s-staging-gateway-api/echo-basic image as the upstream
# Gateway API conformance suite. The image listens on HTTPS port 8443 when
# TLS_SERVER_CERT and TLS_SERVER_PRIVKEY point to certificate/key files
# (see conformance/echo-basic/echo-basic.go — the vars are file paths, not PEM).
#
# Substitutions (see tests applying backends::ECHO_TLS):
#   * base64-encoded server certificate PEM (single-line, no wrapping)
#   * base64-encoded server private key PEM (single-line, no wrapping)
#
# Applied per-test-namespace via apply_fixture(backends::ECHO_TLS, &vars).
---
apiVersion: v1
kind: Secret
metadata:
  name: echo-tls-creds
type: Opaque
data:
  tls.crt: TLS_SERVER_CERT_B64
  tls.key: TLS_SERVER_KEY_B64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-tls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-tls
  template:
    metadata:
      labels:
        app: echo-tls
    spec:
      containers:
        - name: echo
          image: gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-v1.5.1
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 8443
              name: https
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TLS_SERVER_CERT
              value: /certs/tls.crt
            - name: TLS_SERVER_PRIVKEY
              value: /certs/tls.key
          volumeMounts:
            - name: tls-creds
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-creds
          secret:
            secretName: echo-tls-creds
---
apiVersion: v1
kind: Service
metadata:
  name: echo-tls
spec:
  selector:
    app: echo-tls
  ports:
    - port: 8443
      targetPort: 8443
      name: https
      appProtocol: https
