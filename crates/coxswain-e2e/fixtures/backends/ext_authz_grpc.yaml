# Envoy gRPC ext_authz backend for #23 e2e (Istio's ext-authz sample server).
#
# The server exposes two check endpoints:
#   :8000 — HTTP ext_authz
#   :9000 — gRPC ext_authz (envoy.service.auth.v3.Authorization/Check)
# A request is ALLOWED iff it carries the header `x-ext-authz: allow`; any other
# value (or absence) is DENIED with 403 / PermissionDenied.
#
# The CoxswainExternalAuth in the test fixtures points at ext-authz-grpc:9000 with
# protocol: GRPC. Tests drive allow vs deny by setting/omitting the x-ext-authz
# header on the client request.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-authz-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-authz-grpc
  template:
    metadata:
      labels:
        app: ext-authz-grpc
    spec:
      containers:
        - name: ext-authz
          image: ${EXT_AUTHZ_IMAGE}
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 9000
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 1
            periodSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: ext-authz-grpc
spec:
  selector:
    app: ext-authz-grpc
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 9000
      targetPort: 9000
