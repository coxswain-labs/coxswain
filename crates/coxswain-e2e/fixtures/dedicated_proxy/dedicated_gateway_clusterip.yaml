# Dedicated-mode Gateway with `serviceType: ClusterIP` (#211 Scenario A).
#
# Mirrors `dedicated_gateway.yaml` (same listener / labels / annotations).
# No `image` override: the operator renders the real coxswain image, which
# the harness preloads into the cluster. Programmed=True requires the
# dedicated proxy to connect to discovery and report its listener ports
# bound (#531), so a stub container that merely reaches Ready can never
# converge — tests gating on Programmed need a live proxy.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: 8100
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
