# CoxswainRelayPolicy (#589) that force-disables the namespace relay, vetoing the
# automatic break-even provisioning even when the threshold is met. Namespaced: it
# lives in the test namespace and governs only that namespace's relay.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainRelayPolicy
metadata:
  name: e2e-relay-force-off
  namespace: ${TESTNS}
spec:
  enabled: false
