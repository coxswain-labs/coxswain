# CoxswainRelayPolicy (#589) that force-enables the namespace relay and overrides
# its replica count. Namespaced: it lives in the test namespace and governs only
# that namespace's relay, so it can never affect a sibling test's namespace.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainRelayPolicy
metadata:
  name: e2e-relay-force-on
  namespace: ${TESTNS}
spec:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: 25m
      memory: 48Mi
