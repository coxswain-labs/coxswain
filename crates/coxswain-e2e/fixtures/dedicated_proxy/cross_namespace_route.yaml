# Cross-namespace HTTPRoute fixture (primary namespace side) for the
# `dedicated_gateway` suite. The Gateway runs in TESTNS in dedicated mode;
# the HTTPRoute targets a backend Service in TENANTNS, which only resolves
# when the matching `ReferenceGrant` from cross_namespace_tenant.yaml is
# present.
# TESTNS   = primary namespace (Gateway + HTTPRoute)
# TENANTNS = tenant namespace (backend + ReferenceGrant)
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: NodePort
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-route
spec:
  parentRefs:
    - name: dedicated-gw
  hostnames:
    - "cross-ns.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-d
          namespace: ${TENANTNS}
          port: 3000
