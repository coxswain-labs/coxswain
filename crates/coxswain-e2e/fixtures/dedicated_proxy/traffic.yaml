# Dedicated-mode Gateway + HTTPRoute backing the same-namespace echo Services
# from `fixtures/backends/echo.yaml`. The dedicated subprocess spawned by the
# test binds GATEWAY_HTTP_PORT once the controller flips
# `DedicatedProxyReady=True` and the shared subprocess releases the listener.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: NodePort
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: GATEWAY_HTTP_PORT
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: dedicated-gw
  hostnames:
    - "dedicated.TESTNS.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-a
          port: 3000
