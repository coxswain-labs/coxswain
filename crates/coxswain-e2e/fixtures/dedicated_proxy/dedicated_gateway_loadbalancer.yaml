# Dedicated-mode Gateway with `serviceType: LoadBalancer` (#211 Scenario B).
# Local clusters (kind/Orb) don't run an LB controller, so the rendered
# Service stays `<pending>` for an LB IP — the e2e harness patches
# `Service.status.loadBalancer.ingress` manually to simulate the LB
# controller and verify Gateway.status.addresses + Programmed transitions.
#
# `image` is pinned to the upstream pause container so the Pod transitions
# to Ready immediately regardless of which coxswain build is cached. This
# test only exercises the operator's status writer — the rendered proxy
# never serves traffic — so a no-op container is the cleanest stub. Same
# story in `dedicated_gateway_clusterip.yaml`.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: LoadBalancer
  image: ${PAUSE_IMAGE}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: 8100
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
