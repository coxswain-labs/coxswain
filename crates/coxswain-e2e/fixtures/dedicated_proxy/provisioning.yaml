# Dedicated-mode Gateway scoped to a single ClusterIP Service for the
# `dedicated_gateway` lifecycle suite.
#
# No `image` override: the operator renders the real coxswain image. The
# controller-side lifecycle (status conditions, address assignment, GC)
# is what these tests exercise, but Programmed gates on the dedicated
# proxy's bound-port report over discovery (#531), so the pod must run a
# live proxy — a stub container never converges. Traffic flow through
# the dedicated pod is covered separately by `traffic.yaml`.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
