# Mode-migration starting point (shared → dedicated). The Gateway has no
# `infrastructure.parametersRef`, so the shared proxy subprocess serves its
# routes on the `GATEWAY_HTTP_PORT` listener. The test patches in a
# parametersRef pointing at the `dedicated-params` object below to drive the
# cutover.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: NodePort
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: dedicated-gw
  hostnames:
    - "migrate.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-a
          port: 3000
