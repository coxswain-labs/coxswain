# Mode-migration starting point (dedicated → shared). The Gateway already
# carries `infrastructure.parametersRef`, so on apply the controller
# provisions a dedicated proxy pod and flips `DedicatedProxyReady=True`;
# the shared subprocess (`serve dev`) drops the Gateway from its routing
# table. The test then spawns a dedicated subprocess on the same listener
# port (now free), removes the parametersRef, kills the dedicated
# subprocess, and observes the shared subprocess re-adopt the Gateway.
# TESTNS is substituted at runtime.
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainGatewayParameters
metadata:
  name: dedicated-params
spec:
  replicas: 1
  serviceType: NodePort
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: dedicated-gw
spec:
  gatewayClassName: coxswain
  infrastructure:
    parametersRef:
      group: gateway.coxswain-labs.dev
      kind: CoxswainGatewayParameters
      name: dedicated-params
  listeners:
    - name: http
      port: ${GATEWAY_HTTP_PORT}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
spec:
  parentRefs:
    - name: dedicated-gw
  hostnames:
    - "migrate.${TESTNS}.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-a
          port: 3000
