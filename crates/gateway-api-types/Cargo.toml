[package]
name = "gateway-api-types"
description = "First-party kopium-generated Kubernetes Gateway API bindings"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish = false

[features]
default = []
# Alpha/experimental-channel Gateway API kinds (TCPRoute, UDPRoute's
# forerunners live here pre-GA, XBackend, XBackendTrafficPolicy, XMesh, ...).
experimental = []

# `src/apis/**` and `src/constants.rs` are generated by the repo-root `xtask`
# crate (see that crate's docs) from the tag pinned in
# `.gateway-api-version`. This crate is regenerated wholesale on every spec
# bump — reviewed by diff, same trust model as `charts/coxswain/crds/*.yaml` —
# so it carries its own lint table rather than `[lints] workspace = true`:
# kopium's own output needs latitude the rest of the workspace doesn't.
[lints.rust]
missing_docs = "allow"

[lints.clippy]
doc_markdown = "allow"
doc_lazy_continuation = "allow"
tabs_in_doc_comments = "allow"
derivable_impls = "allow"
enum_variant_names = "allow"
large_enum_variant = "allow"
struct_excessive_bools = "allow"
too_many_lines = "allow"

[dependencies]
k8s-openapi = { workspace = true, features = ["schemars"] }
kube = { workspace = true, features = ["derive"] }
regex = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[package.metadata.cargo-machete]
# kube-derive's #[derive(CustomResource)] expands to code that references
# serde_json internally (e.g. Resource::api_resource()) — invisible to a
# static grep of the generated source, same false-positive machete already
# ignores for coxswain-discovery's tonic::include_proto! output.
ignored = ["serde_json"]
