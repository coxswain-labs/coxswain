# Ingress resources for testing the classic Ingress path.
#
# ingress.local  — path-based routing across two backends:
#   /a  → echo-a
#   /b  → echo-b
#
# ingress2.local — second Ingress resource (tests multi-Ingress reconciliation):
#   /c  → echo-c
#   /   → echo-a (catchall)
#
# Note: coxswain currently picks up all Ingress resources regardless of
# ingressClassName, so no IngressClass resource is needed.
#
# Apply:
#   kubectl apply -f deploy/dev/ingress.yaml
#
# Test (coxswain proxy on localhost:80):
#   curl -H "Host: ingress.local" http://localhost/a      # hello from echo-a
#   curl -H "Host: ingress.local" http://localhost/b      # hello from echo-b
#   curl -H "Host: ingress2.local" http://localhost/c     # hello from echo-c
#   curl -H "Host: ingress2.local" http://localhost/      # hello from echo-a
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  namespace: default
spec:
  rules:
    - host: ingress.local
      http:
        paths:
          - path: /a
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 5678
          - path: /b
            pathType: Prefix
            backend:
              service:
                name: echo-b
                port:
                  number: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress-2
  namespace: default
spec:
  rules:
    - host: ingress2.local
      http:
        paths:
          - path: /c
            pathType: Prefix
            backend:
              service:
                name: echo-c
                port:
                  number: 5678
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-a
                port:
                  number: 5678