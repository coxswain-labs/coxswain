# Gateway + HTTPRoute resources for testing Gateway API paths.
#
# echo.local  — path-based routing, single backend per rule:
#   /a  → echo-a
#   /b  → echo-b
#   /   → echo-a (catchall rule)
#
# split.local — single rule pooling two backends; coxswain round-robins
#               across all ready pod addresses from both services:
#   /   → echo-a + echo-b (alternates on successive requests)
#
# *.wildcard.local — wildcard hostname; any subdomain routes to echo-c:
#   /   → echo-c
#
# The Gateway listener uses port 8000 rather than 80 because, since the
# IngressProxy and GatewayProxy split (issue #201), the two data planes bind
# disjoint port sets. Ingress takes --proxy-http-port (conventionally 80);
# Gateway listeners take whatever they declare.
#
# Apply:
#   kubectl apply -f deploy/dev/httproute.yaml
#
# Test (coxswain proxy with --proxy-http-port 80 plus Gateway on port 8000):
#   curl -H "Host: echo.local" http://localhost:8000/a         # hello from echo-a
#   curl -H "Host: echo.local" http://localhost:8000/b         # hello from echo-b
#   curl -H "Host: echo.local" http://localhost:8000/          # hello from echo-a
#   curl -H "Host: split.local" http://localhost:8000/         # alternates a/b
#   curl -H "Host: split.local" http://localhost:8000/         # alternates a/b
#   curl -H "Host: foo.wildcard.local" http://localhost:8000/  # hello from echo-c
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-local
  namespace: default
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: default
spec:
  parentRefs:
    - name: coxswain-local
  hostnames:
    - "echo.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /a
      backendRefs:
        - name: echo-a
          port: 5678
    - matches:
        - path:
            type: PathPrefix
            value: /b
      backendRefs:
        - name: echo-b
          port: 5678
    - backendRefs:
        - name: echo-a
          port: 5678
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: split-route
  namespace: default
spec:
  parentRefs:
    - name: coxswain-local
  hostnames:
    - "split.local"
  rules:
    - backendRefs:
        - name: echo-a
          port: 5678
        - name: echo-b
          port: 5678
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wildcard-route
  namespace: default
spec:
  parentRefs:
    - name: coxswain-local
  hostnames:
    - "*.wildcard.local"
  rules:
    - backendRefs:
        - name: echo-c
          port: 5678