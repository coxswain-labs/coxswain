# Gateway + HTTPRoute for testing Gateway API path.
#
# Requests to echo.local are routed by path prefix:
#   /a  → echo-a
#   /b  → echo-b
#   /   → echo-a (catchall rule)
#
# Apply:
#   kubectl apply -f deploy/dev/httproute.yaml
#
# Test (coxswain proxy on localhost:8080):
#   curl -H "Host: echo.local" http://localhost:8080/a    # hello from echo-a
#   curl -H "Host: echo.local" http://localhost:8080/b    # hello from echo-b
#   curl -H "Host: echo.local" http://localhost:8080/     # hello from echo-a
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: coxswain-local
  namespace: default
spec:
  gatewayClassName: coxswain
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: default
spec:
  parentRefs:
    - name: coxswain-local
  hostnames:
    - "echo.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /a
      backendRefs:
        - name: echo-a
          port: 5678
    - matches:
        - path:
            type: PathPrefix
            value: /b
      backendRefs:
        - name: echo-b
          port: 5678
    - backendRefs:
        - name: echo-a
          port: 5678