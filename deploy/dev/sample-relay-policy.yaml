# Sample CoxswainRelayPolicy resource.
#
# Demonstrates every field of the v1alpha1 schema. Namespaced: the policy governs
# the relay for its OWN namespace, overlaying the #584 global `--relay-*` defaults.
# Place one in each namespace whose relay you want to tune.
#
# Apply:
#   kubectl apply -f deploy/dev/sample-relay-policy.yaml
#
# Inspect:
#   kubectl -n team-a get coxswainrelaypolicies
#   kubectl -n team-a describe coxswainrelaypolicy/sample
---
apiVersion: gateway.coxswain-labs.dev/v1alpha1
kind: CoxswainRelayPolicy
metadata:
  name: sample
  namespace: team-a
spec:
  # Force the relay on for this namespace regardless of the break-even threshold.
  enabled: true
  # Static floor when autoscaling is off (or uncapped).
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  podTemplate:
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: dedicated
          operator: Equal
          value: relay
          effect: NoSchedule
  # Controller-driven autoscaling (no HPA). maxReplicas is the mandatory cap.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetProxiesPerReplica: 8
