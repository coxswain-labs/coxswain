apiVersion: v1
kind: ServiceAccount
metadata:
  name: coxswain-shared-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy

---
# Read-only RBAC for the shared-proxy pod.
#
# Load-bearing invariant: the shared-proxy ServiceAccount has zero write
# verbs. Verify with:
#   kubectl auth can-i --list --as=system:serviceaccount:coxswain-system:coxswain-shared-proxy
# Every verb in the output must be in {get, list, watch}. Adding any
# patch/update/create/delete rule here regresses the v0.2 read-only-proxy
# property — don't do it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coxswain-shared-proxy
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
rules:
  - apiGroups: [""]
    resources: ["services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  # Read CoxswainIngressClassParameters so IngressClass.spec.parameters can be
  # resolved into per-class annotation defaults (#190). Read-only — the proxy SA
  # holds no write verb on any resource.
  - apiGroups: ["ingress.coxswain-labs.dev"]
    resources: ["coxswainingressclassparameters"]
    verbs: ["get", "list", "watch"]
  # Read RateLimit CRs so HTTPRouteRule ExtensionRef filters can be resolved
  # into per-route rate-limiting config (#25). Read-only.
  - apiGroups: ["coxswain-labs.dev"]
    resources: ["ratelimits"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gatewayclasses", "gateways", "httproutes", "referencegrants", "backendtlspolicies"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coxswain-shared-proxy
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
subjects:
  - kind: ServiceAccount
    name: coxswain-shared-proxy
    namespace: coxswain-system
roleRef:
  kind: ClusterRole
  name: coxswain-shared-proxy
  apiGroup: rbac.authorization.k8s.io
