apiVersion: apps/v1
kind: Deployment
metadata:
  name: coxswain-shared-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: shared-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coxswain
        app.kubernetes.io/component: shared-proxy
    spec:
      serviceAccountName: coxswain-shared-proxy
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coxswain
          image: ghcr.io/coxswain-labs/coxswain:latest
          imagePullPolicy: Always
          args: ["serve", "proxy", "--shared"]
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: "info"
            - name: COXSWAIN_LOG_FORMAT
              value: "json"
            - name: COXSWAIN_PROXY_THREADS
              value: "2"
            - name: COXSWAIN_PROXY_UPSTREAM_KEEPALIVE_POOL_SIZE
              value: "128"
            - name: COXSWAIN_HEALTH_PORT
              value: "8081"
            - name: COXSWAIN_ADMIN_PORT
              value: "8082"
            - name: COXSWAIN_PROXY_BIND_ADDRESS
              value: "0.0.0.0"
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: "0.0.0.0"
            - name: COXSWAIN_INGRESS_HTTP_PORT
              value: "80"
            - name: COXSWAIN_INGRESS_HTTPS_PORT
              value: "443"
            - name: COXSWAIN_CONTROLLER_NAME
              value: "coxswain-labs.dev/gateway-controller"
            # Discovery control plane (#423, #601): bootstrap the SVID over the
            # server-auth-only bootstrap listener. There is no
            # COXSWAIN_DISCOVERY_ENDPOINT — the proxy learns its routing-stream
            # upstream from the bootstrap response and is repointed live.
            - name: COXSWAIN_DISCOVERY_BOOTSTRAP_ENDPOINT
              value: "https://coxswain-controller-discovery-bootstrap.coxswain-system.svc:50052"
            - name: COXSWAIN_DISCOVERY_SA_TOKEN_PATH
              value: "/var/run/secrets/coxswain/discovery-token/token"
            - name: COXSWAIN_DISCOVERY_CA_BUNDLE_PATH
              value: "/var/run/secrets/coxswain/trust-bundle/ca.crt"
            - name: COXSWAIN_DISCOVERY_TRUST_DOMAIN
              value: "cluster.local"
            - name: COXSWAIN_PROXY_SHUTDOWN_GRACE_PERIOD
              value: "30s"
            - name: COXSWAIN_PROXY_SHUTDOWN_TIMEOUT
              value: "5s"
            - name: COXSWAIN_PROXY_LISTENER_DRAIN_TIMEOUT
              value: "30s"
            - name: COXSWAIN_ACCESS_LOG
              value: "true"
            - name: COXSWAIN_ACCESS_LOG_PATH_MODE
              value: "full"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          # Baseline defaults — tune cpu/memory for your workload and replica count.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            # Projected SA token for SVID bootstrap (#423). Read-only; compatible
            # with readOnlyRootFilesystem.
            - name: discovery-token
              mountPath: /var/run/secrets/coxswain/discovery-token
              readOnly: true
            # Public CA trust bundle published by the controller.
            - name: trust-bundle
              mountPath: /var/run/secrets/coxswain/trust-bundle
              readOnly: true
      volumes:
        # Audience-scoped projected SA token. The audience MUST match the value
        # the controller passes to TokenReview (`coxswain-discovery`).
        - name: discovery-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: coxswain-discovery
                  expirationSeconds: 3600
        # Controller-published trust bundle (public CA roots only — zero proxy
        # RBAC). `optional` so first-boot before the publisher writes it does not
        # block pod start; the bootstrap loop retries until it appears.
        - name: trust-bundle
          configMap:
            name: coxswain-discovery-trust
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: coxswain-shared-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: coxswain-shared-proxy-internal
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: admin
      port: 8082
      targetPort: admin
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coxswain-shared-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: shared-proxy
