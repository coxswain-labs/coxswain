# Permission template for dedicated-mode Gateway proxy ServiceAccounts.
#
# This ClusterRole defines the read set every dedicated proxy needs. The
# controller binds it via per-namespace `RoleBinding`s (issue #209, Step 10):
# one binding per (dedicated Gateway, namespace it routes a backend into),
# so each proxy ServiceAccount holds reads only in the namespaces its Gateway
# actually touches.
#
# Load-bearing invariants:
#   - Zero write verbs. A compromised dedicated proxy must not be able to
#     write to Kubernetes. The e2e test in
#     `crates/coxswain-e2e/tests/rbac_read_only_proxy.rs` enforces this.
#   - No rules on cluster-scoped resources. Rules on `gatewayclasses` or
#     `namespaces` would be silently ineffective when bound via a
#     `RoleBinding` (only namespaced rules apply through a
#     RoleBinding-to-ClusterRole), so listing them would be a lie. The
#     dedicated proxy is structured to not require any cluster-scoped reads
#     (it drops the `GatewayClass` watch on the dedicated path).
#
# The two opt-in modes for cross-namespace route attachment
# (`allowedRoutes.namespaces.from: All` / `Selector`) are handled by separate
# ClusterRoles bound via ClusterRoleBindings, not by widening this role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coxswain-gateway-proxy-reader
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: dedicated-proxy
rules:
  - apiGroups: [""]
    resources: ["services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gateways", "httproutes", "referencegrants", "backendtlspolicies"]
    verbs: ["get", "list", "watch"]
