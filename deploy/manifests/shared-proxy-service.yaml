# Ingress data-plane LoadBalancer for the shared proxy pool.
#
# This Service stays in the Kustomize base (it is not controller-owned): it
# selects the pods the controller-provisioned shared-proxy Deployment stamps
# (#604), so it keeps routing to them across the ownership move. The Deployment,
# internal Service, HPA, PDB, and ServiceAccount are provisioned by the
# controller from its COXSWAIN_SHARED_PROXY_* env, not from this base.
apiVersion: v1
kind: Service
metadata:
  name: coxswain-shared-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: shared-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
