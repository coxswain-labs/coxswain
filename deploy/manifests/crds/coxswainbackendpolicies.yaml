apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: coxswainbackendpolicies.gateway.coxswain-labs.dev
spec:
  group: gateway.coxswain-labs.dev
  names:
    categories: []
    kind: CoxswainBackendPolicy
    plural: coxswainbackendpolicies
    shortNames: []
    singular: coxswainbackendpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for CoxswainBackendPolicySpec via `CustomResource`
        properties:
          spec:
            description: |-
              Per-backend connection policy attached to one or more `Service` objects.

              A `CoxswainBackendPolicy` in namespace `ns` targets the `Service` objects in
              `targetRefs` (each in the same namespace). Its `timeouts` apply to every
              Gateway API route whose backend resolves to a targeted Service.

              When two policies target the same Service, the older one (by
              `creationTimestamp`, ties broken by name) wins and the loser receives
              `Accepted=False, reason=Conflicted` in its status.
            properties:
              targetRefs:
                description: |-
                  Services this policy targets.

                  Each entry must reference a core `Service` in the same namespace as this
                  policy. The policy's `timeouts` apply to upstream connections to that
                  Service's endpoints.
                items:
                  description: |-
                    A reference to a `Service` this policy targets.

                    Mirrors the Gateway API `LocalPolicyTargetReference` shape without importing
                    the generated types, so we control the schema. Section-name (per-port)
                    targeting is intentionally omitted for #354 — a policy applies to the whole
                    Service.
                  properties:
                    group:
                      default: ''
                      description: API group of the target. Use `""` (the core group) for a `Service`.
                      type: string
                    kind:
                      description: Kind of the target resource. Must be `Service`.
                      type: string
                    name:
                      description: Name of the target Service in the same namespace as this policy.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
              timeouts:
                description: |-
                  Per-upstream-connection timeouts.

                  When `None` the policy is a no-op (valid and immediately accepted with no
                  effect on connection behaviour).
                nullable: true
                properties:
                  connect:
                    description: |-
                      Upstream TCP-connect timeout. Bounds how long the proxy waits to establish
                      a connection to a backend endpoint before failing the request (`502`).

                      When unset or unparseable, the proxy falls back to the per-route connect
                      timeout (Ingress `connect-timeout` annotation) or the Gateway API
                      `backendRequest` budget.
                    nullable: true
                    type: string
                  idle:
                    description: |-
                      Upstream keepalive idle timeout. How long an idle pooled connection to a
                      backend endpoint is retained before eviction.

                      When unset or unparseable, Pingora's built-in pool behaviour is unchanged
                      (connections stay until LRU capacity forces eviction).
                    nullable: true
                    type: string
                type: object
            required:
            - targetRefs
            type: object
          status:
            description: Status written back to the `CoxswainBackendPolicy` by the controller.
            nullable: true
            properties:
              ancestors:
                description: Per-ancestor (targeted Service) policy conditions.
                items:
                  description: Status of this policy with respect to one ancestor (a targeted `Service`).
                  properties:
                    ancestorRef:
                      description: Reference to the `Service` this ancestor entry describes.
                      properties:
                        group:
                          description: API group of the ancestor (`""` for a core `Service`).
                          nullable: true
                          type: string
                        kind:
                          description: Kind of the ancestor (`Service`).
                          nullable: true
                          type: string
                        name:
                          description: Name of the ancestor Service.
                          type: string
                        namespace:
                          description: Namespace of the ancestor Service.
                          nullable: true
                          type: string
                      required:
                      - name
                      type: object
                    conditions:
                      description: Conditions for this ancestor (e.g. `Accepted`).
                      items:
                        description: Condition contains details for one aspect of the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: message is a human readable message indicating details about the transition. This may be an empty string.
                            type: string
                          observedGeneration:
                            description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                            format: int64
                            type: integer
                          reason:
                            description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                            type: string
                          status:
                            description: status of the condition, one of True, False, Unknown.
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                    controllerName:
                      description: The controller that wrote this entry.
                      type: string
                  required:
                  - ancestorRef
                  - controllerName
                  type: object
                type: array
            type: object
        required:
        - spec
        title: CoxswainBackendPolicy
        type: object
    served: true
    storage: true
    subresources:
      status: {}
