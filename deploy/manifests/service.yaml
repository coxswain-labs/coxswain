apiVersion: v1
kind: Service
metadata:
  name: coxswain-proxy
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: proxy
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP

---
# Internal ClusterIP service for health checks and the admin endpoint (/metrics,
# /routes, /status). Enables kubectl port-forward without hand-rolling a Service.
apiVersion: v1
kind: Service
metadata:
  name: coxswain-internal
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: proxy
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: admin
      port: 8082
      targetPort: admin
      protocol: TCP
