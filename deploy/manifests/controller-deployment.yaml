apiVersion: apps/v1
kind: Deployment
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coxswain
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: coxswain-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coxswain
          # :latest tracks the most recent versioned release. For production,
          # pin to a specific version — :v0.1.5 / :0.1.5 are immutable patch
          # pins; :0.1 floats to the latest patch in the 0.1 minor line; :0
          # floats to the latest minor.patch in the 0.x major line.
          # Combined with imagePullPolicy: Always below, a pod restart on
          # :latest rolls onto the newest release. For pinned tags, switch
          # imagePullPolicy back to IfNotPresent.
          image: ghcr.io/coxswain-labs/coxswain:latest
          imagePullPolicy: Always
          args: ["serve", "controller"]
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
            - name: discovery
              containerPort: 50051
              protocol: TCP
            - name: bootstrap
              containerPort: 50052
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: "info"
            - name: COXSWAIN_LOG_FORMAT
              value: "json"
            - name: COXSWAIN_HEALTH_PORT
              value: "8081"
            - name: COXSWAIN_ADMIN_PORT
              value: "8082"
            - name: COXSWAIN_DISCOVERY_PORT
              value: "50051"
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: "0.0.0.0"
            - name: COXSWAIN_CONTROLLER_NAME
              value: "coxswain-labs.dev/gateway-controller"
            - name: COXSWAIN_INGRESS_HTTP_PORT
              value: "80"
            - name: COXSWAIN_INGRESS_HTTPS_PORT
              value: "443"
            - name: COXSWAIN_CONTROLLER_LEASE_TTL
              value: "15s"
            - name: COXSWAIN_CONTROLLER_LEASE_RENEW_INTERVAL
              value: "5s"
            # Adaptive reconcile debounce (#512).
            - name: COXSWAIN_RECONCILE_DEBOUNCE_MIN
              value: "20ms"
            - name: COXSWAIN_RECONCILE_DEBOUNCE_MAX
              value: "500ms"
            # Discovery control plane / CA (#423).
            - name: COXSWAIN_DISCOVERY_PORT
              value: "50051"
            - name: COXSWAIN_DISCOVERY_BOOTSTRAP_PORT
              value: "50052"
            - name: COXSWAIN_DISCOVERY_CA_SECRET
              value: "coxswain-discovery-ca"
            # auto: self-generate the CA if absent. Set to "external" and supply
            # the Secret (e.g. via cert-manager-example.yaml) to consume an
            # externally-managed CA; also delete the discovery-ca Role in
            # controller-rbac.yaml in that case.
            - name: COXSWAIN_DISCOVERY_CA_MODE
              value: "auto"
            - name: COXSWAIN_DISCOVERY_SVID_TTL
              value: "24h"
            - name: COXSWAIN_DISCOVERY_TRUST_DOMAIN
              value: "cluster.local"
            # Shared proxy pool (#604): the controller — not this base — owns the
            # pool Deployment/SA/HPA/PDB/internal-Service. The retained
            # shared-proxy-service.yaml LoadBalancer selects the labels below.
            - name: COXSWAIN_SHARED_PROXY_ENABLED
              value: "true"
            - name: COXSWAIN_SHARED_PROXY_SELECTOR
              value: "app.kubernetes.io/name=coxswain,app.kubernetes.io/component=shared-proxy"
            - name: COXSWAIN_SHARED_PROXY_NAME
              value: "coxswain-shared-proxy"
            - name: COXSWAIN_SHARED_PROXY_REPLICAS
              value: "1"
            - name: COXSWAIN_SHARED_PROXY_THREADS
              value: "2"
            # Relay tier (#605): the controller demand-drives one relay tier with two
            # scopes (a shared-pool relay + per-namespace dedicated relays), each
            # provisioned only above the `--relay-min-proxy-replicas` break-even. ON
            # by default (matches the binary); set "false" to disable the whole tier.
            # Inert on this quickstart (1 shared-proxy replica is well below break-even),
            # so no relay is provisioned here. The remaining `--relay-*` tuning knobs
            # inherit their binary defaults; see values.yaml for the full set.
            - name: COXSWAIN_RELAY_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: []
          # Controller is reconciler-bound, not traffic-bound: lower defaults
          # than the shared-proxy. Tune for cluster size.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: admin
      port: 8082
      targetPort: admin
      protocol: TCP
---
# Discovery control-plane Services (#423, #531). Fixed names
# `coxswain-controller-discovery` / `coxswain-controller-discovery-bootstrap`
# so the controller operator's rendered dedicated-proxy endpoints and the
# shared-proxy endpoint envs resolve to them (coxswain-bin/src/lib.rs).
#
# The stream Service additionally selects the `discovery.coxswain-labs.dev/leader`
# pod label the lease holder maintains on itself, so proxy dials
# deterministically reach the leader (standbys also reject stray streams).
# Bootstrap keeps its own all-replicas Service: SVID issuance is stateless.
apiVersion: v1
kind: Service
metadata:
  name: coxswain-controller-discovery
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
    discovery.coxswain-labs.dev/leader: "true"
  ports:
    - name: discovery
      port: 50051
      targetPort: discovery
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: coxswain-controller-discovery-bootstrap
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
  ports:
    - name: bootstrap
      port: 50052
      targetPort: bootstrap
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: controller
