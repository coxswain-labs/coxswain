apiVersion: apps/v1
kind: Deployment
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coxswain
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: coxswain-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coxswain
          # :latest tracks the most recent versioned release. For production,
          # pin to a specific version — :v0.1.5 / :0.1.5 are immutable patch
          # pins; :0.1 floats to the latest patch in the 0.1 minor line; :0
          # floats to the latest minor.patch in the 0.x major line.
          # Combined with imagePullPolicy: Always below, a pod restart on
          # :latest rolls onto the newest release. For pinned tags, switch
          # imagePullPolicy back to IfNotPresent.
          image: ghcr.io/coxswain-labs/coxswain:latest
          imagePullPolicy: Always
          args: ["serve", "controller"]
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: "info"
            - name: COXSWAIN_LOG_FORMAT
              value: "json"
            - name: COXSWAIN_HEALTH_PORT
              value: "8081"
            - name: COXSWAIN_ADMIN_PORT
              value: "8082"
            - name: COXSWAIN_MANAGEMENT_BIND_ADDRESS
              value: "0.0.0.0"
            - name: COXSWAIN_CONTROLLER_NAME
              value: "coxswain-labs.dev/gateway-controller"
            - name: COXSWAIN_INGRESS_HTTP_PORT
              value: "80"
            - name: COXSWAIN_INGRESS_HTTPS_PORT
              value: "443"
            - name: COXSWAIN_CONTROLLER_LEASE_TTL
              value: "15s"
            - name: COXSWAIN_CONTROLLER_LEASE_RENEW_INTERVAL
              value: "5s"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: []
          # Controller is reconciler-bound, not traffic-bound: lower defaults
          # than the shared-proxy. Tune for cluster size.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: admin
      port: 8082
      targetPort: admin
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: controller
