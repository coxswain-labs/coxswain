apiVersion: apps/v1
kind: Deployment
metadata:
  name: coxswain-gateway
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coxswain
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: coxswain-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coxswain
          # :latest tracks the most recent versioned release. For production,
          # pin to a specific version — :v0.1.5 / :0.1.5 are immutable patch
          # pins; :0.1 floats to the latest patch in the 0.1 minor line; :0
          # floats to the latest minor.patch in the 0.x major line.
          # Combined with imagePullPolicy: Always below, a pod restart on
          # :latest rolls onto the newest release. For pinned tags, switch
          # imagePullPolicy back to IfNotPresent.
          image: ghcr.io/coxswain-labs/coxswain:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: "info,coxswain_proxy=debug"
            - name: COXSWAIN_LOG_FORMAT
              value: "json"
            - name: COXSWAIN_PROXY_THREADS
              value: "2"
            - name: COXSWAIN_HEALTH_PORT
              value: "8081"
            - name: COXSWAIN_ADMIN_PORT
              value: "8082"
            - name: COXSWAIN_PROXY_HTTP_PORT
              value: "80"
            - name: COXSWAIN_PROXY_HTTPS_PORT
              value: "443"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          # Baseline defaults — tune cpu/memory for your workload and replica count.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
