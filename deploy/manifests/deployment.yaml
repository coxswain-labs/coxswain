apiVersion: apps/v1
kind: Deployment
metadata:
  name: coxswain-gateway
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coxswain
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coxswain
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: coxswain-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: coxswain
          image: coxswain-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 8082
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COXSWAIN_LOG
              value: "info,coxswain_proxy=debug"
            - name: COXSWAIN_LOG_FORMAT
              value: "json"
            - name: COXSWAIN_PROXY_THREADS
              value: "2"
            - name: COXSWAIN_HEALTH_ADDR
              value: "0.0.0.0:8081"
            - name: COXSWAIN_ADMIN_ADDR
              value: "0.0.0.0:8082"
            - name: COXSWAIN_PROXY_HTTP_PORT
              value: "80"
            - name: COXSWAIN_PROXY_HTTPS_PORT
              value: "443"
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
