# Kustomize base for deploy/manifests/.
#
# coxswain.yaml is GENERATED from charts/coxswain by scripts/render-manifests.sh:
# the chart is the single source of truth, so a raw-manifest / Kustomize install
# produces the same result as `helm install`. Do not hand-edit coxswain.yaml;
# scripts/check-manifests-synced.sh fails CI if it drifts from the chart.
#
# CRDs are referenced separately from crds/ (generated by crdgen and validated by
# scripts/check-crd-kubeconform.sh), so they are not re-rendered here.
#
# Usage:
#   kustomize build deploy/manifests
#
# The release workflow substitutes the exact release tag via
# `kustomize edit set image` before building, producing the published
# install.yaml. Running this build locally against the unmodified base yields
# :latest — treat local output as for inspection, not direct apply.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - coxswain.yaml
  - crds/coxswaingatewayparameters.yaml
  - crds/coxswainrelaypolicies.yaml
  - crds/clienttrafficpolicies.yaml
  - crds/coxswainbackendpolicies.yaml
  - crds/coxswainexternalauths.yaml
  - crds/ratelimits.yaml
  - crds/retrypolicies.yaml
  - crds/pathrewriteregexes.yaml
  - crds/ipaccesscontrols.yaml
  - crds/jwtauths.yaml
  - crds/basicauths.yaml
  - crds/requestsizelimits.yaml
  - crds/compressions.yaml
  - crds/coxswainingressclassparameters.yaml

images:
  - name: ghcr.io/coxswain-labs/coxswain
    # Overridden by `kustomize edit set image` in the release workflow to pin
    # to the exact release tag (e.g. v0.1.0).
    newTag: latest
