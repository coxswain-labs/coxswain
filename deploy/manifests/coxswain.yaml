  # resolve `parametersRef`s from Gateway and GatewayClass. No write verbs:
  # operators author these objects; the controller only renders from them.
  # Watch + status-write ClientTrafficPolicy (#327): the controller reconciles
  # per-listener PROXY protocol config and patches status.ancestors[].
  # Watch + status-write CoxswainBackendPolicy (#354): per-backend connect/idle
  # timeouts, status.ancestors[] patched per targeted Service.
  # Read the route-scoped ExtensionRef filter CRs — RateLimit (#25),
  # PathRewriteRegex (#77), IpAccessControl (#479), BasicAuth (#442),
  # RequestSizeLimit (#443), Compression (#446), JwtAuth (#441) — so
  # HTTPRouteRule/GRPCRouteRule ExtensionRef filters resolve into per-route
  # config. Read-only; JwtAuth has no status subresource.
  - apiGroups: ["gateway.coxswain-labs.dev"]
    resources:
      ["coxswaingatewayparameters", "coxswainrelaypolicies", "clienttrafficpolicies", "coxswainbackendpolicies", "coxswainexternalauths", "ratelimits", "retrypolicies", "pathrewriteregexes", "ipaccesscontrols", "basicauths", "requestsizelimits", "compressions", "jwtauths"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.coxswain-labs.dev"]
    resources: ["clienttrafficpolicies/status", "coxswainbackendpolicies/status", "coxswainexternalauths/status"]
    verbs: ["patch", "update"]
  # Server-side-apply provisioning of dedicated-mode proxy Deployments
  # (#208). The Deployments are owner-referenced to the Gateway so K8s
  # cascades their deletion automatically.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Dedicated-proxy autoscaling (#497): the operator server-side-applies an HPA +
  # PDB when `autoscaling.enabled`, and DELETES them on every reconcile when
  # disabled (so an autoscaling-off Gateway provisions neither). `delete` is
  # therefore required even for Gateways that never enable autoscaling.
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read-only Pod watch (#210, #211) so the operator can observe
  # dedicated-proxy Pod readiness — publishes the
  # `gateway.coxswain-labs.dev/DedicatedProxyReady` cut-over condition and
  # gates `Programmed=True` in the dedicated Gateway status writer. Cluster-
  # wide because dedicated-proxy Pods live in each Gateway's own namespace;
  # the watch is label-selector scoped to
