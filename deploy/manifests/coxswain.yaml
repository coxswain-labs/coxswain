  # listeners into the parent Gateway's effective set; the leader writes
  # `listenersets/status` (below) with Accepted/Programmed/Conflicted. Standard
  # channel — `gateway.networking.k8s.io/v1`.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gatewayclasses", "httproutes", "grpcroutes", "tlsroutes", "tcproutes", "udproutes", "referencegrants", "backendtlspolicies", "listenersets"]
    verbs: ["get", "list", "watch"]
