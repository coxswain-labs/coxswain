  # /status subresource) so the controller can manage a finalizer for
  # dedicated-mode cleanup (#209). The controller code only mutates
  # `metadata.finalizers` — the wider RBAC scope is unavoidable because K8s
  # doesn't expose a `/finalizers` subresource for `gateways`. Every Gateway
  # API controller using finalizers operates the same way.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gatewayclasses/status", "gateways/status", "httproutes/status", "grpcroutes/status", "tlsroutes/status", "tcproutes/status", "udproutes/status", "backendtlspolicies/status", "listenersets/status"]
    verbs: ["patch", "update"]
