  # resolved into per-class annotation defaults (#190). No write verbs:
  # operators author these objects; coxswain only reads them.
  - apiGroups: ["ingress.coxswain-labs.dev"]
    resources: ["coxswainingressclassparameters"]
    verbs: ["get", "list", "watch"]
