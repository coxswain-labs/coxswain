  # BackendTLSPolicy CA resolution) because the trust-bundle publisher (#423)
  # server-side-applies the `coxswain-discovery-trust` ConfigMap so proxies can
  # mount the public CA roots with zero API verbs of their own.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Validate proxy ServiceAccount tokens during SVID bootstrap (#423).
  # TokenReview is a cluster-scoped, write-only (create) subjectaccess-style
  # API; there is no namespaced form. No token is ever persisted.
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  # Read Gateway API CRD definitions to detect which kinds and schema fields the
  # installed CRD set actually serves, so the controller runs against any
  # supported Gateway API version instead of wedging on an older one. Read-only,
  # and cluster-scoped because CRDs are — the namespaced lockdown needs it too.
