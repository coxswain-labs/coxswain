apiVersion: v1
kind: ServiceAccount
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coxswain-controller-role
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
rules:
  - apiGroups: [""]
    # secrets: covers kubernetes.io/tls Secrets for TLS termination (#8, #9),
    # including those provisioned automatically by cert-manager (#11).
    # configmaps: needed to resolve BackendTLSPolicy caCertificateRefs (#16).
    # Unlike Secrets (type=kubernetes.io/tls filter), ConfigMaps have no equivalent
    # field selector — all ConfigMaps in scope are watched (follow-up: per-policy informers).
    resources: ["services", "endpoints", "pods", "secrets", "configmaps"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["patch", "update"]

  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes", "referencegrants", "backendtlspolicies"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses/status", "gateways/status", "httproutes/status", "backendtlspolicies/status"]
    verbs: ["patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coxswain-controller-binding
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: coxswain-controller
    namespace: coxswain-system
roleRef:
  kind: ClusterRole
  name: coxswain-controller-role
  apiGroup: rbac.authorization.k8s.io

---
# Namespace-scoped Role for leader-election Lease objects.
# Kept separate from the ClusterRole to limit Lease access to coxswain-system only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coxswain-leader-election-role
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coxswain-leader-election-binding
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: coxswain-controller
    namespace: coxswain-system
roleRef:
  kind: Role
  name: coxswain-leader-election-role
  apiGroup: rbac.authorization.k8s.io

# ---------------------------------------------------------------------------
# OPTIONAL: Namespace-scoped RBAC for --controller-watch-namespace installs
#
# When deploying Coxswain with COXSWAIN_CONTROLLER_WATCH_NAMESPACE=<ns>, you
# can reduce the RBAC surface by replacing the ClusterRole + ClusterRoleBinding
# above with the resources below.
#
# The split is necessary because some resources are genuinely cluster-scoped
# (GatewayClass, IngressClass) and can only be granted via a ClusterRole, while
# the namespaced resources (Gateway, HTTPRoute, Ingress, ReferenceGrant,
# EndpointSlice, Service, Endpoints) can be granted via a namespaced Role.
#
# Secrets (kubernetes.io/tls type) are needed for TLS termination (#8).
#
# Steps:
#   1. Replace the ClusterRole + ClusterRoleBinding above with the residual
#      ClusterRole + ClusterRoleBinding below (class-only permissions).
#   2. Apply the Role + RoleBinding below in the target namespace.
#   3. Start Coxswain with --controller-watch-namespace=<ns>.
# ---------------------------------------------------------------------------

# --- Residual ClusterRole: class-scoped resources only ---
# (replace the coxswain-controller-role ClusterRole above)
#
# apiVersion: rbac.authorization.k8s.io/v1
# kind: ClusterRole
# metadata:
#   name: coxswain-controller-role
#   labels:
#     app.kubernetes.io/name: coxswain
#     app.kubernetes.io/component: controller
# rules:
#   - apiGroups: ["networking.k8s.io"]
#     resources: ["ingressclasses"]
#     verbs: ["get", "list", "watch"]
#
#   - apiGroups: ["gateway.networking.k8s.io"]
#     resources: ["gatewayclasses"]
#     verbs: ["get", "list", "watch"]
#
#   - apiGroups: ["gateway.networking.k8s.io"]
#     resources: ["gatewayclasses/status"]
#     verbs: ["patch", "update"]

# --- Namespaced Role: all namespaced resources, scoped to <target-ns> ---
#
# apiVersion: rbac.authorization.k8s.io/v1
# kind: Role
# metadata:
#   name: coxswain-controller-ns-role
#   namespace: <target-ns>
#   labels:
#     app.kubernetes.io/name: coxswain
#     app.kubernetes.io/component: controller
# rules:
#   - apiGroups: [""]
#     resources: ["services", "endpoints", "pods", "secrets", "configmaps"]
#     verbs: ["get", "list", "watch"]
#
#   - apiGroups: ["networking.k8s.io"]
#     resources: ["ingresses"]
#     verbs: ["get", "list", "watch"]
#
#   - apiGroups: ["networking.k8s.io"]
#     resources: ["ingresses/status"]
#     verbs: ["patch", "update"]
#
#   - apiGroups: ["gateway.networking.k8s.io"]
#     resources: ["gateways", "httproutes", "referencegrants", "backendtlspolicies"]
#     verbs: ["get", "list", "watch"]
#
#   - apiGroups: ["gateway.networking.k8s.io"]
#     resources: ["gateways/status", "httproutes/status", "backendtlspolicies/status"]
#     verbs: ["patch", "update"]

