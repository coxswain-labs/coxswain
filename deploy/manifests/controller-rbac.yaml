apiVersion: v1
kind: ServiceAccount
metadata:
  name: coxswain-controller
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coxswain-controller
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
rules:
  # Reads needed for accurate status computation: backend-existence checks
  # (Services), endpoint resolution (EndpointSlices), TLS termination
  # (Secrets), BackendTLSPolicy CA resolution (ConfigMaps).
  #
  # `services` and `serviceaccounts` ALSO carry write verbs because the
  # provisioning operator (#208) server-side-applies them in the Gateway's
  # namespace; the writes are bundled into the same rule to keep the
  # ClusterRole concise.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Read Namespaces to evaluate ListenerSet cross-namespace attachment — GEP-1713
  # (#93). The parent Gateway's `allowedListeners.namespaces.from: Selector` gate
  # matches against Namespace labels; the data-plane reflector keeps a Namespace
  # store for it. No write verbs.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # `configmaps` carries write verbs (in addition to BackendTLSPolicy CA reads)
  # because the trust-bundle publisher (#423) server-side-applies the
  # `coxswain-discovery-trust` ConfigMap so proxies mount the public CA roots
  # with zero API verbs of their own.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Validate proxy ServiceAccount tokens during SVID bootstrap (#423).
  # TokenReview is cluster-scoped and write-only (create); no token is persisted.
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["patch", "update"]
  # Read CoxswainIngressClassParameters so IngressClass.spec.parameters can be
  # resolved into per-class annotation defaults (#190). No write verbs:
  # operators author these objects; coxswain only reads them.
  - apiGroups: ["ingress.coxswain-labs.dev"]
    resources: ["coxswainingressclassparameters"]
    verbs: ["get", "list", "watch"]
  # `listenersets` (GEP-1713, #93): the reflector reads them to merge their
  # listeners into the parent Gateway's effective set; the leader writes
  # `listenersets/status` (below) with Accepted/Programmed/Conflicted. Standard
  # channel — `gateway.networking.k8s.io/v1`.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gatewayclasses", "httproutes", "grpcroutes", "tlsroutes", "referencegrants", "backendtlspolicies", "listenersets"]
    verbs: ["get", "list", "watch"]
  # `gateways` has `patch` / `update` on the main resource (in addition to the
  # /status subresource) so the controller can manage a finalizer for
  # dedicated-mode cleanup (#209). The controller code only mutates
  # `metadata.finalizers` — the wider RBAC scope is unavoidable because K8s
  # doesn't expose a `/finalizers` subresource for `gateways`. Every Gateway
  # API controller using finalizers operates the same way.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      ["gatewayclasses/status", "gateways/status", "httproutes/status", "grpcroutes/status", "tlsroutes/status", "backendtlspolicies/status", "listenersets/status"]
    verbs: ["patch", "update"]
  # Read CoxswainGatewayParameters so the provisioning operator (#207) can
  # resolve `parametersRef`s from Gateway and GatewayClass. No write verbs:
  # operators author these objects; the controller only renders from them.
  # Watch + status-write ClientTrafficPolicy (#327): the controller reconciles
  # per-listener PROXY protocol config and patches status.ancestors[].
  # Watch + status-write CoxswainBackendPolicy (#354): the controller reconciles
  # per-backend connect/idle timeouts and patches status.ancestors[].
  # Read the route-scoped ExtensionRef filter CRs — RateLimit (#25),
  # PathRewriteRegex (#77), IpAccessControl (#479), BasicAuth (#442),
  # RequestSizeLimit (#443), Compression (#446) — so HTTPRouteRule/GRPCRouteRule
  # ExtensionRef filters resolve into per-route config. Read-only.
  - apiGroups: ["gateway.coxswain-labs.dev"]
    resources:
      ["coxswaingatewayparameters", "clienttrafficpolicies", "coxswainbackendpolicies", "ratelimits", "pathrewriteregexes", "ipaccesscontrols", "basicauths", "requestsizelimits", "compressions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.coxswain-labs.dev"]
    resources: ["clienttrafficpolicies/status", "coxswainbackendpolicies/status"]
    verbs: ["patch", "update"]
  # Server-side-apply provisioning of dedicated-mode proxy Deployments
  # (#208). The Deployments are owner-referenced to the Gateway so K8s
  # cascades their deletion automatically.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Dedicated-proxy autoscaling (#497): the operator server-side-applies an HPA +
  # PDB when `autoscaling.enabled`, and DELETES them on every reconcile when
  # disabled (so an autoscaling-off Gateway provisions neither). `delete` is
  # therefore required even for Gateways that never enable autoscaling.
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read dedicated-proxy Pods (#210, #211): operator watches their Ready
  # condition to publish the `DedicatedProxyReady` cut-over signal and to
  # gate `Programmed=True` in the dedicated Gateway status writer. Narrowed
  # to the operator's label-selector at the watch layer.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read pod logs (#285) so the operator UI can tail controller/proxy logs
  # through the controller admin port. `pods/log` is a separate subresource not
  # covered by the `pods` get/list/watch above. Read-only; the proxy SA has no
  # `pods` access at all, so this never reaches the data plane.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read cluster Nodes (#211): the dedicated Gateway status writer
  # enumerates Node ExternalIP / InternalIP to populate
  # `Gateway.status.addresses` when the dedicated Service is `NodePort`-typed.
  # No write verbs.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Emit `Warning` Events on Ingress objects when a route conflict or invalid
  # annotation is detected (#390, #401). The kube `Recorder` writes to
  # `events.k8s.io/v1`; `patch` is needed so the Recorder can update existing
  # Events (its built-in dedup re-uses the same Event object). Proxy SA has no
  # Events verb — diagnostics are controller-only.
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coxswain-controller
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: coxswain-controller
    namespace: coxswain-system
roleRef:
  kind: ClusterRole
  name: coxswain-controller
  apiGroup: rbac.authorization.k8s.io

---
# Namespace-scoped Role for leader-election Lease objects.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coxswain-controller-leader-election
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "patch"]
  # Discovery leader label (#531): the lease holder labels its own pod so the
  # leader-selected discovery stream Service routes proxy dials to it, and
  # strips stale labels from crashed ex-leader pods on promotion.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coxswain-controller-leader-election
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: coxswain-controller
    namespace: coxswain-system
roleRef:
  kind: Role
  name: coxswain-controller-leader-election
  apiGroup: rbac.authorization.k8s.io

---
# Namespace-scoped Role granting the controller create/get on the discovery CA
# Secret in coxswain-system (#423, CA mode=auto self-generation). Kept separate
# from the cluster-wide read-only `secrets` rule so the controller never holds a
# cluster-wide secrets-write grant. DELETE this Role + RoleBinding when running
# CA mode=external (cert-manager / BYO Secret); see cert-manager-example.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coxswain-controller-discovery-ca
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coxswain-controller-discovery-ca
  namespace: coxswain-system
  labels:
    app.kubernetes.io/name: coxswain
    app.kubernetes.io/component: controller
subjects:
  - kind: ServiceAccount
    name: coxswain-controller
    namespace: coxswain-system
roleRef:
  kind: Role
  name: coxswain-controller-discovery-ca
  apiGroup: rbac.authorization.k8s.io
