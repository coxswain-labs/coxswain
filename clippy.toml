allow-unwrap-in-tests = true
allow-expect-in-tests = true
# RouteMatch (208 bytes) in RouteOutcome::Found is intentionally stack-resident: it's
# per-request short-lived data and boxing it would add a gratuitous heap allocation.
enum-variant-size-threshold = 300

# Library crates use parking_lot, never std::sync, for Mutex/RwLock. std locks
# poison (forcing unwrap_or_else(panic!) ceremony) and their guards are Send, so
# a lock accidentally held across .await compiles silently. parking_lot cannot
# poison and its !Send guards turn anti-lock-across-await into a compile error.
# See CLAUDE.md "Enforced rules" + [[project_parking_lot_locks]].
disallowed-types = [
    { path = "std::sync::Mutex", reason = "use parking_lot::Mutex — no poison, !Send guard catches lock-across-await at compile time" },
    { path = "std::sync::RwLock", reason = "use parking_lot::RwLock — no poison, !Send guard catches lock-across-await at compile time" },
]
