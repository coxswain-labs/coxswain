[workspace]
resolver = "2"
members = [
    "coxswain-bin",
    "coxswain-core",
    "coxswain-controller",
    "coxswain-proxy",
    "coxswain-admin"
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = []
description = "A pure-Rust Kubernetes Ingress & Gateway API Controller built on Pingora"
license = "MIT"
repository = "https://github.com/coxswain-labs/coxswain"

[workspace.dependencies]
anyhow = { version = "1.0" }
arc-swap = { version = "1.9" }
async-trait = { version = "0.1" }
coxswain-admin = { path = "./coxswain-admin" }
coxswain-core = { path = "./coxswain-core" }
coxswain-controller = { path = "./coxswain-controller" }
coxswain-proxy = { path = "./coxswain-proxy" }
prometheus = { version = "0.13" }
clap = {version = "4.6", features = ["derive", "env"]}
futures = { version = "0.3" }
http = { version = "1" }
gateway-api = { version = "0.21" }
k8s-openapi = { version = "0.27", features = ["latest"] }
kube = { version = "3.1", features = ["runtime", "derive", "client"] }
matchit = { version = "0.9" }
pingora = { version = "0.8" }
pingora-core = { version = "0.8" }
pingora-http = { version = "0.8" }
pingora-proxy = { version = "0.8" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1.0" }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }
tokio = { version = "1", features = ["full"] }
thiserror = { version = "2.0" }
