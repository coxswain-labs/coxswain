[workspace]
resolver = "2"
members = [
    "crates/coxswain-bin",
    "crates/coxswain-core",
    "crates/coxswain-controller",
    "crates/coxswain-proxy",
    "crates/coxswain-health",
    "crates/coxswain-admin"
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = []
description = "A pure-Rust Kubernetes Ingress & Gateway API Controller built on Pingora"
license = "Apache-2.0"
repository = "https://github.com/coxswain-labs/coxswain"

[workspace.dependencies]
coxswain-admin = { path = "./crates/coxswain-admin" }
coxswain-core = { path = "./crates/coxswain-core" }
coxswain-controller = { path = "./crates/coxswain-controller" }
coxswain-health = { path = "./crates/coxswain-health" }
coxswain-proxy = { path = "./crates/coxswain-proxy" }

anyhow = { version = "1.0" }
arc-swap = { version = "1.9" }
async-trait = { version = "0.1" }
clap = { version = "4.6", features = ["derive", "env"] }
futures = { version = "0.3" }
http = { version = "1" }
humantime = { version = "2" }
gateway-api = { version = "0.21" }
k8s-openapi = { version = "0.27", features = ["latest"] }
kube = { version = "3.1", features = ["runtime", "derive", "client"] }
kube-leader-election = { version = "0.43" }
matchit = { version = "0.9" }
pingora = { version = "0.8" }
pingora-core = { version = "0.8" }
pingora-http = { version = "0.8" }
pingora-proxy = { version = "0.8" }
prometheus = { version = "0.14" }
regex = { version = "1.12"}
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1.0" }
thiserror = { version = "2.0" }
tokio = { version = "1", features = ["full"] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
