syntax = "proto3";

package coxswain.discovery.v1;

// Bidirectional gRPC stream between a discovery client and the controller.
//
// The client sends a Subscribe once to declare scope, then Ack/Nack after each
// snapshot.  The server sends Snapshot messages as the routing world changes.
// Envelopes are extensible oneofs — future message types (relay telemetry,
// drain commands) can be added without a wire break.
//
// Bootstrap is a separate unary RPC served on its own listener (server-auth-only
// TLS, no client cert required).  A fresh proxy with no SVID sends its
// ServiceAccount token + a CSR and receives a signed SVID + the trust bundle.
// After bootstrapping the proxy connects to Stream using its new SVID.
service Discovery {
  rpc Stream(stream ClientMessage) returns (stream ServerMessage);
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse);
}

// ────────────────────────────────────────────────────────────────────────────
// Bootstrap RPC messages
// ────────────────────────────────────────────────────────────────────────────

// Sent by a proxy that has no SVID yet (or is rotating its SVID).
// The SA token authenticates the proxy; the CSR carries the proxy's public key
// only — the private key never leaves the proxy process.
message BootstrapRequest {
  string sa_token = 1;      // Kubernetes projected ServiceAccount token
  bytes csr_pem = 2;        // PEM-encoded PKCS#10 CSR with SPIFFE URI-SAN
  uint32 wire_version = 3;  // wire protocol version (WIRE_VERSION constant)
}

// Returned on success.  The proxy uses svid_cert_pem + its local private key
// to open the mTLS Stream connection.  trust_bundle_pem should be persisted
// and fed to DiscoveryClientTls so subsequent Stream connections can verify
// the controller's server cert.
message BootstrapResponse {
  bytes svid_cert_pem = 1;      // PEM-encoded SVID cert signed by the controller CA
  bytes trust_bundle_pem = 2;   // PEM-encoded CA bundle (one or more roots for overlap during rotation)
  int64 not_after_unix = 3;     // SVID expiry as Unix seconds (UTC)
}

// ────────────────────────────────────────────────────────────────────────────
// Client → server
// ────────────────────────────────────────────────────────────────────────────

message ClientMessage {
  oneof kind {
    Subscribe subscribe = 1;
    Ack ack = 2;
    Nack nack = 3;
    // reserved 4..: NodeStatus (relay telemetry) — DEFERRED
  }
}

// Declares the scope and protocol version this client speaks.
message Subscribe {
  string node_id = 1; // stable identity of the subscribing proxy (pod UID or hostname)
  uint32 wire_version = 2; // wire protocol version integer spoken by this client (WIRE_VERSION = 1)
  Scope scope = 3; // requested scope; currently unused (controller sends everything)
}

// Scope filter for future per-port / per-namespace narrowing.
// Empty in v0.5; reserved for v0.6 delta streaming.
message Scope {}

// Positive acknowledgement: client has applied the snapshot at `version`.
message Ack {
  string version = 1;
  bytes nonce = 2;
}

// Negative acknowledgement: client rejected the snapshot at `version`.
message Nack {
  string version = 1;
  bytes nonce = 2;
  string detail = 3;
}

// ────────────────────────────────────────────────────────────────────────────
// Server → client
// ────────────────────────────────────────────────────────────────────────────

message ServerMessage {
  oneof kind {
    Snapshot snapshot = 1;
    // reserved 2..: Command (drain / dump-config) — DEFERRED
  }
}

// Full state-of-the-world snapshot for the subscribed scope.
//
// Determinism discipline: every `repeated` field that was a map in the runtime
// type is emitted sorted by key in `to_wire`.  No `map<>` anywhere — proto map
// encoding order is not guaranteed and would break the content-hash oracle.
//
// Field layout:
//   identity  1–9   : version, nonce
//   extensions 10–29: per-resource DTOs
//   repeated  40+   : reserved for v0.6 delta streaming removes set
message Snapshot {
  // identity
  string version = 1; // content hash of this scope's DTO (sha256 hex)
  bytes nonce = 2;
  // nested DTO extensions
  RoutingTable ingress_routing = 10;
  RoutingTable gateway_routing = 11;
  TlsStore tls_store = 12;
  ClientCertStore client_cert_store = 13;
  GatewayListenerHealth listener_health = 14;
  // repeated (reserved for v0.6 delta streaming)
  reserved 40;
  reserved "removed_resources";
}

// ────────────────────────────────────────────────────────────────────────────
// 2a  Routing table DTO
// ────────────────────────────────────────────────────────────────────────────

message RoutingTable {
  repeated PortEntry ports = 1; // sorted by port ascending
}

message PortEntry {
  uint32 port = 1; // u16 stored as uint32
  repeated HostEntry hosts = 2; // exact hosts, then wildcard, then catchall
}

// Per-host routing bucket.  Exactly one of `exact`, `wildcard`, or `catchall`
// is set; the oneof also encodes which PortTableBuilder method to replay.
message HostEntry {
  oneof pattern {
    string exact = 1; // exact hostname
    WildcardHost wildcard = 2; // *.suffix entry
    bool catchall = 3; // true = catch-all bucket
  }
  NormalizeLevel normalize_level = 4;
  repeated RouteEntry routes = 5; // in insertion order (preserves wire_entries() traversal order)
}

// Wildcard host bucket discriminated by suffix and matching semantics.
message WildcardHost {
  string suffix = 1; // e.g. "example.com" (no "*." prefix)
  WildcardKind kind = 2;
}

enum WildcardKind {
  WILDCARD_KIND_UNSPECIFIED = 0;
  WILDCARD_KIND_SINGLE_LABEL = 1; // Ingress: only one label before suffix
  WILDCARD_KIND_MULTI_LABEL = 2; // Gateway API: any number of labels
}

// Mirrors coxswain_core::routing::NormalizeLevel.
enum NormalizeLevel {
  NORMALIZE_LEVEL_UNSPECIFIED = 0;
  NORMALIZE_LEVEL_NONE = 1; // passthrough
  NORMALIZE_LEVEL_BASE = 2; // percent-normalise only (default)
  NORMALIZE_LEVEL_MERGE_SLASHES = 3; // collapse repeated /
  NORMALIZE_LEVEL_DECODE_AND_MERGE_SLASHES = 4; // decode + collapse
}

// Mirrors coxswain_core::routing::RouteKind.
enum RouteKind {
  ROUTE_KIND_UNSPECIFIED = 0;
  ROUTE_KIND_EXACT = 1;
  ROUTE_KIND_PREFIX = 2;
  ROUTE_KIND_REGEX = 3;
}

// Serialised form of a RouteEntry + the path/kind that registers it.
// `from_wire` replays the appropriate `add_*_route` builder call.
//
// Field layout:
//   identity   1–9 : kind, path, route_id, metric_route_id, cache_enabled
//   extensions 10–29: per-route config DTOs
//   optional   30–39: presence-tracked scalars
//   repeated   40+ : filter lists, CIDR ranges
message RouteEntry {
  // identity
  RouteKind kind = 1; // which add_*_route method to replay
  string path = 2; // path string, normalised prefix, or regex pattern
  string route_id = 3; // "{namespace}/{name}"
  string metric_route_id = 4; // prometheus route label
  bool cache_enabled = 5;
  // nested config extensions
  BackendGroup backend_group = 10;
  MatchPredicates predicates = 11;
  RouteTimeouts timeouts = 12;
  RateLimitConfig rate_limit = 13;
  IngressAuthConfig auth = 14;
  CompressionConfig compression = 15;
  ForwardedForConfig forwarded_for = 16;
  CircuitBreakerConfig circuit_breaker = 17;
  // optional scalars
  optional uint64 created_at_unix_millis = 30; // SystemTime as ms since epoch
  optional uint32 error_status = 31; // non-zero → return this HTTP status
  optional uint64 max_body_size = 32; // bytes; absent = no limit
  optional bool access_log_enabled = 33;
  // repeated
  repeated FilterAction filters = 40;
  repeated string allow_source_range = 41; // CIDR strings, sorted
  repeated string deny_source_range = 42; // CIDR strings, sorted
}

// ────────────────────────────────────────────────────────────────────────────
// BackendGroup DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors BackendGroup + BackendGroupSpec.
// `from_wire` calls BackendGroup::weighted() with the spec then applies setters.
//
// Field layout:
//   identity   1–9 : name, protocol
//   extensions 10–29: tls, retry, load balancing, session affinity
//   optional   30–39: keepalive
//   repeated   40+ : weighted backends, per-backend filters
message BackendGroup {
  // identity
  string name = 1;
  BackendProtocol protocol = 2;
  // nested config extensions
  UpstreamTls tls = 10;
  RetryPolicy retry = 11;
  LoadBalance load_balance = 12;
  SessionAffinity session_affinity = 13;
  // optional scalars
  optional uint64 keepalive_millis = 30; // absent = Pingora default
  // repeated
  repeated WeightedBackend weighted = 40; // BackendGroupSpec; construction order
  repeated PerBackendFiltersEntry per_backend_filters = 41; // index-aligned with `weighted`; sorted by index
}

// One weighted backend: its pod addresses and its weight before GCD reduction.
message WeightedBackend {
  repeated string addrs = 1; // "ip:port" strings, sorted
  uint32 weight = 2; // original pre-GCD weight
}

// Per-backend filter list slot.  Index identifies which WeightedBackend
// it belongs to so the flat index alignment can be reconstructed.
// Only entries with non-empty `filters` are emitted (sparse).
message PerBackendFiltersEntry {
  uint32 backend_index = 1;
  repeated FilterAction filters = 2;
}

// Mirrors BackendProtocol.
enum BackendProtocol {
  BACKEND_PROTOCOL_UNSPECIFIED = 0;
  BACKEND_PROTOCOL_HTTP1 = 1;
  BACKEND_PROTOCOL_H2C = 2;
  BACKEND_PROTOCOL_WEB_SOCKET = 3;
  BACKEND_PROTOCOL_HTTPS = 4;
  BACKEND_PROTOCOL_WEB_SOCKET_TLS = 5;
}

// Mirrors UpstreamTls.
message UpstreamTls {
  string sni = 1;
  oneof ca {
    bool system = 2; // true = use OS trust store
    bytes bundle = 3; // PEM bytes
  }
  uint64 group_key = 4;
}

// Mirrors RetryPolicy.
message RetryPolicy {
  uint32 max_retries = 1;
  bool on_connect_failure = 2;
  bool on_timeout = 3;
  bool on_http_5xx = 4;
}

// Mirrors LoadBalance + HashSource.
message LoadBalance {
  oneof algorithm {
    bool round_robin = 1; // present = RoundRobin
    bool least_conn = 2; // present = LeastConn
    bool ewma = 3; // present = Ewma
    HashSource hash = 4; // Hash(source)
  }
}

// Mirrors HashSource.
message HashSource {
  oneof source {
    bool uri = 1; // Uri
    bool source_ip = 2; // SourceIp
    string header = 3; // Header(name)
    string cookie = 4; // Cookie(name)
  }
}

// Mirrors SessionAffinity.
message SessionAffinity {
  oneof mode {
    string cookie_name = 1; // Cookie { cookie_name }
    string header = 2; // Header { header }
  }
}

// ────────────────────────────────────────────────────────────────────────────
// Filter actions
// ────────────────────────────────────────────────────────────────────────────

// Mirrors FilterAction.
message FilterAction {
  oneof action {
    HeaderMod request_header_modifier = 1;
    HeaderMod response_header_modifier = 2;
    RequestRedirect request_redirect = 3;
    UrlRewrite url_rewrite = 4;
    BackendGroup mirror = 5; // Mirror { backend }
  }
}

// Mirrors HeaderMod — raw strings; from_wire calls HeaderMod::parse.
message HeaderMod {
  repeated string remove = 1;
  repeated HeaderPair add = 2;
  repeated HeaderPair set = 3;
}

message HeaderPair {
  string name = 1;
  string value = 2;
}

// Mirrors FilterAction::RequestRedirect.
message RequestRedirect {
  uint32 status_code = 1; // default 302
  PathModifier path = 2;
  optional string scheme = 3;
  optional string hostname = 4;
  optional uint32 port = 5; // u16
}

// Mirrors FilterAction::UrlRewrite.
message UrlRewrite {
  PathModifier path = 1;
  optional string hostname = 2;
}

// Mirrors PathModifier.
message PathModifier {
  oneof modifier {
    string replace_full_path = 1;
    ReplacePrefix replace_prefix = 2;
    RegexReplace regex_replace = 3;
  }
}

message ReplacePrefix {
  string prefix = 1;
  string replacement = 2;
}

// Regex pattern stored as a string; from_wire recompiles with Regex::new.
message RegexReplace {
  string pattern = 1; // Regex::as_str() — the source string, not flags
  string replacement = 2;
}

// ────────────────────────────────────────────────────────────────────────────
// Predicates
// ────────────────────────────────────────────────────────────────────────────

// Mirrors MatchPredicates.
message MatchPredicates {
  optional string method = 1; // HTTP method string
  repeated HeaderPredicate headers = 2;
  repeated QueryPredicate query = 3;
}

// Mirrors HeaderPredicate.
message HeaderPredicate {
  string name = 1;
  ValueMatch matcher = 2;
}

// Mirrors QueryPredicate.
message QueryPredicate {
  string name = 1;
  ValueMatch matcher = 2;
}

// Mirrors ValueMatch (Exact and Regex only; Prefix/Present are not supported).
message ValueMatch {
  oneof value {
    string exact = 1; // Exact(value)
    string regex = 2; // Regex(pattern string); from_wire recompiles
  }
  reserved 3, 4;
  reserved "prefix", "present";
}

// ────────────────────────────────────────────────────────────────────────────
// Timeouts
// ────────────────────────────────────────────────────────────────────────────

// Mirrors RouteTimeouts.  All fields optional; absent = disabled.
message RouteTimeouts {
  Duration request = 1;
  Duration backend_request = 2;
  Duration connect = 3;
  Duration read = 4;
  Duration send = 5;
}

// A Duration encoded as (secs, nanos) — avoids float and the protobuf well-known
// Duration type (which requires google/protobuf/duration.proto).
message Duration {
  uint64 secs = 1;
  uint32 nanos = 2;
}

// ────────────────────────────────────────────────────────────────────────────
// Per-route config DTOs
// ────────────────────────────────────────────────────────────────────────────

// Mirrors RateLimitConfig.
message RateLimitConfig {
  uint32 requests_per_second = 1; // NonZeroU32; 0 absent → field not set
  uint32 burst = 2;
  RateLimitKey key = 3;
}

// Mirrors RateLimitKey.
message RateLimitKey {
  oneof dimension {
    bool client_ip = 1; // true = ClientIp
    string header = 2; // Header(name)
  }
}

// Mirrors IngressAuthConfig.
message IngressAuthConfig {
  oneof auth {
    ExtAuthConfig external = 1;
    BasicCredList basic = 2; // wrapped in a message to allow repeated inside oneof
    bool unavailable = 3;
  }
}

// Wrapper for the repeated basic credentials list (proto oneof cannot hold repeated directly).
message BasicCredList {
  repeated BasicCred credentials = 1;
}

// Mirrors ExtAuthConfig.
// ExtAuthTransport has one variant (Http) so the HttpExtAuthConfig is embedded directly.
message ExtAuthConfig {
  Duration timeout = 1;
  HttpExtAuthConfig http = 2; // always Http for now; field number reserved for future variants
}

// Mirrors HttpExtAuthConfig.
message HttpExtAuthConfig {
  string url = 1;
  bool always_set_cookie = 2;
  repeated string response_headers = 3;
}

// BasicCredential with the password hash.
message BasicCred {
  string username = 1;
  PasswordHash hash_kind = 2;
  string hash = 3; // bcrypt hash string or SHA1 base64 digest
}

enum PasswordHash {
  PASSWORD_HASH_UNSPECIFIED = 0;
  PASSWORD_HASH_BCRYPT = 1;
  PASSWORD_HASH_SHA1 = 2;
}

// Mirrors CompressionConfig.
message CompressionConfig {
  bool gzip = 1;
  bool brotli = 2;
  uint32 level = 3;
  uint64 min_size = 4;
  repeated string types = 5; // sorted for determinism
}

// Mirrors ForwardedForConfig.
message ForwardedForConfig {
  string header = 1;
  repeated string trusted_cidrs = 2; // CIDR strings, sorted
}

// Mirrors CircuitBreakerConfig.
message CircuitBreakerConfig {
  uint32 threshold_pct = 1; // 1–100
  uint32 min_requests = 2;
  Duration window = 3;
  Duration open_duration = 4;
  Duration max_open_duration = 5; // absent = constant backoff (None)
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  TLS store DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors TlsStore.  Sorted by host pattern ascending.
message TlsStore {
  TlsCert default = 1; // absent = no default cert
  repeated TlsCertEntry exact = 2;
  repeated TlsCertEntry wildcard = 3; // suffix without "*." prefix; sorted
}

message TlsCertEntry {
  string host_pattern = 1; // exact hostname or bare suffix
  TlsCert cert = 2;
}

message TlsCert {
  string source = 1;
  bytes cert_pem = 2;
  bytes key_pem = 3;
  optional uint64 not_after_unix_secs = 4;
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  Client-cert (mTLS) store DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors ClientCertStore.  Sorted by host pattern ascending.
message ClientCertStore {
  ClientCertConfigState default = 1;
  repeated ClientCertEntry exact = 2;
  repeated ClientCertEntry wildcard = 3;
}

message ClientCertEntry {
  string host_pattern = 1;
  ClientCertConfigState state = 2;
}

message ClientCertConfigState {
  oneof kind {
    ClientCertConfig config = 1; // Config(cfg)
    bool unavailable = 2; // Unavailable
  }
}

message ClientCertConfig {
  bytes ca_pem = 1;
  uint32 verify_depth = 2;
  bool pass_to_upstream = 3;
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  Gateway listener health DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors the HashMap<ObjectKey, GatewayListenerHealth>.
// Sorted by object key ascending for determinism.
message GatewayListenerHealth {
  repeated GatewayHealthEntry entries = 1;
}

message GatewayHealthEntry {
  string object_key = 1; // "{namespace}/{name}"
  ListenerHealth health = 2;
}

// Mirrors GatewayListenerHealth.
// BTreeMap<String, ListenerInfo> → already sorted by listener name.
message ListenerHealth {
  repeated ListenerInfoEntry listeners = 1;
}

message ListenerInfoEntry {
  string name = 1;
  ListenerInfo info = 2;
}

// Mirrors ListenerInfo.
message ListenerInfo {
  ListenerTlsOutcome tls_outcome = 1;
  string tls_message = 2; // human-readable message from ListenerTlsOutcome failure variants; empty for NotApplicable and Resolved
  string hostname = 3;
  bool allows_all_namespaces = 4;
  int32 attached_routes = 5;
  uint32 port = 6; // u16
}

// Mirrors ListenerTlsOutcome.
enum ListenerTlsOutcome {
  LISTENER_TLS_OUTCOME_UNSPECIFIED = 0;
  LISTENER_TLS_OUTCOME_NOT_APPLICABLE = 1;
  LISTENER_TLS_OUTCOME_RESOLVED = 2;
  LISTENER_TLS_OUTCOME_REF_NOT_PERMITTED = 3;
  LISTENER_TLS_OUTCOME_INVALID_CERTIFICATE_REF = 4;
  LISTENER_TLS_OUTCOME_INVALID = 5;
}
