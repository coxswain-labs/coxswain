syntax = "proto3";

package coxswain.discovery.v1;

// Bidirectional gRPC stream between a discovery client and the controller.
//
// The client sends a Subscribe once to declare scope, then Ack/Nack after each
// snapshot.  The server sends Snapshot messages as the routing world changes.
// Envelopes are extensible oneofs — future message types (relay telemetry,
// drain commands) can be added without a wire break.
//
// Bootstrap is a separate unary RPC served on its own listener (server-auth-only
// TLS, no client cert required).  A fresh proxy with no SVID sends its
// ServiceAccount token + a CSR and receives a signed SVID + the trust bundle.
// After bootstrapping the proxy connects to Stream using its new SVID.
service Discovery {
  rpc Stream(stream ClientMessage) returns (stream ServerMessage);
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse);
}

// ────────────────────────────────────────────────────────────────────────────
// Bootstrap RPC messages
// ────────────────────────────────────────────────────────────────────────────

// Sent by a proxy that has no SVID yet (or is rotating its SVID).
// The SA token authenticates the proxy; the CSR carries the proxy's public key
// only — the private key never leaves the proxy process.
message BootstrapRequest {
  string sa_token = 1;      // Kubernetes projected ServiceAccount token
  bytes csr_pem = 2;        // PEM-encoded PKCS#10 CSR with SPIFFE URI-SAN
  uint32 wire_version = 3;  // wire protocol version (WIRE_VERSION constant)
}

// Returned on success.  The proxy uses svid_cert_pem + its local private key
// to open the mTLS Stream connection.  trust_bundle_pem should be persisted
// and fed to DiscoveryClientTls so subsequent Stream connections can verify
// the controller's server cert.
message BootstrapResponse {
  bytes svid_cert_pem = 1;      // PEM-encoded SVID cert signed by the controller CA
  bytes trust_bundle_pem = 2;   // PEM-encoded CA bundle (one or more roots for overlap during rotation)
  int64 not_after_unix = 3;     // SVID expiry as Unix seconds (UTC)
}

// ────────────────────────────────────────────────────────────────────────────
// Client → server
// ────────────────────────────────────────────────────────────────────────────

message ClientMessage {
  oneof kind {
    Subscribe subscribe = 1;
    Ack ack = 2;
    Nack nack = 3;
    NodeStatus node_status = 4; // node telemetry (#531); additive, WIRE_VERSION stays 1
  }
}

// Declares the scope and protocol version this client speaks.
message Subscribe {
  string node_id = 1; // stable identity of the subscribing proxy (pod UID or hostname)
  uint32 wire_version = 2; // wire protocol version integer spoken by this client (WIRE_VERSION = 1)
  Scope scope = 3; // requested scope; server dispatches snapshot by scope (WIRE_VERSION 2+)
}

// The slice of the routing world this client subscribes to.
//
// Added in WIRE_VERSION 2. A shared-pool proxy sends `shared_pool`; a
// dedicated proxy sends `gateway` with the Gateway namespace+name it owns.
// The server uses the scope to build a per-subscriber snapshot: shared_pool
// receives all non-cut-over Gateways + Ingress; gateway receives only the
// routing table for that one Gateway.
//
// Absent or unrecognised `kind` → server treats as SharedPool (safe default).
message Scope {
  oneof kind {
    SharedPoolScope shared_pool = 1;
    GatewayScope gateway = 2;
  }
}

// Shared proxy pool: full routing world (all non-cut-over Gateways + Ingress).
message SharedPoolScope {}

// A single dedicated Gateway's routing world.
message GatewayScope {
  string namespace = 1;
  string name = 2;
}

// Positive acknowledgement: client has applied the snapshot at `version`.
message Ack {
  string version = 1;
  bytes nonce = 2;
}

// Negative acknowledgement: client rejected the snapshot at `version`.
message Nack {
  string version = 1;
  bytes nonce = 2;
  string detail = 3;
}

// Proxy → controller node telemetry (#531). Sent once immediately after
// Subscribe and again on every change of the reported state. Not tied to the
// Ack flow-control cycle: listener binds complete asynchronously after a
// snapshot is applied, so bind state has its own message.
message NodeStatus {
  // Listener ports this node is currently accepting on (successfully bound
  // listeners only; bind-failed and draining ports excluded). u16 values as
  // uint32, sorted ascending. Wholesale-replace semantics: this is the node's
  // complete current set; a transient empty set during listener drain/rebind
  // is legal (the controller's Programmed gate anti-flaps).
  repeated uint32 bound_ports = 1;
}

// ────────────────────────────────────────────────────────────────────────────
// Server → client
// ────────────────────────────────────────────────────────────────────────────

message ServerMessage {
  oneof kind {
    Snapshot snapshot = 1;
    // reserved 2..: Command (drain / dump-config) — DEFERRED
  }
}

// Full state-of-the-world snapshot for the subscribed scope.
//
// Determinism discipline: every `repeated` field that was a map in the runtime
// type is emitted sorted by key in `to_wire`.  No `map<>` anywhere — proto map
// encoding order is not guaranteed and would break the content-hash oracle.
//
// Field layout:
//   identity  1–9   : version, nonce
//   extensions 10–29: per-resource DTOs
//   repeated  40+   : reserved for v0.6 delta streaming removes set
message Snapshot {
  // identity
  string version = 1; // content hash of this scope's DTO (sha256 hex)
  bytes nonce = 2;
  // nested DTO extensions
  RoutingTable ingress_routing = 10;
  RoutingTable gateway_routing = 11;
  // Per-port (#472): keyed by the bind port the proxy accepts HTTPS on, so each
  // shared-mode Gateway's terminate certs are isolated to its own internal port.
  PortTlsStore tls_store = 12;
  ClientCertStore client_cert_store = 13;
  GatewayListenerStatus listener_status = 14;
  TlsPassthroughTable tls_passthrough = 15;
  // TLSRouteModeTerminate (#481): SNI→plaintext-backend table; proxy terminates TLS
  // on accept and L4-splices the decrypted stream. Reuses TlsPassthroughTable message.
  TlsPassthroughTable tls_terminate = 16;
  // TCPRoute (#505): port→backend table, no SNI/hostname dimension.
  TcpRouteTable tcp_proxy = 17;
  // repeated (reserved for v0.6 delta streaming)
  reserved 40;
  reserved "removed_resources";
}

// ────────────────────────────────────────────────────────────────────────────
// 2a  Routing table DTO
// ────────────────────────────────────────────────────────────────────────────

message RoutingTable {
  repeated PortEntry ports = 1; // sorted by port ascending
}

message PortEntry {
  uint32 port = 1; // u16 stored as uint32
  repeated HostEntry hosts = 2; // exact hosts, then wildcard, then catchall
}

// Per-host routing bucket.  Exactly one of `exact`, `wildcard`, or `catchall`
// is set; the oneof also encodes which PortTableBuilder method to replay.
message HostEntry {
  oneof pattern {
    string exact = 1; // exact hostname
    WildcardHost wildcard = 2; // *.suffix entry
    bool catchall = 3; // true = catch-all bucket
  }
  NormalizeLevel normalize_level = 4;
  repeated RouteEntry routes = 5; // in insertion order (preserves wire_entries() traversal order)
}

// Wildcard host bucket discriminated by suffix and matching semantics.
message WildcardHost {
  string suffix = 1; // e.g. "example.com" (no "*." prefix)
  WildcardKind kind = 2;
}

enum WildcardKind {
  WILDCARD_KIND_UNSPECIFIED = 0;
  WILDCARD_KIND_SINGLE_LABEL = 1; // Ingress: only one label before suffix
  WILDCARD_KIND_MULTI_LABEL = 2; // Gateway API: any number of labels
}

// Mirrors coxswain_core::routing::NormalizeLevel.
enum NormalizeLevel {
  NORMALIZE_LEVEL_UNSPECIFIED = 0;
  NORMALIZE_LEVEL_BASE = 1; // percent-normalise only (default, secure floor)
  NORMALIZE_LEVEL_MERGE_SLASHES = 2; // collapse repeated /
  NORMALIZE_LEVEL_DECODE_AND_MERGE_SLASHES = 3; // decode + collapse
}

// Mirrors coxswain_core::routing::RouteKind.
enum RouteKind {
  ROUTE_KIND_UNSPECIFIED = 0;
  ROUTE_KIND_EXACT = 1;
  ROUTE_KIND_PREFIX = 2;
  ROUTE_KIND_REGEX = 3;
}

// Serialised form of a RouteEntry + the path/kind that registers it.
// `from_wire` replays the appropriate `add_*_route` builder call.
//
// Field layout:
//   identity   1–9 : kind, path, route_id, metric_route_id
//   extensions 10–29: per-route config DTOs
//   optional   30–39: presence-tracked scalars
//   repeated   40+ : filter lists, CIDR ranges
message RouteEntry {
  // Field 5 was `bool cache_enabled` (response caching, #40); removed in #477.
  reserved 5;
  reserved "cache_enabled";
  // identity
  RouteKind kind = 1; // which add_*_route method to replay
  string path = 2; // path string, normalised prefix, or regex pattern
  string route_id = 3; // "{namespace}/{name}"
  string metric_route_id = 4; // prometheus route label
  string path_pattern = 6; // matched rule pattern for access-log `pattern` mode

  // nested config extensions
  BackendGroup backend_group = 10;
  MatchPredicates predicates = 11;
  RouteTimeouts timeouts = 12;
  RateLimitConfig rate_limit = 13;
  // Additive ext_authz chain (#23): every check must pass, in order. A single
  // Ingress/route check encodes as one element; a Gateway policy + route check
  // as two. Empty = no auth. (Was a singular message pre-#23; a 1-element
  // repeated is wire-identical, and controller+proxy ship as a matched pair.)
  repeated IngressAuthConfig auth = 14;
  CompressionConfig compression = 15;
  ForwardedForConfig forwarded_for = 16;
  CircuitBreakerConfig circuit_breaker = 17;
  // optional scalars
  optional uint64 created_at_unix_millis = 30; // SystemTime as ms since epoch
  optional uint32 error_status = 31; // non-zero → return this HTTP status
  optional uint64 max_body_size = 32; // bytes; absent = no limit
  optional bool access_log_enabled = 33;
  // repeated
  repeated FilterAction filters = 40;
  repeated string allow_source_range = 41; // CIDR strings, sorted
  repeated string deny_source_range = 42; // CIDR strings, sorted
}

// ────────────────────────────────────────────────────────────────────────────
// BackendGroup DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors BackendGroup + BackendGroupSpec.
// `from_wire` calls BackendGroup::weighted() with the spec then applies setters.
//
// Field layout:
//   identity   1–9 : name, protocol
//   extensions 10–29: tls, retry, load balancing, session affinity
//   optional   30–39: keepalive
//   repeated   40+ : weighted backends, per-backend filters
message BackendGroup {
  // identity
  string name = 1;
  BackendProtocol protocol = 2;
  // nested config extensions
  UpstreamTls tls = 10;
  RetryPolicy retry = 11;
  LoadBalance load_balance = 12;
  SessionAffinity session_affinity = 13;
  // optional scalars
  optional uint64 keepalive_millis = 30; // absent = Pingora default
  optional uint64 connect_millis = 31; // CoxswainBackendPolicy spec.timeouts.connect (#354); absent = route/backendRequest fallback
  // repeated
  repeated WeightedBackend weighted = 40; // BackendGroupSpec; construction order
  repeated PerBackendFiltersEntry per_backend_filters = 41; // index-aligned with `weighted`; sorted by index
}

// One weighted backend: its pod addresses and its weight before GCD reduction.
message WeightedBackend {
  repeated string addrs = 1; // "ip:port" strings, sorted
  uint32 weight = 2; // original pre-GCD weight
}

// Per-backend filter list slot.  Index identifies which WeightedBackend
// it belongs to so the flat index alignment can be reconstructed.
// Only entries with non-empty `filters` are emitted (sparse).
message PerBackendFiltersEntry {
  uint32 backend_index = 1;
  repeated FilterAction filters = 2;
}

// Mirrors BackendProtocol — a pure wire-protocol hint (GEP-1911). It carries no
// TLS semantics: upstream TLS is originated solely by a BackendTLSPolicy
// (GEP-1897), surfaced via the UpstreamTls message. Tags 4/5 held the former
// HTTPS / WSS TLS-implying values (issue #466) and are reserved to prevent reuse.
enum BackendProtocol {
  reserved 4, 5;
  reserved "BACKEND_PROTOCOL_HTTPS", "BACKEND_PROTOCOL_WEB_SOCKET_TLS";
  BACKEND_PROTOCOL_UNSPECIFIED = 0;
  BACKEND_PROTOCOL_HTTP1 = 1;
  BACKEND_PROTOCOL_H2C = 2;
  BACKEND_PROTOCOL_WEB_SOCKET = 3;
}

// Mirrors SubjectAltName — one entry from BackendTLSPolicy.spec.validation.subjectAltNames.
message SubjectAltName {
  enum Kind {
    // DNS-type SAN (policy type: Hostname). Matched with RFC 6125 single-label wildcard rules.
    HOSTNAME = 0;
    // URI-type SAN (policy type: URI, e.g. SPIFFE ID). Matched exactly (case-sensitive).
    URI = 1;
  }
  Kind kind = 1;
  string value = 2;
}

// Mirrors UpstreamTls.
message UpstreamTls {
  string sni = 1;
  oneof ca {
    bool system = 2; // true = use OS trust store
    bytes bundle = 3; // PEM bytes
  }
  uint64 group_key = 4;
  // GEP-3155 backend client certificate the Gateway presents to the upstream.
  // All three empty/absent = no client cert. client_cert_source is "ns/name".
  bytes client_cert_pem = 5;
  bytes client_cert_key = 6;
  string client_cert_source = 7;
  // GEP-1897 subjectAltNames — identity the upstream leaf cert must present.
  // Empty = feature off (hostname-based verification). Non-empty = hostname
  // verification disabled; proxy checks >=1 SAN entry matches. Added in v0.5 (field 8).
  repeated SubjectAltName subject_alt_names = 8;
}

// Mirrors RetryPolicyConfig (GEP-1731-shaped: attempts / backoff / codes).
// Reshaped in v0.5: connection/timeout retries are implicit when attempts>=1;
// http_codes/grpc_codes replace the old on_* condition bits.
message RetryPolicy {
  uint32 attempts = 1;
  // Minimum delay before a retried attempt, in milliseconds. 0 = no backoff.
  uint32 backoff_ms = 2;
  // HTTP response status codes that trigger a retry.
  repeated uint32 http_codes = 3;
  // grpc-status codes that trigger a retry on a trailers-only gRPC response.
  repeated uint32 grpc_codes = 4;
}

// Mirrors LoadBalance + HashSource.
message LoadBalance {
  oneof algorithm {
    bool round_robin = 1; // present = RoundRobin
    bool least_conn = 2; // present = LeastConn
    bool ewma = 3; // present = Ewma
    HashSource hash = 4; // Hash(source)
  }
}

// Mirrors HashSource.
message HashSource {
  oneof source {
    bool uri = 1; // Uri
    bool source_ip = 2; // SourceIp
    string header = 3; // Header(name)
    string cookie = 4; // Cookie(name)
  }
}

// Mirrors SessionAffinity.
message SessionAffinity {
  oneof mode {
    string cookie_name = 1; // Cookie { cookie_name }
    string header = 2; // Header { header }
  }
}

// ────────────────────────────────────────────────────────────────────────────
// Filter actions
// ────────────────────────────────────────────────────────────────────────────

// Mirrors FilterAction.
message FilterAction {
  oneof action {
    HeaderMod request_header_modifier = 1;
    HeaderMod response_header_modifier = 2;
    RequestRedirect request_redirect = 3;
    UrlRewrite url_rewrite = 4;
    MirrorFilter mirror = 5; // Mirror { backend, fraction }
    CorsFilter cors = 6;     // Cors(Arc<CorsConfig>)
  }
}

// Mirrors FilterAction::Mirror — carries the pre-resolved backend and an optional
// GEP-3171 sampling fraction.  fraction absent ≡ 100% (mirror every request).
message MirrorFilter {
  BackendGroup backend = 1;
  optional MirrorFractionProto fraction = 2;
}

// Mirrors MirrorFraction — normalised numerator/denominator.
// Invariants: denominator > 0, numerator ≤ denominator.
message MirrorFractionProto {
  uint32 numerator = 1;
  uint32 denominator = 2;
}

// Mirrors CorsConfig — from_wire parses these back into pre-rendered HeaderValues.
message CorsFilter {
  repeated string allow_origins = 1; // raw origin strings (may contain '*'); see CorsOrigin
  bool allow_all_origins = 2;
  bool allow_credentials = 3;
  // Pre-joined header-value strings (e.g. "GET, POST").  Empty string means absent.
  optional string allow_methods = 4;
  optional string allow_headers = 5;
  optional string expose_headers = 6;
  int32 max_age = 7; // seconds; default 5
}

// Mirrors HeaderMod — raw strings; from_wire calls HeaderMod::parse.
message HeaderMod {
  repeated string remove = 1;
  repeated HeaderPair add = 2;
  repeated HeaderPair set = 3;
}

message HeaderPair {
  string name = 1;
  string value = 2;
}

// Mirrors FilterAction::RequestRedirect.
message RequestRedirect {
  uint32 status_code = 1; // default 302
  PathModifier path = 2;
  optional string scheme = 3;
  optional string hostname = 4;
  optional uint32 port = 5; // u16
}

// Mirrors FilterAction::UrlRewrite.
message UrlRewrite {
  PathModifier path = 1;
  optional string hostname = 2;
}

// Mirrors PathModifier.
message PathModifier {
  oneof modifier {
    string replace_full_path = 1;
    ReplacePrefix replace_prefix = 2;
    RegexReplace regex_replace = 3;
  }
}

message ReplacePrefix {
  string prefix = 1;
  string replacement = 2;
}

// Regex pattern stored as a string; from_wire recompiles with Regex::new.
message RegexReplace {
  string pattern = 1; // Regex::as_str() — the source string, not flags
  string replacement = 2;
}

// ────────────────────────────────────────────────────────────────────────────
// Predicates
// ────────────────────────────────────────────────────────────────────────────

// Mirrors MatchPredicates.
message MatchPredicates {
  optional string method = 1; // HTTP method string
  repeated HeaderPredicate headers = 2;
  repeated QueryPredicate query = 3;
}

// Mirrors HeaderPredicate.
message HeaderPredicate {
  string name = 1;
  ValueMatch matcher = 2;
}

// Mirrors QueryPredicate.
message QueryPredicate {
  string name = 1;
  ValueMatch matcher = 2;
}

// Mirrors ValueMatch (Exact and Regex only; Prefix/Present are not supported).
message ValueMatch {
  oneof value {
    string exact = 1; // Exact(value)
    string regex = 2; // Regex(pattern string); from_wire recompiles
  }
  reserved 3, 4;
  reserved "prefix", "present";
}

// ────────────────────────────────────────────────────────────────────────────
// Timeouts
// ────────────────────────────────────────────────────────────────────────────

// Mirrors RouteTimeouts.  All fields optional; absent = disabled.
message RouteTimeouts {
  Duration request = 1;
  Duration backend_request = 2;
  Duration connect = 3;
  Duration read = 4;
  Duration send = 5;
}

// A Duration encoded as (secs, nanos) — avoids float and the protobuf well-known
// Duration type (which requires google/protobuf/duration.proto).
message Duration {
  uint64 secs = 1;
  uint32 nanos = 2;
}

// ────────────────────────────────────────────────────────────────────────────
// Per-route config DTOs
// ────────────────────────────────────────────────────────────────────────────

// Mirrors RateLimitConfig.
message RateLimitConfig {
  uint32 requests_per_second = 1; // NonZeroU32; 0 absent → field not set
  uint32 burst = 2;
  RateLimitKey key = 3;
}

// Mirrors RateLimitKey.
message RateLimitKey {
  oneof dimension {
    bool client_ip = 1; // true = ClientIp
    string header = 2; // Header(name)
  }
}

// Mirrors IngressAuthConfig.
message IngressAuthConfig {
  oneof auth {
    ExtAuthConfig external = 1;
    BasicCredList basic = 2; // wrapped in a message to allow repeated inside oneof
    bool unavailable = 3;
    JwtAuthConfig jwt = 4; // JwtAuth CRD / auth-jwt annotation (#441)
  }
}

// Wrapper for the repeated basic credentials list (proto oneof cannot hold repeated directly).
message BasicCredList {
  repeated BasicCred credentials = 1;
}

// Mirrors ExtAuthConfig. The auth-service backendRef is resolved to `endpoints`
// ("ip:port") at reconcile time; the proxy connects to one directly.
message ExtAuthConfig {
  Duration timeout = 1;
  HttpExtAuthConfig http = 2; // present for protocol=HTTP
  repeated string endpoints = 3; // resolved backendRef pod addresses
  bool fail_closed = 4; // deny (503) on auth-service error/timeout; resolved from CRD failClosed
  GrpcExtAuthConfig grpc = 5; // present for protocol=GRPC (Envoy ext_authz proto, #23)
}

// Mirrors HttpExtAuthConfig. Check-target endpoints live on ExtAuthConfig.
message HttpExtAuthConfig {
  bool always_set_cookie = 2;
  repeated string response_headers = 3;
}

// Mirrors GrpcExtAuthConfig. Envoy envoy.service.auth.v3 transport; check-target
// endpoints live on ExtAuthConfig.
message GrpcExtAuthConfig {
  repeated string response_headers = 1; // allowed_upstream_headers copied from OkHttpResponse on allow
}

// BasicCredential with the password hash.
message BasicCred {
  string username = 1;
  PasswordHash hash_kind = 2;
  string hash = 3; // bcrypt hash string or SHA1 base64 digest
}

enum PasswordHash {
  PASSWORD_HASH_UNSPECIFIED = 0;
  PASSWORD_HASH_BCRYPT = 1;
  PASSWORD_HASH_SHA1 = 2;
}

// Mirrors JwtConfig. `jwks` is the resolved JSON Web Key Set as verbatim JSON
// text — inline CRD JWKS and a controller-fetched remote JWKS both collapse
// to this same representation; the proxy never fetches keys itself.
message JwtAuthConfig {
  string issuer = 1;
  repeated string audiences = 2;
  string jwks = 3; // resolved JWK Set JSON text (RFC 7517 `{"keys": [...]}`)
  repeated JwtHeaderLocation from_headers = 4;
  optional string forward_payload_header = 5;
  repeated ClaimToHeader claim_to_headers = 6;
  bool forward_token = 7;
}

// Mirrors JwtHeaderLoc.
message JwtHeaderLocation {
  string name = 1;
  string value_prefix = 2;
}

// Mirrors the (claim, header) pairs in JwtConfig.claim_to_headers.
message ClaimToHeader {
  string claim = 1;
  string header = 2;
}

// Mirrors CompressionConfig.
message CompressionConfig {
  bool gzip = 1;
  bool brotli = 2;
  uint32 level = 3;
  uint64 min_size = 4;
  repeated string types = 5; // sorted for determinism
}

// Mirrors ForwardedForConfig.
message ForwardedForConfig {
  string header = 1;
  repeated string trusted_cidrs = 2; // CIDR strings, sorted
}

// Mirrors CircuitBreakerConfig.
message CircuitBreakerConfig {
  uint32 threshold_pct = 1; // 1–100
  uint32 min_requests = 2;
  Duration window = 3;
  Duration open_duration = 4;
  Duration max_open_duration = 5; // absent = constant backoff (None)
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  TLS store DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors PortTlsStore (#472): per-bind-port partition of the terminate cert
// store. Sorted by port ascending for hash determinism.
message PortTlsStore {
  repeated PortTlsEntry ports = 1;
}

message PortTlsEntry {
  uint32 port = 1; // u16 bind port (internal port for shared-mode Gateways)
  TlsStore store = 2;
}

// Mirrors TlsStore.  Sorted by host pattern ascending.
message TlsStore {
  repeated TlsCert default_certs = 1; // absent / empty = no default cert
  repeated TlsCertEntry exact = 2;
  repeated TlsCertEntry wildcard = 3; // suffix without "*." prefix; sorted
}

message TlsCertEntry {
  string host_pattern = 1; // exact hostname or bare suffix
  repeated TlsCert certs = 2; // sorted: ECDSA first, then RSA, then Other; newest notAfter first
}

// Mirrors TlsCert + KeyAlgorithm.
message TlsCert {
  string source = 1;
  bytes cert_pem = 2;
  bytes key_pem = 3;
  optional uint64 not_after_unix_secs = 4;
  KeyAlgorithm key_algorithm = 5; // absent / UNSPECIFIED maps to Other
}

// Mirrors coxswain_core::tls::KeyAlgorithm.
enum KeyAlgorithm {
  KEY_ALGORITHM_UNSPECIFIED = 0; // treated as Other on decode
  KEY_ALGORITHM_RSA = 1;
  KEY_ALGORITHM_ECDSA = 2;
  KEY_ALGORITHM_OTHER = 3;
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  Client-cert (mTLS) store DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors ClientCertStore (port-scoped — GEP-91 same-hostname collision fix):
// every (bind port, host pattern) → state mapping. Encoding is canonical so
// equal stores hash to equal snapshot versions: ports ascending, patterns
// sorted within each port, and the port's default (catch-all) entry — empty
// host_pattern — appended last. A leading "*." marks a wildcard pattern.
message ClientCertStore {
  repeated ClientCertEntry entries = 1;
}

message ClientCertEntry {
  string host_pattern = 1;
  ClientCertConfigState state = 2;
  uint32 port = 3; // u16 bind port
}

message ClientCertConfigState {
  oneof kind {
    ClientCertConfig config = 1; // Config(cfg)
    bool unavailable = 2; // Unavailable
  }
}

message ClientCertConfig {
  bytes ca_pem = 1;
  uint32 verify_depth = 2;
  bool pass_to_upstream = 3;
  // GEP-91 AllowInsecureFallback: when true the proxy requests the client cert
  // but never aborts the handshake on missing/invalid cert (authz delegated to
  // the backend). Defaults to false (AllowValidOnly). Added in #86.
  bool allow_insecure_fallback = 4;
}

// ────────────────────────────────────────────────────────────────────────────
// 2b  Gateway listener status DTO
// ────────────────────────────────────────────────────────────────────────────

// Mirrors the HashMap<ObjectKey, GatewayListenerStatus>.
// Sorted by object key ascending for determinism.
message GatewayListenerStatus {
  repeated GatewayStatusEntry entries = 1;
}

message GatewayStatusEntry {
  string object_key = 1; // "{namespace}/{name}"
  ListenerStatus status = 2;
}

// Mirrors GatewayListenerStatus.
// BTreeMap<ListenerStatusKey, ListenerInfo> → already sorted by (source, name).
message ListenerStatus {
  repeated ListenerInfoEntry listeners = 1;
}

message ListenerInfoEntry {
  string name = 1;
  ListenerInfo info = 2;
  // GEP-1713 listener provenance. Empty string = declared on the parent Gateway
  // itself; otherwise the contributing ListenerSet's "{namespace}/{name}" key.
  // Listener names are unique only within a source, so (source, name) is the
  // decode key — without it two same-named listeners from different sources
  // would collapse to one entry. Additive field; pre-1713 proxies ignore it.
  string source = 3;
}

// Mirrors ListenerInfo.
message ListenerInfo {
  ListenerReadiness readiness = 1;
  string detail = 2; // human-readable message from ListenerReadiness failure variants; empty for NotApplicable and Resolved
  string hostname = 3;
  bool allows_all_namespaces = 4;
  int32 attached_routes = 5;
  uint32 port = 6; // u16 — the listener spec port clients connect to and status reports (#472)
  // u16 — the internal targetPort the shared proxy binds and keys routing on, so
  // each shared-mode Gateway is isolated on its own VIP:port → internal port
  // (#472). 0 means "not separately allocated; bind the spec port" (dedicated
  // mode, Ingress-derived listeners) — decode falls back to `port`.
  uint32 internal_port = 7;
  // GEP-1713 — true when this listener lost a port-compatibility conflict to a
  // higher-precedence listener in the Gateway's effective set. The proxy must NOT
  // bind a conflicted listener; it is retained only so the controller can emit the
  // Conflicted condition. Additive field; pre-1713 proxies decode it as false.
  bool conflicted = 8;
  // GEP-1713 — when `conflicted` is true, distinguishes the conflict reason:
  // false = HostnameConflict; true = ProtocolConflict.
  // Additive field; pre-1713 decoders read it as false (HostnameConflict), which
  // is the common case. Wire version stays 1.
  bool protocol_conflict = 9;
  // PROXY protocol acceptance config resolved from a ClientTrafficPolicy.
  // Absent = no policy; proxy defaults to off for this listener.
  // Additive field; pre-CTP proxies decode it as absent (off). Wire version stays 1.
  optional ProxyProtocolListenerConfig proxy_protocol = 10;
}

// PROXY protocol config for one listener, resolved by the controller from a
// ClientTrafficPolicy. Transported to the proxy so it knows which listeners
// require PROXY headers and which peer CIDRs to trust.
message ProxyProtocolListenerConfig {
  // true = expect and require a PROXY v1/v2 header on every connection.
  bool enabled = 1;
  // CIDR allow-list (string representation, e.g. "10.0.0.0/8").
  repeated string trusted_sources = 2;
}

// Mirrors ListenerReadiness (a listener's readiness outcome; failure causes are TLS-specific).
enum ListenerReadiness {
  LISTENER_READINESS_UNSPECIFIED = 0;
  LISTENER_READINESS_NOT_APPLICABLE = 1;
  LISTENER_READINESS_RESOLVED = 2;
  LISTENER_READINESS_REF_NOT_PERMITTED = 3;
  LISTENER_READINESS_INVALID_CERTIFICATE_REF = 4;
  LISTENER_READINESS_INVALID = 5;
  // Some certificateRefs loaded, ≥1 failed.  Listener serves the good certs
  // (is_https_terminate = true) but ResolvedRefs=False in GW status.
  LISTENER_READINESS_RESOLVED_PARTIAL = 6;
  // protocol: TLS, tls.mode: Passthrough — proxy peeks SNI and splices raw TCP;
  // no TLS termination, no certificateRef needed (GEP-2643 / TLSRoute, #70).
  LISTENER_READINESS_TLS_PASSTHROUGH = 7;
  // Unsupported protocol/mode combination. Surfaces Accepted=False/UnsupportedValue.
  LISTENER_READINESS_UNSUPPORTED = 8;
  // protocol: TLS, tls.mode: Terminate — proxy terminates TLS using the listener
  // cert and L4-splices the decrypted stream to the backend (TLSRouteModeTerminate, #481).
  LISTENER_READINESS_TLS_TERMINATE = 9;
  // protocol: TCP — proxy dials the bound backend and splices the raw stream;
  // no SNI, no TLS, no HTTP parsing (TCPRoute, GEP-1901, #505).
  LISTENER_READINESS_TCP_PROXY = 10;
}

// ────────────────────────────────────────────────────────────────────────────
// 2e  TLS passthrough routing table (GEP-2643, #70)
// ────────────────────────────────────────────────────────────────────────────

message TlsPassthroughTable {
  repeated TlsPassthroughPort ports = 1;
}

message TlsPassthroughPort {
  uint32 port = 1;
  repeated TlsPassthroughEntry entries = 2;
}

message TlsPassthroughEntry {
  oneof pattern {
    string exact = 1;
    string wildcard_suffix = 2; // e.g. "example.com" for "*.example.com"
    bool   catchall = 3;         // true = match any SNI (or no SNI)
  }
  BackendGroup backend_group = 4;
}

// TCPRoute (#505): plain port→backend map, no SNI/hostname dimension.
message TcpRouteTable {
  repeated TcpRoutePort ports = 1;
}

message TcpRoutePort {
  uint32 port = 1;
  BackendGroup backend_group = 2;
}
