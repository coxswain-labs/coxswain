site_name: Coxswain
site_url: https://docs.coxswain-labs.dev/coxswain/
site_description: A pure-Rust Kubernetes Ingress & Gateway API controller backed by Pingora.
repo_name: coxswain-labs/coxswain
repo_url: https://github.com/coxswain-labs/coxswain

docs_dir: src

hooks:
  - hooks/version.py

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mike:
      version_selector: true
      canonical_version: stable

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/coxswain-labs/coxswain

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Installation:
    - installation/index.md
    - Helm: installation/helm.md
    - Kustomize: installation/kustomize.md
    - Manifests: installation/manifests.md
  - Gateway API:
    - gateway-api/index.md
    - Gateway: gateway-api/gateway.md
    - ListenerSets: gateway-api/listenerset.md
    - HTTPRoute: gateway-api/httproute.md
    - GRPCRoute: gateway-api/grpcroute.md
    - TLSRoute: gateway-api/tlsroute.md
    - TCP / UDP routes: gateway-api/tcp-udp-routes.md
    - Route extensions: gateway-api/route-extensions.md
    - Backend policy: gateway-api/backend-policy.md
    - Conformance: gateway-api/capability-matrix.md
  - Ingress:
    - ingress/index.md
    - Annotations: ingress/annotations.md
  - Operations:
    - Traffic:
      - TLS: operations/tls.md
      - Rate limiting: operations/rate-limiting.md
      - Retries: operations/retries.md
    - Production: operations/running-in-production.md
    - Control plane: operations/control-plane-security.md
    - Relay tier: operations/relay-policy.md
    - Releases: operations/verifying-releases.md
    - Troubleshooting: operations/troubleshooting.md
  - Reference:
    - Configuration: reference/configuration.md
    - Observability: reference/observability.md
  - Architecture:
    - architecture/index.md
    - Proxy topology: architecture/proxy-topology.md
    - Discovery protocol: architecture/discovery-protocol.md
  - FAQ: faq.md

