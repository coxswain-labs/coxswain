      - 'crates/coxswain-controller/src/controller/conditions.rs'
      - 'crates/coxswain-controller/src/tls.rs'
      - 'conformance/**'
      - 'deploy/manifests/namespace.yaml'
      - 'deploy/manifests/rbac.yaml'
      - 'deploy/manifests/gateway-class.yaml'
      - '.gateway-api-version'
      - '.github/workflows/conformance.yml'
