on:
  pull_request:
    branches:
      - main

name: Feature parity

jobs:
  supported-features-parity:
    name: supported-features-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Rust SUPPORTED_FEATURES matches Go opts.SupportedFeatures
        run: bash scripts/check-supported-features.sh
