on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'deploy/manifests/**'
      - 'conformance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.gateway-api-version'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'deploy/manifests/**'
      - 'conformance/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.gateway-api-version'
      - '.github/workflows/e2e.yml'

name: E2E

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-e2e-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-build-

      - name: Build coxswain binary
        run: cargo build --bin coxswain

      - name: Build e2e test binaries
        run: |
          mkdir -p bin
          cargo test --no-run -p coxswain-e2e --message-format=json \
            | jq -r 'select(.reason == "compiler-artifact" and .executable != null) | "\(.executable) \(.target.name)"' \
            | while read -r src name; do cp "$src" "bin/$name"; done
          cp target/debug/coxswain bin/coxswain

      - name: Upload e2e binaries
        uses: actions/upload-artifact@v7
        with:
          name: e2e-bins
          path: bin/
          retention-days: 1

  e2e-gateway-api:
    name: e2e-gateway-api
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: coxswain-e2e-gateway-api

      - name: Route pod CIDR to kind node
        run: |
          KIND_NODE_IP=$(docker inspect coxswain-e2e-gateway-api-control-plane \
            --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
          POD_CIDR=$(kubectl get node coxswain-e2e-gateway-api-control-plane \
            -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
          POD_CIDR=${POD_CIDR:-10.244.0.0/16}
          echo "Routing $POD_CIDR via $KIND_NODE_IP"
          sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

      - name: Read Gateway API version
        id: gw-version
        run: echo "version=$(cat .gateway-api-version)" >> "$GITHUB_OUTPUT"

      - name: Pre-pull backend images into kind
        run: |
          GW_VER=${{ steps.gw-version.outputs.version }}
          docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER}
          kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER} --name coxswain-e2e-gateway-api
          docker pull busybox:1.37
          kind load docker-image busybox:1.37 --name coxswain-e2e-gateway-api

      - name: Download e2e binaries
        uses: actions/download-artifact@v7
        with:
          name: e2e-bins
          path: bin/

      - name: Make binaries executable
        run: chmod +x bin/coxswain bin/gateway_api

      - name: Run e2e tests (gateway_api)
        run: bin/gateway_api --test-threads=1
        env:
          COXSWAIN_BIN: ${{ github.workspace }}/bin/coxswain
          RUST_LOG: coxswain_e2e=debug,warn

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== Namespaces ==="
          kubectl get namespaces -l coxswain-e2e=true
          echo "=== Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50
          echo "=== HTTPRoutes ==="
          kubectl get httproutes -A
          echo "=== Ingresses ==="
          kubectl get ingresses -A

  e2e-ingress:
    name: e2e-ingress
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: coxswain-e2e-ingress

      - name: Route pod CIDR to kind node
        run: |
          KIND_NODE_IP=$(docker inspect coxswain-e2e-ingress-control-plane \
            --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
          POD_CIDR=$(kubectl get node coxswain-e2e-ingress-control-plane \
            -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
          POD_CIDR=${POD_CIDR:-10.244.0.0/16}
          echo "Routing $POD_CIDR via $KIND_NODE_IP"
          sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

      - name: Read Gateway API version
        id: gw-version
        run: echo "version=$(cat .gateway-api-version)" >> "$GITHUB_OUTPUT"

      - name: Pre-pull backend images into kind
        run: |
          GW_VER=${{ steps.gw-version.outputs.version }}
          docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER}
          kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER} --name coxswain-e2e-ingress
          docker pull busybox:1.37
          kind load docker-image busybox:1.37 --name coxswain-e2e-ingress

      - name: Download e2e binaries
        uses: actions/download-artifact@v7
        with:
          name: e2e-bins
          path: bin/

      - name: Make binaries executable
        run: chmod +x bin/coxswain bin/ingress

      - name: Run e2e tests (ingress)
        run: bin/ingress --test-threads=1
        env:
          COXSWAIN_BIN: ${{ github.workspace }}/bin/coxswain
          RUST_LOG: coxswain_e2e=debug,warn

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== Namespaces ==="
          kubectl get namespaces -l coxswain-e2e=true
          echo "=== Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50
          echo "=== HTTPRoutes ==="
          kubectl get httproutes -A
          echo "=== Ingresses ==="
          kubectl get ingresses -A

  e2e-gateway-api-conformance:
    name: e2e-gateway-api-conformance
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # `contents: read` is needed by actions/checkout and the test step's
    # `git describe`; `pull-requests: write` lets the "Post conformance
    # report as PR comment" step append the report via `gh pr comment`.
    # Declaring a `permissions:` block makes unlisted scopes default to
    # `none`, so list every scope the job actually uses.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: conformance/go.mod
          cache-dependency-path: conformance/go.sum

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: coxswain-conformance

      - name: Route pod CIDR to kind node
        run: |
          KIND_NODE_IP=$(docker inspect coxswain-conformance-control-plane \
            --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
          POD_CIDR=$(kubectl get node coxswain-conformance-control-plane \
            -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
          POD_CIDR=${POD_CIDR:-10.244.0.0/16}
          echo "Routing $POD_CIDR via $KIND_NODE_IP"
          sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

      - name: Read Gateway API version
        id: gw-version
        run: echo "version=$(cat .gateway-api-version)" >> "$GITHUB_OUTPUT"

      - name: Pre-pull conformance backend images into kind
        run: |
          GW_VER=${{ steps.gw-version.outputs.version }}
          docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER}
          kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER} \
            --name coxswain-conformance

      - name: Bootstrap cluster (CRDs, RBAC, GatewayClass)
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/${{ steps.gw-version.outputs.version }}/standard-install.yaml
          kubectl apply -f deploy/manifests/namespace.yaml
          kubectl apply -f deploy/manifests/rbac.yaml
          kubectl apply -f deploy/manifests/gateway-class.yaml
          kubectl wait --for=condition=Established crd/gatewayclasses.gateway.networking.k8s.io --timeout=60s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

      - name: Download e2e binaries
        uses: actions/download-artifact@v7
        with:
          name: e2e-bins
          path: bin/

      - name: Make coxswain executable
        run: chmod +x bin/coxswain

      - name: Start coxswain proxy
        run: |
          sudo KUBECONFIG="$HOME/.kube/config" ./bin/coxswain serve \
            --proxy-bind-address 0.0.0.0 \
            --proxy-http-port 80 \
            --proxy-https-port 443 \
            --health-port 8081 \
            --admin-port 8082 \
            --status-address 127.0.0.1 \
            --log-format console \
            --pod-name coxswain-conformance \
            --pod-namespace coxswain-system \
            --controller-lease-ttl 15s \
            --controller-lease-renew-interval 5s \
            &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/readyz && break || true
            sleep 2
          done
          curl -sf http://localhost:8081/readyz

      - name: Run Gateway API conformance suite
        id: conformance
        run: |
          cd conformance
          go mod tidy
          REPORT_FILE="reports/standard-$(git describe --tags --always --dirty)-report.yaml"
          go test -v -timeout 55m -run TestConformance \
            -args \
            --organization=coxswain-labs \
            --project=coxswain \
            --url=https://github.com/coxswain-labs/coxswain \
            --version=$(git describe --tags --always --dirty) \
            --report-output="${REPORT_FILE}" \
            --cleanup-base-resources=true
          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload conformance report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance/reports/
          if-no-files-found: ignore

      - name: Post conformance report as PR comment
        if: ${{ always() && github.event_name == 'pull_request' && steps.conformance.outputs.report_file != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPORT_FILE: conformance/${{ steps.conformance.outputs.report_file }}
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No conformance report at $REPORT_FILE; skipping PR comment."
            exit 0
          fi
          # Single-quoted heredoc on the report content so YAML/Markdown
          # syntax inside it cannot trip command substitution. The outer
          # body is built with printf so we still get env var interpolation
          # in the header but never inside the fenced report block.
          {
            printf '## Gateway API conformance report\n\n'
            printf 'Run [#%s](%s) for commit `%s`.\n\n' \
              "$RUN_NUMBER" "$RUN_URL" "$COMMIT_SHA"
            printf '```yaml\n'
            cat "$REPORT_FILE"
            printf '```\n'
          } > /tmp/conformance-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/conformance-comment.md

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== Namespaces ==="
          kubectl get namespaces
          echo "=== Events (last 50) ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50
          echo "=== Gateways ==="
          kubectl get gateways -A -o wide
          echo "=== HTTPRoutes ==="
          kubectl get httproutes -A
