on:
  pull_request:
    branches:
      - main

name: E2E

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# `e2e-*` matrix entries and `e2e-conformance` are required status checks.
# A workflow-level path filter that excludes the whole workflow leaves those
# checks pending forever on docs-only PRs. Instead we always start on PRs and
# gate the heavy jobs on the `changes` job. A job whose `if:` evaluates to
# false reports `skipped`, which counts as success for required-status-check
# enforcement.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'charts/**'
              - 'Dockerfile'
              - 'conformance/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.gateway-api-version'
              - '.github/workflows/e2e.yml'

  build:
    name: build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: e2e-build

      # Build coxswain and the e2e test binaries in debug profile so they share
      # the same dependency graph — one cargo cache, two sets of artifacts.
      # Debug is fine for tests; we're not measuring proxy throughput here.
      - name: Build coxswain binary
        run: cargo build --bin coxswain

      # cargo test --no-run compiles every #[test] binary in coxswain-e2e/tests/
      # without running them. --message-format=json emits one JSON per artifact;
      # we extract (target.name, executable) pairs and copy each into test-bins/
      # under its short name so matrix jobs can address them by suite.
      - name: Build e2e test binaries
        run: |
          set -euo pipefail
          mkdir -p test-bins
          cargo test --no-run -p coxswain-e2e --tests --message-format=json \
            | tee /tmp/cargo-test.json \
            | jq -r '
                select(.reason == "compiler-artifact") |
                select(.target.kind[]? == "test") |
                select(.executable != null) |
                "\(.target.name)\t\(.executable)"
              ' \
            | while IFS=$'\t' read -r name exe; do
                cp "$exe" "test-bins/$name"
              done
          ls -lh test-bins/

      - name: Build e2e Docker image
        run: docker build -f Dockerfile.e2e -t coxswain:e2e .

      - name: Save Docker image
        run: docker save coxswain:e2e | gzip > e2e-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v7
        with:
          name: e2e-image
          path: e2e-image.tar.gz
          retention-days: 1

      - name: Upload e2e test binaries
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-bins
          path: test-bins/
          retention-days: 1

      # Build cloud-provider-kind once here so the e2e and conformance jobs
      # download a binary instead of each running `go install` (which pulls
      # the module + transitive Go deps every time, ~30-60 s per job).
      - name: Install cloud-provider-kind
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          cp "$(go env GOPATH)/bin/cloud-provider-kind" ./cloud-provider-kind

      - name: Upload cloud-provider-kind
        uses: actions/upload-artifact@v7
        with:
          name: cloud-provider-kind
          path: cloud-provider-kind
          retention-days: 1

  e2e:
    name: e2e-${{ matrix.suite }}
    needs: build
    # Matrix jobs only run pre-compiled binaries — no Rust toolchain, no cargo.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: ingress
            test: ingress
          - suite: gateway-api
            test: gateway_api
          - suite: dedicated-proxy
            test: dedicated_proxy
          - suite: proxy-hot-reconfig
            test: proxy_hot_reconfig
          - suite: rbac-read-only-proxy
            test: rbac_read_only_proxy
    steps:
      # Checkout is required because the test binaries embed
      # CARGO_MANIFEST_DIR at compile time and read fixture YAML / Helm chart
      # files from the workspace at runtime. The runner uses the same
      # /home/runner/work/<repo>/<repo> path on every runner image, so the
      # paths baked in by the build job resolve here too.
      - uses: actions/checkout@v6

      # Pre-built by the `build` job; place on PATH so setup-kind-cluster
      # skips its `go install` fallback.
      - name: Download cloud-provider-kind
        uses: actions/download-artifact@v8
        with:
          name: cloud-provider-kind
          path: /tmp/cpk

      - name: Install cloud-provider-kind on PATH
        run: |
          chmod +x /tmp/cpk/cloud-provider-kind
          sudo mv /tmp/cpk/cloud-provider-kind /usr/local/bin/cloud-provider-kind

      - uses: ./.github/actions/setup-kind-cluster
        with:
          cluster-name: coxswain-e2e-${{ matrix.suite }}

      - uses: ./.github/actions/preload-gateway-api-images
        with:
          cluster-name: coxswain-e2e-${{ matrix.suite }}
          include-busybox: 'true'

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: e2e-image

      - name: Load Docker image into daemon
        run: docker load < e2e-image.tar.gz

      - name: Download e2e test binaries
        uses: actions/download-artifact@v8
        with:
          name: e2e-test-bins
          path: test-bins/

      - name: Run e2e tests (${{ matrix.suite }})
        run: |
          chmod +x test-bins/${{ matrix.test }}
          ./test-bins/${{ matrix.test }} --test-threads=1
        env:
          COXSWAIN_E2E_SKIP_BUILD: "1"
          RUST_LOG: coxswain_e2e=debug,warn

      - uses: ./.github/actions/dump-cluster-state
        if: failure()

  e2e-conformance:
    name: e2e-conformance
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # `contents: read` is needed by actions/checkout and the composite action's
    # `git describe`; `pull-requests: write` lets the "Post conformance report
    # as PR comment" step append the report via `gh pr comment`.
    # Declaring a `permissions:` block makes unlisted scopes default to
    # `none`, so list every scope the job actually uses.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: e2e-image

      - name: Load Docker image into daemon
        run: docker load < e2e-image.tar.gz

      # Pre-built by the `build` job; place on PATH so setup-kind-cluster
      # (invoked by run-conformance) skips its `go install` fallback.
      - name: Download cloud-provider-kind
        uses: actions/download-artifact@v8
        with:
          name: cloud-provider-kind
          path: /tmp/cpk

      - name: Install cloud-provider-kind on PATH
        run: |
          chmod +x /tmp/cpk/cloud-provider-kind
          sudo mv /tmp/cpk/cloud-provider-kind /usr/local/bin/cloud-provider-kind

      - uses: ./.github/actions/run-conformance
        id: conformance

      - name: Upload conformance report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance/reports/
          if-no-files-found: ignore

      - name: Post conformance report as PR comment
        if: ${{ always() && steps.conformance.outputs.report-file != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # PR_HEAD_SHA is the commit the PR's branch currently points at — what
          # reviewers see in the PR UI. MERGE_SHA is the synthetic
          # `refs/pull/N/merge` commit GitHub creates for pull_request events,
          # which is what actions/checkout actually checked out and what
          # `git describe` inside the conformance step reports as the tested
          # version. Showing both makes the relationship explicit so the
          # report's `version:` field stops looking like a mystery hash.
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_SHA: ${{ github.sha }}
          REPORT_FILE: ${{ steps.conformance.outputs.report-file }}
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No conformance report at $REPORT_FILE; skipping PR comment."
            exit 0
          fi
          PR_HEAD_SHORT="${PR_HEAD_SHA:0:7}"
          MERGE_SHORT="${MERGE_SHA:0:7}"
          # Body built with printf for the header (so env vars interpolate)
          # and a literal `cat` of the report content (so its markdown
          # backticks / `$` chars cannot trip word-splitting or command
          # substitution). Written to a temp file because PR-comment bodies
          # can exceed shell argv length limits.
          {
            printf '## Gateway API conformance report\n\n'
            printf 'Run [#%s](%s) for PR head `%s` (tested merge into main as `%s`).\n\n' \
              "$RUN_NUMBER" "$RUN_URL" "$PR_HEAD_SHORT" "$MERGE_SHORT"
            printf '```yaml\n'
            cat "$REPORT_FILE"
            printf '```\n'
          } > /tmp/conformance-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/conformance-comment.md
