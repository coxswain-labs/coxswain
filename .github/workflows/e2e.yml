on:
  pull_request:
    branches:
      - main

name: E2E

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# `e2e-*` matrix entries and `e2e-conformance` are required status checks.
# A workflow-level path filter that excludes the whole workflow leaves those
# checks pending forever on docs-only PRs.
#
# Non-matrix jobs (e2e-conformance) with an explicit `if: false` DO report
# `skipped`, satisfying branch-protection. Matrix jobs do NOT — GitHub skips
# the whole matrix without creating individual check statuses, leaving them
# pending forever. The `e2e-skip` job below is a mirror of `e2e` that runs
# only when there are no code changes; its `name:` matches the matrix so the
# required check statuses are created as `success`. The conditions are
# mutually exclusive: exactly one of `e2e` / `e2e-skip` runs per PR.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Force git-history detection instead of the GitHub REST API: the API
          # path has no retry, so a transient API blip fails `changes` and skips
          # the whole pipeline (#635). An empty token switches the action to diff
          # the checked-out git history; `base` pins it to the PR base branch.
          token: ''
          base: ${{ github.base_ref }}
          filters: |
            code:
              - 'crates/**'
              - 'ui/**'
              - 'charts/**'
              - 'Dockerfile'
              - 'Dockerfile.ci'
              - 'conformance/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.gateway-api-version'
              - '.config/nextest.toml'
              - '.github/workflows/e2e.yml'

  build:
    name: build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui

      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: e2e-build

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Build coxswain and the e2e test binaries in debug profile so they share
      # the same dependency graph — one cargo cache, two sets of artifacts.
      # Debug is fine for tests; we're not measuring proxy throughput here.
      - name: Build coxswain binary
        run: cargo build --bin coxswain

      # The toolchain-free matrix runners can't `cargo run` the e2e-setup
      # script, so build the bootstrap binary here and ship it as an artifact.
      # The matrix job runs it once to install CRDs/cert-manager/Helm, then
      # exports COXSWAIN_E2E_BOOTSTRAPPED=1 so the nextest setup script no-ops.
      - name: Build e2e bootstrap binary
        run: cargo build -p coxswain-e2e --bin e2e_setup

      - name: Upload e2e bootstrap binary
        uses: actions/upload-artifact@v7
        with:
          name: e2e-setup-bin
          path: target/debug/e2e_setup
          retention-days: 1

      # cargo nextest archive compiles every integration test binary in
      # coxswain-e2e/tests/ and bundles them with nextest metadata into a
      # single .tar.zst archive. Matrix jobs download the archive and run
      # `cargo-nextest run --archive-file` — no Rust toolchain required on
      # the test runner, just the nextest binary from taiki-e/install-action.
      - name: Build e2e test archive
        run: cargo nextest archive --archive-file e2e-archive.tar.zst -p coxswain-e2e

      - name: Build e2e Docker image
        run: docker build -f Dockerfile.ci -t coxswain:e2e .

      - name: Save Docker image
        run: docker save coxswain:e2e | gzip > e2e-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v7
        with:
          name: e2e-image
          path: e2e-image.tar.gz
          retention-days: 1

      - name: Upload e2e test archive
        uses: actions/upload-artifact@v7
        with:
          name: e2e-archive
          path: e2e-archive.tar.zst
          retention-days: 1

      # Build cloud-provider-kind once here so the e2e and conformance jobs
      # download a binary instead of each running `go install` (which pulls
      # the module + transitive Go deps every time, ~30-60 s per job).
      #
      # The binary itself is cached across runs — cloud-provider-kind
      # updates roughly monthly and we don't need bleeding-edge. Bump the
      # cache-key suffix (`v1` → `v2` …) to force a refresh.
      - name: Cache cloud-provider-kind binary
        id: cpk-cache
        uses: actions/cache@v5
        with:
          path: cloud-provider-kind
          key: cloud-provider-kind-${{ runner.os }}-v1

      - name: Install cloud-provider-kind
        if: steps.cpk-cache.outputs.cache-hit != 'true'
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          cp "$(go env GOPATH)/bin/cloud-provider-kind" ./cloud-provider-kind

      - name: Upload cloud-provider-kind
        uses: actions/upload-artifact@v7
        with:
          name: cloud-provider-kind
          path: cloud-provider-kind
          retention-days: 1

  e2e:
    name: e2e-${{ matrix.suite }}
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    # Matrix jobs run pre-compiled binaries via `cargo-nextest run --archive-file`.
    # No Rust toolchain needed — only the nextest binary (taiki-e/install-action).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Suites map 1:1 to the by-plane test binaries in crates/coxswain-e2e/tests/
      # (#321). Each runs in its own kind cluster, so suites stay fully parallel.
      matrix:
        include:
          - suite: routing
            test: routing
          - suite: tls
            test: tls
          - suite: security
            test: security
          - suite: traffic-policy
            test: traffic_policy
          - suite: status-conditions
            test: status_conditions
          - suite: provisioning
            test: provisioning
          - suite: resilience
            test: resilience
          - suite: observability
            test: observability
          - suite: discovery
            test: discovery
    steps:
      # Checkout is required because the test binaries embed
      # CARGO_MANIFEST_DIR at compile time and read fixture YAML / Helm chart
      # files from the workspace at runtime. The runner uses the same
      # /home/runner/work/<repo>/<repo> path on every runner image, so the
      # paths baked in by the build job resolve here too.
      - uses: actions/checkout@v6

      # Pre-built by the `build` job; place on PATH so setup-kind-cluster
      # skips its `go install` fallback.
      - name: Download cloud-provider-kind
        uses: actions/download-artifact@v8
        with:
          name: cloud-provider-kind
          path: /tmp/cpk

      - name: Install cloud-provider-kind on PATH
        run: |
          chmod +x /tmp/cpk/cloud-provider-kind
          sudo mv /tmp/cpk/cloud-provider-kind /usr/local/bin/cloud-provider-kind

      - uses: ./.github/actions/setup-kind-cluster
        with:
          cluster-name: coxswain-e2e-${{ matrix.suite }}

      - uses: ./.github/actions/preload-gateway-api-images
        with:
          cluster-name: coxswain-e2e-${{ matrix.suite }}
          include-busybox: 'true'

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: e2e-image

      - name: Load Docker image into daemon
        run: docker load < e2e-image.tar.gz

      - name: Download e2e test archive
        uses: actions/download-artifact@v8
        with:
          name: e2e-archive

      - name: Download e2e bootstrap binary
        uses: actions/download-artifact@v8
        with:
          name: e2e-setup-bin
          path: /tmp/e2e-setup

      # Install the nextest binary standalone — no Rust toolchain needed to
      # run from a pre-built archive. The archive carries the test binaries;
      # cargo-nextest extracts and executes them directly.
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Bootstrap once with the prebuilt binary (no `cargo` on this runner),
      # then export COXSWAIN_E2E_BOOTSTRAPPED so both nextest passes' setup
      # scripts no-op and every test process skips the heavy setup. Image build
      # is skipped (COXSWAIN_E2E_SKIP_BUILD) — the image was loaded above.
      - name: Bootstrap cluster (CRDs, cert-manager, Helm)
        run: |
          chmod +x /tmp/e2e-setup/e2e_setup
          /tmp/e2e-setup/e2e_setup
          echo "COXSWAIN_E2E_BOOTSTRAPPED=1" >> "$GITHUB_ENV"
        env:
          COXSWAIN_E2E_SKIP_BUILD: "1"
          RUST_LOG: coxswain_e2e=debug,warn

      # Two passes (see .config/nextest.toml): the parallel `e2e` profile, then
      # the serial `e2e-serial` profile (global-config mutators + resilience).
      # `--no-tests=pass` makes the empty side a no-op for suites that have
      # tests in only one pass (e.g. traffic_policy, resilience).
      - name: Run e2e tests (${{ matrix.suite }})
        run: |
          cargo-nextest nextest run --profile e2e        --archive-file e2e-archive.tar.zst \
            -E 'binary(${{ matrix.test }})' --no-tests=pass
          cargo-nextest nextest run --profile e2e-serial --archive-file e2e-archive.tar.zst \
            -E 'binary(${{ matrix.test }})' --no-tests=pass
        env:
          COXSWAIN_E2E_SKIP_BUILD: "1"
          RUST_LOG: coxswain_e2e=debug,warn

      - uses: ./.github/actions/dump-cluster-state
        if: failure()

  # Mirror of `e2e` that runs only on docs-only (no-code-change) PRs. Its
  # `name:` resolves to the same `e2e-<suite>` strings as the real matrix, so
  # the required status checks are satisfied without running the full suite.
  # The two jobs are mutually exclusive: `e2e` runs when code changed,
  # `e2e-skip` runs when it did not.
  e2e-skip:
    name: e2e-${{ matrix.suite }}
    needs: [changes]
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: routing
          - suite: tls
          - suite: security
          - suite: traffic-policy
          - suite: status-conditions
          - suite: provisioning
          - suite: resilience
          - suite: observability
          - suite: discovery
    steps:
      - run: echo "No code changes — skipping suite ${{ matrix.suite }}"

  e2e-conformance:
    name: e2e-conformance
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # `contents: read` is needed by actions/checkout and the composite action's
    # `git describe`; `pull-requests: write` lets the "Post conformance report
    # as PR comment" step append the report via `gh pr comment`.
    # Declaring a `permissions:` block makes unlisted scopes default to
    # `none`, so list every scope the job actually uses.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: e2e-image

      - name: Load Docker image into daemon
        run: docker load < e2e-image.tar.gz

      # Pre-built by the `build` job; place on PATH so setup-kind-cluster
      # (invoked by run-conformance) skips its `go install` fallback.
      - name: Download cloud-provider-kind
        uses: actions/download-artifact@v8
        with:
          name: cloud-provider-kind
          path: /tmp/cpk

      - name: Install cloud-provider-kind on PATH
        run: |
          chmod +x /tmp/cpk/cloud-provider-kind
          sudo mv /tmp/cpk/cloud-provider-kind /usr/local/bin/cloud-provider-kind

      - uses: ./.github/actions/run-conformance
        id: conformance

      - name: Upload conformance report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance/reports/
          if-no-files-found: ignore

      - name: Post conformance report as PR comment
        if: ${{ always() && steps.conformance.outputs.report-file != '' }}
        # Reporting only — the conformance verdict is the `run-conformance` step
        # above, and a comment that fails to post must never veto it. Every call
        # below talks to the GitHub API, which fails often enough to matter: a
        # REST incident returning HTML to `gh api` once failed this step (and so
        # the whole required check) minutes after `go test` reported ok.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # PR_HEAD_SHA is the commit the PR's branch currently points at — what
          # reviewers see in the PR UI. MERGE_SHA is the synthetic
          # `refs/pull/N/merge` commit GitHub creates for pull_request events,
          # which is what actions/checkout actually checked out and what
          # `git describe` inside the conformance step reports as the tested
          # version. Showing both makes the relationship explicit so the
          # report's `version:` field stops looking like a mystery hash.
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_SHA: ${{ github.sha }}
          REPORT_FILE: ${{ steps.conformance.outputs.report-file }}
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No conformance report at $REPORT_FILE; skipping PR comment."
            exit 0
          fi
          PR_HEAD_SHORT="${PR_HEAD_SHA:0:7}"
          MERGE_SHORT="${MERGE_SHA:0:7}"
          # Hidden marker (renders invisibly) keys the single sticky comment we
          # maintain per PR — it lets us find and update the prior report in
          # place instead of accumulating one comment per run.
          MARKER='<!-- coxswain-conformance-report -->'
          # Body built with printf for the header (so env vars interpolate) and a
          # literal `cat` of the report content (so its markdown backticks / `$`
          # chars cannot trip word-splitting or command substitution). The report
          # is wrapped in a <details> block so the long YAML collapses by default;
          # the blank line after </summary> is required for GitHub to render the
          # fenced block inside. Written to a temp file because PR-comment bodies
          # can exceed shell argv length limits.
          {
            printf '%s\n' "$MARKER"
            printf '## Gateway API conformance report\n\n'
            printf 'Run [#%s](%s) for PR head `%s` (tested merge into main as `%s`).\n\n' \
              "$RUN_NUMBER" "$RUN_URL" "$PR_HEAD_SHORT" "$MERGE_SHORT"
            printf '<details>\n<summary>Full conformance report</summary>\n\n'
            printf '```yaml\n'
            cat "$REPORT_FILE"
            printf '```\n'
            printf '\n</details>\n'
          } > /tmp/conformance-comment.md
          # Upsert: find our prior sticky comment by the hidden marker and PATCH
          # it; create a fresh one only when none exists yet. Keyed on the marker
          # (not "the bot's last comment") so unrelated github-actions comments
          # are never clobbered. With --paginate, --jq runs per page, so the
          # filter emits one id per matching comment across all pages; `tail -n1`
          # takes the newest (the API returns comments oldest-first), defensive in
          # case an older run left more than one.
          existing_id=$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | tail -n1
          )
          if [ -n "$existing_id" ]; then
            echo "Updating existing conformance comment $existing_id in place."
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -F body=@/tmp/conformance-comment.md
          else
            echo "No prior conformance comment; creating one."
            gh pr comment "$PR_NUMBER" --body-file /tmp/conformance-comment.md
          fi
