on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  workflow_dispatch:        # Allow manual trigger for ad-hoc runs

name: GHCR cleanup

# Deletes old :main-<sha7> container image versions from GHCR, keeping the
# 20 most recent snapshots. Versioned releases (:v*, :0.*, :latest) are
# never touched — any version whose tags include a match for '^(v\d|[0-9]|latest)'
# is excluded from deletion.
#
# Replaced `actions/delete-package-versions@v5` (Node.js 20, upstream hadn't
# shipped a node24 release) with `dataaxiom/ghcr-cleanup-action@v1.2.2`
# (node24, native GHCR). `exclude-tags` + `use-regex: true` preserves the
# original protection regex verbatim. The default `${{ github.token }}` is
# sufficient because we name `package` exactly (no wildcards / regex on the
# package field, which would require a PAT per dataaxiom's docs).

jobs:
  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          package: coxswain
          keep-n-tagged: 20
          exclude-tags: '^(v\d|[0-9]|latest)'
          use-regex: true
          delete-untagged: true
