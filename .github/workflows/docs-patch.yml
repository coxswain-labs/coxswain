on:
  workflow_dispatch:
    inputs:
      version:
        description: 'mike version label to republish (e.g. 0.2)'
        required: true
      aliases:
        description: 'Space-separated mike aliases'
        default: 'stable latest'
        required: false

name: Docs patch

# Republish docs for an already-released version without cutting a new image
# tag. Use this to fix typos or prose in a shipped release. The version label
# must already exist in the published site; this job overwrites it in-place.
jobs:
  publish-docs:
    name: publish-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r docs/requirements.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Configure git for mike
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout org-level pages repo
        uses: actions/checkout@v6
        with:
          repository: coxswain-labs/coxswain-labs.github.io
          token: ${{ secrets.GH_DOCS_PAT }}
          path: org-pages

      - name: Seed _staging from current org-pages state
        run: |
          set -euo pipefail
          git worktree add --orphan -b _staging /tmp/_staging-seed
          if [ -d org-pages/coxswain ] && [ -n "$(ls -A org-pages/coxswain 2>/dev/null)" ]; then
            cp -a org-pages/coxswain/. /tmp/_staging-seed/
            git -C /tmp/_staging-seed add -A
            git -C /tmp/_staging-seed commit -m "seed _staging from org-pages/coxswain"
          fi
          git worktree remove --force /tmp/_staging-seed

      - name: Build docs with mike (local staging branch)
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd docs
          VERSION="${{ inputs.version }}"
          ALIASES="${{ inputs.aliases }}"
          if [ -n "$ALIASES" ]; then
            mike deploy --branch _staging --update-aliases "$VERSION" $ALIASES
            mike set-default --branch _staging stable
          else
            mike deploy --branch _staging "$VERSION"
            mike set-default --branch _staging stable
          fi

      - name: Export staged docs
        run: git worktree add /tmp/staged _staging

      - name: Sync docs into coxswain/ subdirectory
        run: |
          rm -rf org-pages/coxswain
          cp -r /tmp/staged/. org-pages/coxswain/
          rm -rf org-pages/coxswain/.git

      - name: Commit and push to org-level pages repo
        run: |
          cd org-pages
          git add coxswain/
          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi
          git commit -m "docs(coxswain): patch ${{ inputs.version }} from ${{ github.sha }}"
          git push
