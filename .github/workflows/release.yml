on:
  push:
    branches:
      - main
    tags:
      - 'v*'

name: Release

# Serialise per-ref so two near-simultaneous pushes to the same branch/tag
# can't race on the `_staging` mike branch or the org-pages push. We don't
# cancel in-progress runs because each is publishing artifacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Publishes coxswain OCI images and the Helm chart to ghcr.io, and attaches
# a rendered install.yaml to every GitHub Release.
#
# Tag policy (hybrid):
#   push: main         → :main, :main-<sha7>            (rolling main snapshot)
#   push: tag v0.1.5   → :v0.1.5, :0.1.5,              (versioned release;
#                        :0.1, :0,                       :v* and :X.Y.Z are
#                        :latest                         immutable patch pins;
#                                                        :0.1 and :0 float to
#                                                        the latest patch and
#                                                        latest minor.patch
#                                                        respectively; :latest
#                                                        tracks the most recent
#                                                        versioned release)
#
# `cargo release` is the canonical trigger for the tag path — it bumps the
# version, runs the pre-release hook (bump-helm-version.sh), commits, and
# pushes the v* tag, which lights up this workflow.
# Main pushes publish a :main snapshot on every merge so downstream consumers
# always have a fresh image without overwriting :latest with unreleased code.
#
# Multi-arch build distributes across native runners (no QEMU) per
# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
#
# Job graph (main: up to trivy-scan; tag: full pipeline):
#   cargo-deny ──┬──► build       ──┐
#               └──► conformance ──┴──► publish-image ──► trivy-scan ──┬──► publish-kustomize ──┐
#                                                                       └──► publish-chart    ──┴──► publish-docs
#   (cargo-deny gates all publishing; conformance gates image publish;
#    trivy-scan gates both release artifacts; publish-docs is the last step
#    and is skipped if any prior release job fails, so a broken release
#    never promotes the docs site to a tag that lacks signed artifacts.)
jobs:
  cargo-deny:
    name: cargo-deny
    # Skip the duplicate run that a `cargo release` push-to-main triggers
    # alongside the v* tag push; the tag-triggered workflow does the real
    # release. Matches cargo-release's default consolidated commit title.
    if: "${{ !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: Release')) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: release-deny
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  build:
    name: build (${{ matrix.platform }})
    needs: cargo-deny
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            scope: release-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: release-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Sanitize platform pair name
        id: pair
        run: echo "name=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only at the per-arch build step; tags are applied later by the
      # merge job via `docker buildx imagetools create`.
      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/coxswain,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,scope=${{ matrix.scope }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.pair.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  conformance:
    name: conformance
    needs: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: release-conformance

      - name: Build coxswain release binary
        run: |
          mkdir -p bin
          cargo build --release --bin coxswain
          cp target/release/coxswain bin/coxswain

      - uses: ./.github/actions/run-conformance
        id: conformance

      - name: Upload conformance report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance/reports/
          if-no-files-found: ignore

  publish-image:
    name: publish-image
    needs: [build, conformance]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Hybrid :latest policy: only tag pushes publish :latest. Main pushes
      # publish :main and :main-<sha7> so nightly consumers can pin to a
      # specific commit without polluting :latest with unreleased code.
      - name: Docker metadata (tags + annotations)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/coxswain@sha256:%s ' *)

      - name: Inspect pushed image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/coxswain:${{ steps.meta.outputs.version }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/coxswain:${{ github.ref_name }}

  trivy-scan:
    name: trivy-scan
    needs: publish-image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/coxswain:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  publish-chart:
    name: publish-chart
    needs: [publish-image, trivy-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - uses: sigstore/cosign-installer@v4.1.2

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/coxswain --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart and sign
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUSH_OUTPUT=$(helm push "coxswain-${VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts" 2>&1)
          echo "${PUSH_OUTPUT}"
          DIGEST=$(echo "${PUSH_OUTPUT}" | grep "Digest:" | awk '{print $2}')
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/coxswain@${DIGEST}"

      - name: Verify chart is pullable
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm show chart \
            "oci://ghcr.io/${{ github.repository_owner }}/charts/coxswain" \
            --version "${VERSION}"

  publish-kustomize:
    name: publish-kustomize
    needs: [publish-image, trivy-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: imranismail/setup-kustomize@v3

      - name: Pin image tag
        working-directory: deploy/manifests
        run: kustomize edit set image ghcr.io/coxswain-labs/coxswain=ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}

      - name: Render install.yaml
        run: kustomize build deploy/manifests > install.yaml

      - name: Sanity-check rendered output
        run: |
          grep -q "image: ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}" install.yaml
          grep -q "imagePullPolicy: IfNotPresent" install.yaml

      - name: Download conformance report
        uses: actions/download-artifact@v7
        with:
          name: conformance-report
          path: ./conformance-report/

      - name: Stage conformance report for release
        id: report
        run: |
          set -euo pipefail
          REPORT=$(ls ./conformance-report/gateway-api-conformance-*.yaml | head -1)
          cp "${REPORT}" ./gw-api-conf-report.yaml
          echo "path=./gw-api-conf-report.yaml" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach install.yaml + conformance report
        uses: softprops/action-gh-release@v3
        with:
          files: |
            install.yaml
            ${{ steps.report.outputs.path }}
          generate_release_notes: true

  publish-docs:
    name: publish-docs
    # Run whenever no needed job failed and the workflow wasn't cancelled —
    # skipped needs (publish-chart/publish-kustomize on main) don't block the
    # unstable docs snapshot. A failure in publish-image or trivy-scan still
    # skips publish-docs so a broken release never promotes the docs site.
    # Also skip the duplicate run triggered by a `cargo release` push-to-main;
    # skipped upstreams evaluate as neither failure nor cancellation, so the
    # release-commit guard must be repeated here explicitly.
    needs: [publish-image, trivy-scan, publish-chart, publish-kustomize]
    if: "${{ !failure() && !cancelled() && !(github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore: Release')) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        # v8.x is immutable per release; no floating @v8 tag is published.
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r docs/requirements.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Determine version and aliases
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            # PACKAGE is the full SemVer fed to the docs hook for placeholder
            # substitution; VERSION is the MAJOR.MINOR snapshot label mike
            # publishes under.
            PACKAGE="${TAG#v}"
            VERSION="$(echo "$PACKAGE" | cut -d. -f1-2)"
            ALIASES="stable latest"
          else
            PACKAGE="main"
            VERSION="unstable"
            ALIASES=""
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "aliases=$ALIASES" >> "$GITHUB_OUTPUT"

      - name: Configure git for mike
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout org-level pages repo
        uses: actions/checkout@v6
        with:
          repository: coxswain-labs/coxswain-labs.github.io
          token: ${{ secrets.GH_DOCS_PAT }}
          path: org-pages

      - name: Seed _staging from current org-pages state
        # Mike deploys onto _staging, which is auto-created empty in each
        # runner. Without this seed, mike emits a versions.json containing
        # only the version being published this run, and the downstream sync
        # wipes every prior published version from the live site. Seeding
        # _staging from org-pages/coxswain/ lets mike merge the new version
        # into the existing versions.json instead of replacing it.
        run: |
          set -euo pipefail
          git worktree add --orphan -b _staging /tmp/_staging-seed
          if [ -d org-pages/coxswain ] && [ -n "$(ls -A org-pages/coxswain 2>/dev/null)" ]; then
            cp -a org-pages/coxswain/. /tmp/_staging-seed/
            git -C /tmp/_staging-seed add -A
            git -C /tmp/_staging-seed commit -m "seed _staging from org-pages/coxswain"
          fi
          git worktree remove --force /tmp/_staging-seed

      - name: Build docs with mike (local staging branch)
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package }}
        run: |
          set -euo pipefail
          cd docs
          VERSION="${{ steps.version.outputs.version }}"
          ALIASES="${{ steps.version.outputs.aliases }}"
          if [ -n "$ALIASES" ]; then
            mike deploy --branch _staging --update-aliases "$VERSION" $ALIASES
            # Tagged release: 'stable' alias now exists; make it the landing page
            mike set-default --branch _staging stable
          else
            mike deploy --branch _staging "$VERSION"
            mike set-default --branch _staging stable
          fi

      - name: Export staged docs
        run: |
          set -euo pipefail
          git worktree add /tmp/staged _staging

      - name: Sync docs into coxswain/ subdirectory
        run: |
          # Remove the old coxswain/ subtree (preserves CNAME, index.html, other projects)
          rm -rf org-pages/coxswain

          # Copy the freshly built site
          cp -r /tmp/staged/. org-pages/coxswain/

          # Strip the worktree's .git pointer — leaving it makes the parent repo
          # treat coxswain/ as a nested git repository
          rm -rf org-pages/coxswain/.git

      - name: Commit and push to org-level pages repo
        run: |
          cd org-pages
          git add coxswain/
          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi
          git commit -m "docs(coxswain): publish ${{ steps.version.outputs.version }} from ${{ github.sha }}"
          git push
