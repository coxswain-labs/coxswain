on:
  push:
    branches:
      - main
    tags:
      - 'v*'

name: Release

# Publishes coxswain OCI images to ghcr.io and a rendered install.yaml to GitHub Releases.
#
# Tag policy (hybrid):
#   push: main         → :main, :main-<sha7>            (rolling main snapshot)
#   push: tag v0.1.5   → :v0.1.5, :0.1.5,              (versioned release;
#                        :0.1, :0,                       :v* and :X.Y.Z are
#                        :latest                         immutable patch pins;
#                                                        :0.1 and :0 float to
#                                                        the latest patch and
#                                                        latest minor.patch
#                                                        respectively; :latest
#                                                        tracks the most recent
#                                                        versioned release)
#
# `cargo release` is the canonical trigger for the tag path — it bumps the
# version, commits, and pushes the v* tag, which lights up this workflow.
# Main pushes publish a continuously-updated :main image for nightly testing
# without overwriting :latest with possibly-broken commits.
#
# Multi-arch build distributes across native runners (no QEMU) per
# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            scope: release-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: release-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Sanitize platform pair name
        id: pair
        run: echo "name=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only at the per-arch build step; tags are applied later by the
      # merge job via `docker buildx imagetools create`.
      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/coxswain,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,scope=${{ matrix.scope }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.pair.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: publish-image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Hybrid :latest policy: only tag pushes publish :latest. Main pushes
      # publish :main and :main-<sha7> so nightly consumers can pin to a
      # specific commit without polluting :latest with unreleased code.
      - name: Docker metadata (tags + annotations)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/coxswain@sha256:%s ' *)

      - name: Inspect pushed image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/coxswain:${{ steps.meta.outputs.version }}

  publish-install-manifest:
    name: publish-install-manifest
    needs: publish-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: imranismail/setup-kustomize@v2

      - name: Pin image tag
        working-directory: deploy/manifests
        run: kustomize edit set image ghcr.io/coxswain-labs/coxswain=ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}

      - name: Render install.yaml
        run: kustomize build deploy/manifests > install.yaml

      - name: Sanity-check rendered output
        run: |
          grep -q "image: ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}" install.yaml
          grep -q "imagePullPolicy: IfNotPresent" install.yaml

      - name: Create GitHub Release and attach install.yaml
        uses: softprops/action-gh-release@v2
        with:
          files: install.yaml
          generate_release_notes: true
