on:
  push:
    branches:
      - main
    tags:
      - 'v*'

name: Release

# Publishes coxswain OCI images and the Helm chart to ghcr.io, and attaches
# a rendered install.yaml to every GitHub Release.
#
# Tag policy (hybrid):
#   push: main         → :main, :main-<sha7>            (rolling main snapshot)
#   push: tag v0.1.5   → :v0.1.5, :0.1.5,              (versioned release;
#                        :0.1, :0,                       :v* and :X.Y.Z are
#                        :latest                         immutable patch pins;
#                                                        :0.1 and :0 float to
#                                                        the latest patch and
#                                                        latest minor.patch
#                                                        respectively; :latest
#                                                        tracks the most recent
#                                                        versioned release)
#
# `cargo release` is the canonical trigger for the tag path — it bumps the
# version, runs the pre-release hook (bump-helm-version.sh), commits, and
# pushes the v* tag, which lights up this workflow.
# Main pushes publish a continuously-updated :main image for nightly testing
# without overwriting :latest with possibly-broken commits.
#
# Multi-arch build distributes across native runners (no QEMU) per
# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
#
# Tag-push job graph:
#   cargo-deny ──► build ──► publish-image ──► trivy-scan ──┬──► publish-kustomize
#                                                           └──► publish-chart
#   (cargo-deny gates all publishing; trivy-scan gates both release artifacts)
jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  build:
    name: build (${{ matrix.platform }})
    needs: cargo-deny
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            scope: release-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: release-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Sanitize platform pair name
        id: pair
        run: echo "name=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only at the per-arch build step; tags are applied later by the
      # merge job via `docker buildx imagetools create`.
      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/coxswain,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,scope=${{ matrix.scope }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.pair.outputs.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image:
    name: publish-image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Hybrid :latest policy: only tag pushes publish :latest. Main pushes
      # publish :main and :main-<sha7> so nightly consumers can pin to a
      # specific commit without polluting :latest with unreleased code.
      - name: Docker metadata (tags + annotations)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/coxswain
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/coxswain@sha256:%s ' *)

      - name: Inspect pushed image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/coxswain:${{ steps.meta.outputs.version }}

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/coxswain:${{ github.ref_name }}

  trivy-scan:
    name: trivy-scan
    needs: publish-image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/coxswain:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  publish-chart:
    name: publish-chart
    needs: [publish-image, trivy-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/coxswain --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart and sign
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUSH_OUTPUT=$(helm push "coxswain-${VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts" 2>&1)
          echo "${PUSH_OUTPUT}"
          DIGEST=$(echo "${PUSH_OUTPUT}" | grep "Digest:" | awk '{print $2}')
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/charts/coxswain@${DIGEST}"

      - name: Verify chart is pullable
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm show chart \
            "oci://ghcr.io/${{ github.repository_owner }}/charts/coxswain" \
            --version "${VERSION}"

  publish-kustomize:
    name: publish-kustomize
    needs: [publish-image, trivy-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: imranismail/setup-kustomize@v2

      - name: Pin image tag
        working-directory: deploy/manifests
        run: kustomize edit set image ghcr.io/coxswain-labs/coxswain=ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}

      - name: Render install.yaml
        run: kustomize build deploy/manifests > install.yaml

      - name: Sanity-check rendered output
        run: |
          grep -q "image: ghcr.io/coxswain-labs/coxswain:${GITHUB_REF_NAME}" install.yaml
          grep -q "imagePullPolicy: IfNotPresent" install.yaml

      - name: Create GitHub Release and attach install.yaml
        uses: softprops/action-gh-release@v2
        with:
          files: install.yaml
          generate_release_notes: true
