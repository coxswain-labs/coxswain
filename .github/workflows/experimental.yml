on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

name: Experimental

jobs:
  experimental-build:
    name: experimental-build
    # Only run for PRs labeled "api: gateway" — i.e. changes touching Gateway API internals.
    if: contains(github.event.pull_request.labels.*.name, 'api: gateway')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-experimental-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-experimental-
      - name: Build with experimental Gateway API channel
        run: cargo build -p coxswain-bin --features experimental
