on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

name: Experimental

concurrency:
  group: experimental-${{ github.ref }}
  cancel-in-progress: true

jobs:
  experimental-build:
    name: experimental-build
    # Only run for PRs labeled "type: experimental" — i.e. changes touching the experimental channel.
    if: "contains(github.event.pull_request.labels.*.name, 'type: experimental')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The operator UI is embedded into coxswain-admin via include_str! of
      # ui/dist/index.html; building coxswain-bin pulls in coxswain-admin, so the
      # UI must exist first (matches ci.yml — the Dockerfile path builds it in
      # its ui-builder stage, but this job compiles directly on the runner).
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: experimental
      - name: Build with experimental Gateway API channel
        run: cargo build -p coxswain-bin --features experimental
