on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main

name: Experimental

concurrency:
  group: Experimental-${{ github.ref }}
  cancel-in-progress: true

jobs:
  experimental-build:
    name: experimental-build
    # Only run for PRs labeled "type: experimental" — i.e. changes touching the experimental channel.
    if: "contains(github.event.pull_request.labels.*.name, 'type: experimental')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: experimental
      - name: Build with experimental Gateway API channel
        run: cargo build -p coxswain-bin --features experimental
