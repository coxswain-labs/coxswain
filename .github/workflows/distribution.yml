on:
  pull_request:
    branches:
      - main

name: Distribution

# PR-time validation for distribution artifacts: Docker image and Helm chart.
# Multi-arch image and Helm chart OCI publishing live in release.yml (publish-image, publish-chart).
#
# Same gating pattern as ci.yml / e2e.yml: the workflow always starts so that
# required status checks (smoke, helm-chart) report `skipped` success on PRs
# that don't touch the relevant paths.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/distribution.yml'
            chart:
              - 'charts/**'
              - '.github/workflows/distribution.yml'

  docker-image:
    name: docker-image
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: coxswain:ci
          cache-from: type=gha,scope=image-smoke
          cache-to: type=gha,scope=image-smoke,mode=max

      # Intentionally shallow checks — confirm the image is non-empty, the
      # entrypoint resolves, and the binary parses argv. Deeper validation
      # (in-cluster smoke, conformance against the image) is a follow-up.
      - name: Smoke --help
        run: docker run --rm coxswain:ci --help

      - name: Smoke --version
        run: docker run --rm coxswain:ci --version

      - name: Report image size
        run: docker images coxswain:ci --format '{{.Repository}}:{{.Tag}} {{.Size}}'

  helm-chart:
    name: helm-chart
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: Lint
        run: helm lint charts/coxswain
      - name: Template smoke test
        run: helm template coxswain charts/coxswain --namespace coxswain-system > /dev/null
