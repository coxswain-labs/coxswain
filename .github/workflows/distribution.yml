on:
  pull_request:
    branches:
      - main

name: Distribution

concurrency:
  group: distribution-${{ github.ref }}
  cancel-in-progress: true

# PR-time validation for distribution artifacts: Docker image, Helm chart,
# and the docs site. Multi-arch image, Helm chart OCI, and docs publishing
# all live in release.yml (publish-image, publish-chart, publish-docs).
#
# Same gating pattern as ci.yml / e2e.yml: the workflow always starts so that
# required status checks (smoke, helm-chart, docs-build) report `skipped`
# success on PRs that don't touch the relevant paths.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      chart: ${{ steps.filter.outputs.chart }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/distribution.yml'
            chart:
              - 'charts/**'
              - '.github/workflows/distribution.yml'
            docs:
              - 'docs/**'
              - '.github/workflows/distribution.yml'

  docker-image:
    name: docker-image
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image (amd64, local)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: coxswain:ci
          # Smoke-only: build the fast, unoptimized `ci` profile (no fat LTO).
          # This job just checks the Dockerfile builds and the entrypoint
          # resolves (--help/--version); the shipped artifact still builds
          # [profile.release] via the Dockerfile's default. See Cargo.toml.
          build-args: |
            CARGO_PROFILE=ci
          cache-from: type=gha,scope=image-smoke
          cache-to: type=gha,scope=image-smoke,mode=max

      # Intentionally shallow checks — confirm the image is non-empty, the
      # entrypoint resolves, and the binary parses argv. Deeper validation
      # (in-cluster smoke, conformance against the image) is a follow-up.
      - name: Smoke --help
        run: docker run --rm coxswain:ci --help

      - name: Smoke --version
        run: docker run --rm coxswain:ci --version

      - name: Report image size
        run: docker images coxswain:ci --format '{{.Repository}}:{{.Tag}} {{.Size}}'

  helm-chart:
    name: helm-chart
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Lint
        run: helm lint charts/coxswain
      - name: Template smoke test
        run: helm template coxswain charts/coxswain --namespace coxswain-system > /dev/null

  docs-build:
    name: docs-build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        # v8.x is immutable per release; no floating @v8 tag is published.
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r docs/requirements.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      # No PACKAGE_VERSION set — validates the dev/main build, which is
      # what the PR is preparing. --strict catches broken nav, missing
      # pages, and hook errors.
      - name: Build docs (strict)
        run: |
          cd docs
          mkdocs build --strict
