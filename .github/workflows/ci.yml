on:
  pull_request:
    branches:
      - main

name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The workflow-level `paths:` filter was removed deliberately: the jobs below
# are required status checks in the main-branch ruleset, and a filter that
# excludes the entire workflow leaves those checks pending forever on PRs that
# don't touch matching paths (e.g. docs-only PRs). Instead we always start the
# workflow and gate each expensive job on the `changes` job's output. A job
# whose `if:` evaluates to false reports `skipped`, which counts as success for
# required-status-check enforcement.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      parity: ${{ steps.filter.outputs.parity }}
      stability: ${{ steps.filter.outputs.stability }}
      crd_manifests: ${{ steps.filter.outputs.crd_manifests }}
      anti_drift: ${{ steps.filter.outputs.anti_drift }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'ui/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            parity:
              - 'crates/coxswain-controller/src/controller/gateway_class_status.rs'
              - 'conformance/main_test.go'
              - 'scripts/check-supported-features.sh'
              - '.github/workflows/ci.yml'
            stability:
              - 'crates/**/src/**'
              - 'scripts/check-public-types-stability.sh'
              - '.github/workflows/ci.yml'
            crd_manifests:
              - 'deploy/manifests/crds/**'
              - 'charts/coxswain/crds/**'
              - '.gateway-api-version'
              - 'scripts/check-crd-kubeconform.sh'
              - '.github/workflows/ci.yml'
            anti_drift:
              - 'crates/**'
              - 'Cargo.toml'
              - 'scripts/check-module-headers.sh'
              - 'scripts/check-no-anyhow-libs.sh'
              - 'scripts/check-reflector-health-checks.sh'
              - 'scripts/check-workspace-lints-decl.sh'
              - 'scripts/check-no-per-site-allow.sh'
              - 'scripts/check-must-use-builders.sh'
              - 'scripts/check-must-use-results.sh'
              - 'scripts/check-bounded-regex.sh'
              - 'scripts/check-no-e2e-sleeps.sh'
              - 'scripts/check-e2e-single-poller.sh'
              - 'scripts/check-annotation-coverage.sh'
              - 'scripts/check-e2e-plane-layout.sh'
              - 'scripts/check-e2e-images-pinned.sh'
              - 'scripts/check-e2e-mutators-serialized.sh'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'

  fmt:
    name: fmt
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-fmt
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-clippy
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-test
      - run: cargo test

  deny:
    name: deny
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-deny
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  audit:
    name: audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-audit
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  supported-features-parity:
    name: supported-features-parity
    needs: changes
    if: needs.changes.outputs.parity == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Rust SUPPORTED_FEATURES matches Go opts.SupportedFeatures
        run: bash scripts/check-supported-features.sh

  public-types-stability:
    name: public-types-stability
    needs: changes
    if: needs.changes.outputs.stability == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check every public type carries #[non_exhaustive] or an open rationale
        run: bash scripts/check-public-types-stability.sh

  crd-kubeconform:
    name: crd-kubeconform
    needs: changes
    if: needs.changes.outputs.crd_manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Shipped CRDs + pinned upstream Gateway API CRDs pass kubeconform -strict
        run: bash scripts/check-crd-kubeconform.sh

  anti-drift:
    name: anti-drift
    needs: changes
    if: needs.changes.outputs.anti_drift == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Module headers (every non-test .rs opens with //!)
        run: bash scripts/check-module-headers.sh
      - name: No anyhow in library crates
        run: bash scripts/check-no-anyhow-libs.sh
      - name: Reflector readiness checks are registered on the controller subsystem
        run: bash scripts/check-reflector-health-checks.sh
      - name: Every crate Cargo.toml declares [lints] workspace = true
        run: bash scripts/check-workspace-lints-decl.sh
      - name: No per-site #[allow] / #[expect] in non-test source
        run: bash scripts/check-no-per-site-allow.sh
      - name: Builders / predicates carry #[must_use]
        run: bash scripts/check-must-use-builders.sh
      - name: Result-returning pub fns carry #[must_use]
        run: bash scripts/check-must-use-results.sh
      - name: Tenant-supplied regexes compile via compile_bounded (bounded size)
        run: bash scripts/check-bounded-regex.sh
      - name: No unused dependencies (cargo-machete)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo-machete
      - name: No bare sleeps in e2e test bodies (poll a post-condition)
        run: bash scripts/check-no-e2e-sleeps.sh
      - name: Exactly one canonical e2e poll_until (no shadow pollers)
        run: bash scripts/check-e2e-single-poller.sh
      - name: Every Ingress annotation has a parse test + e2e effect test
        run: bash scripts/check-annotation-coverage.sh
      - name: e2e test files belong to an approved behaviour plane
        run: bash scripts/check-e2e-plane-layout.sh
      - name: e2e fixture images are @sha256:-pinned
        run: bash scripts/check-e2e-images-pinned.sh
      - name: e2e global-config mutators are serialized (no parallel-pass helm rolls)
        run: bash scripts/check-e2e-mutators-serialized.sh
