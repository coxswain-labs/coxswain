on:
  pull_request:
    branches:
      - main

name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The workflow-level `paths:` filter was removed deliberately: the jobs below
# are required status checks in the main-branch ruleset, and a filter that
# excludes the entire workflow leaves those checks pending forever on PRs that
# don't touch matching paths (e.g. docs-only PRs). Instead we always start the
# workflow and gate each expensive job on the `changes` job's output. A job
# whose `if:` evaluates to false reports `skipped`, which counts as success for
# required-status-check enforcement.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      parity: ${{ steps.filter.outputs.parity }}
      stability: ${{ steps.filter.outputs.stability }}
      anti_drift: ${{ steps.filter.outputs.anti_drift }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'ui/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            parity:
              - 'crates/coxswain-controller/src/controller/gateway_class_status.rs'
              - 'conformance/main_test.go'
              - 'scripts/check-supported-features.sh'
              - '.github/workflows/ci.yml'
            stability:
              - 'crates/**/src/**'
              - 'scripts/check-public-types-stability.sh'
              - '.github/workflows/ci.yml'
            anti_drift:
              - 'crates/**'
              - 'scripts/check-module-headers.sh'
              - 'scripts/check-no-anyhow-libs.sh'
              - 'scripts/check-workspace-lints-decl.sh'
              - 'scripts/check-no-per-site-allow.sh'
              - '.github/workflows/ci.yml'

  fmt:
    name: fmt
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-fmt
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-clippy
          components: clippy
      - run: cargo clippy -- -D warnings

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Build operator UI
        run: npm ci && npm run build
        working-directory: ui
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-test
      - run: cargo test

  deny:
    name: deny
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-deny
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  audit:
    name: audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-with-cache
        with:
          cache-key-prefix: ci-audit
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  supported-features-parity:
    name: supported-features-parity
    needs: changes
    if: needs.changes.outputs.parity == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Rust SUPPORTED_FEATURES matches Go opts.SupportedFeatures
        run: bash scripts/check-supported-features.sh

  public-types-stability:
    name: public-types-stability
    needs: changes
    if: needs.changes.outputs.stability == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check every public type carries #[non_exhaustive] or an open rationale
        run: bash scripts/check-public-types-stability.sh

  anti-drift:
    name: anti-drift
    needs: changes
    if: needs.changes.outputs.anti_drift == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Module headers (every non-test .rs opens with //!)
        run: bash scripts/check-module-headers.sh
      - name: No anyhow in library crates
        run: bash scripts/check-no-anyhow-libs.sh
      - name: Every crate Cargo.toml declares [lints] workspace = true
        run: bash scripts/check-workspace-lints-decl.sh
      - name: No per-site #[allow] / #[expect] in non-test source
        run: bash scripts/check-no-per-site-allow.sh
