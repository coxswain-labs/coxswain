name: Run Gateway API conformance suite
description: >
  Spins up a kind cluster, starts coxswain, and runs the full Gateway API
  conformance suite. Assumes bin/coxswain exists at the workspace root.
  Outputs the workspace-relative path of the generated report YAML.

outputs:
  report-file:
    description: Workspace-relative path to the generated conformance report YAML.
    value: ${{ steps.conformance.outputs.report-file }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: conformance/go.mod
        cache-dependency-path: conformance/go.sum

    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: coxswain-conformance

    - name: Route pod CIDR to kind node
      shell: bash
      run: |
        KIND_NODE_IP=$(docker inspect coxswain-conformance-control-plane \
          --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
        POD_CIDR=$(kubectl get node coxswain-conformance-control-plane \
          -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
        POD_CIDR=${POD_CIDR:-10.244.0.0/16}
        echo "Routing $POD_CIDR via $KIND_NODE_IP"
        sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

    - name: Read Gateway API version
      id: gw-version
      shell: bash
      run: echo "version=$(cat .gateway-api-version)" >> "$GITHUB_OUTPUT"

    - name: Pre-pull conformance backend images into kind
      shell: bash
      run: |
        GW_VER=${{ steps.gw-version.outputs.version }}
        docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER}
        kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260314-${GW_VER} \
          --name coxswain-conformance

    - name: Bootstrap cluster (CRDs, RBAC, GatewayClass)
      shell: bash
      run: |
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/${{ steps.gw-version.outputs.version }}/standard-install.yaml
        kubectl apply -f deploy/manifests/namespace.yaml
        kubectl apply -f deploy/manifests/rbac.yaml
        kubectl apply -f deploy/manifests/gateway-class.yaml
        kubectl wait --for=condition=Established crd/gatewayclasses.gateway.networking.k8s.io --timeout=60s
        kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

    - name: Start coxswain proxy
      shell: bash
      run: |
        chmod +x bin/coxswain
        sudo KUBECONFIG="$HOME/.kube/config" ./bin/coxswain serve \
          --proxy-bind-address 0.0.0.0 \
          --proxy-http-port 80 \
          --proxy-https-port 443 \
          --health-port 8081 \
          --admin-port 8082 \
          --status-address 127.0.0.1 \
          --log-format console \
          --pod-name coxswain-conformance \
          --pod-namespace coxswain-system \
          --controller-lease-ttl 15s \
          --controller-lease-renew-interval 5s \
          &
        for i in $(seq 1 30); do
          curl -sf http://localhost:8081/readyz && break || true
          sleep 2
        done
        curl -sf http://localhost:8081/readyz

    - name: Run Gateway API conformance suite
      id: conformance
      shell: bash
      run: |
        cd conformance
        go mod tidy
        REPORT_FILE="reports/gateway-api-conformance-$(git describe --tags --always --dirty).yaml"
        go test -v -timeout 55m -run TestConformance \
          -args \
          --organization=coxswain-labs \
          --project=coxswain \
          --url=https://github.com/coxswain-labs/coxswain \
          --version=$(git describe --tags --always --dirty) \
          --report-output="${REPORT_FILE}" \
          --cleanup-base-resources=true
        echo "report-file=conformance/${REPORT_FILE}" >> "$GITHUB_OUTPUT"

    - name: Dump cluster state on failure
      if: failure()
      shell: bash
      run: |
        echo "=== Namespaces ==="
        kubectl get namespaces
        echo "=== Events (last 50) ==="
        kubectl get events -A --sort-by=.lastTimestamp | tail -50
        echo "=== Gateways ==="
        kubectl get gateways -A -o wide
        echo "=== HTTPRoutes ==="
        kubectl get httproutes -A
