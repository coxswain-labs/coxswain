name: Run Gateway API conformance suite
description: >
  Spins up a kind cluster, installs coxswain via Helm, and runs the full
  Gateway API conformance suite. Assumes the `coxswain:e2e` Docker image has
  already been loaded into the local Docker daemon by the calling job.
  Outputs the workspace-relative path of the generated report YAML.

inputs:
  gateway-api-version:
    description: >
      Gateway API version to install and pin the conformance suite to. Defaults
      to the current latest. Must be listed in
      `.gateway-api-versions.json`.
    required: false
    default: ''

outputs:
  report-file:
    description: Workspace-relative path to the generated conformance report YAML.
    value: ${{ steps.conformance.outputs.report-file }}
  report-dir:
    description: >
      Upstream report directory for the tested version (e.g. `v1.5` for
      v1.5.1) — the directory the report is published under.
    value: ${{ steps.gw-version.outputs.report-dir }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: conformance/go.mod
        cache-dependency-path: conformance/go.sum

    - uses: ./.github/actions/setup-kind-cluster
      with:
        cluster-name: coxswain-conformance

    - uses: ./.github/actions/preload-gateway-api-images
      with:
        cluster-name: coxswain-conformance
        include-busybox: 'false'

    - name: Resolve Gateway API version and report directory
      id: gw-version
      shell: bash
      run: |
        VERSION="${{ inputs.gateway-api-version }}"
        if [ -z "$VERSION" ]; then
          VERSION=$(scripts/gateway-api-versions.sh --latest)
        fi
        # The report directory is not derivable from the version (per-patch
        # through v1.4.x, unified minors from v1.5), so it is looked up. This
        # also rejects a version we do not claim support for.
        if ! REPORT_DIR=$(scripts/gateway-api-versions.sh --report-dir "$VERSION"); then
          echo "::error::$VERSION is not a supported Gateway API version"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "report-dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"
        echo "Gateway API $VERSION -> reports/$REPORT_DIR"

    - name: Load coxswain image into kind
      shell: bash
      run: |
        # The parent job loaded the image into the Docker daemon; now import it
        # into the kind cluster's containerd so pods can pull it with
        # imagePullPolicy: Never.
        kind load docker-image coxswain:e2e --name coxswain-conformance

    - name: Install cert-manager
      shell: bash
      run: |
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.18.0/cert-manager.yaml
        kubectl wait --for=condition=Available --timeout=120s \
          deployment/cert-manager \
          deployment/cert-manager-webhook \
          deployment/cert-manager-cainjector \
          -n cert-manager

    - name: Install Gateway API CRDs
      shell: bash
      run: |
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/${{ steps.gw-version.outputs.version }}/standard-install.yaml
        # Only kinds present at EVERY supported version may be waited on here:
        # ListenerSet/TLSRoute/TCPRoute/UDPRoute are absent below v1.5/v1.6 by
        # design, and waiting on them would fail the legs #641 exists to prove.
        kubectl wait --for=condition=Established --timeout=60s \
          crd/gatewayclasses.gateway.networking.k8s.io \
          crd/httproutes.gateway.networking.k8s.io \
          crd/referencegrants.gateway.networking.k8s.io

    - name: Pre-apply coxswain CRDs (server-side apply)
      shell: bash
      run: |
        # Pre-apply with SSA before helm install so the CRD field manager is
        # consistent between fresh and pre-existing clusters (avoids conflicts
        # with Helm's client-side apply of the crds/ directory).
        kubectl apply --server-side --force-conflicts -f charts/coxswain/crds/

    - name: Install coxswain via Helm
      shell: bash
      run: |
        # The conformance suite declares Gateway listeners on ports 80/443
        # itself. Coxswain's controller surfaces Programmed=False with
        # reason=PortUnavailable when a Gateway listener port collides with
        # the Ingress data-plane reservation, so we must NOT reserve those
        # ports for Ingress here — disable the Ingress API surface entirely
        # via controller.ingress.enabled=false. With it off, neither pod gets
        # COXSWAIN_INGRESS_HTTP_PORT / COXSWAIN_INGRESS_HTTPS_PORT, so no port
        # is reserved and the conformance Gateways bind 80/443 dynamically.
        #
        # Gateway.status.addresses is populated from each Gateway's own
        # per-Gateway VIP Service (#472), not a global --status-address, so no
        # LB-IP probe + status-address upgrade dance is needed. The VIP type
        # defaults to LoadBalancer; cloud-provider-kind assigns a distinct IP
        # per VIP Service.
        helm upgrade --install coxswain charts/coxswain \
          --namespace coxswain-system \
          --create-namespace \
          --set namespace.create=false \
          --set image.repository=coxswain \
          --set image.tag=e2e \
          --set image.pullPolicy=Never \
          --set controller.coxswainImage=coxswain:e2e \
          --set controller.ingress.enabled=false \
          --set controller.replicas=1 \
          --skip-crds \
          --wait \
          --timeout 120s
        # controller.replicas=1 (#570): HA failover buys nothing in a
        # throwaway conformance cluster, and the 4-vCPU runner is the
        # bottleneck — the observed flake shapes (client GETs to the kind
        # apiserver timing out, store staleness cascading into stale
        # observedGeneration waits) are starvation, not product bugs. One
        # controller replica halves controller CPU + lease/watch traffic and
        # makes the leader-handover wait below deterministic.

    - name: Wait for controller leader handover
      shell: bash
      run: |
        # `helm --wait` returns once the controller pods are Ready (readyz), but
        # readiness does not imply a pod has won leader election yet. Until it
        # holds the lease it sees objects via InitApply events with
        # is_leader=false and skips status patches; once it later becomes leader
        # nothing re-fires for already-known objects. The conformance suite hits
        # this immediately by creating Gateways during setup. Block until leader
        # election completes and the lease holder is one of the running
        # controller pods — any replica may win (HA default is 2, #500), so this
        # does NOT require exactly one pod to exist.
        for i in $(seq 1 60); do
          PODS=$(kubectl get pods -n coxswain-system \
            -l app.kubernetes.io/component=controller \
            -o jsonpath='{.items[*].metadata.name}')
          HOLDER=$(kubectl get lease coxswain-leader-lock -n coxswain-system \
            -o jsonpath='{.spec.holderIdentity}' --ignore-not-found)
          if [ -n "$PODS" ] && [ -n "$HOLDER" ] && echo " $PODS " | grep -q " $HOLDER "; then
            echo "Leader: $HOLDER"
            exit 0
          fi
          sleep 1
        done
        echo "Leader handover timed out — pods=[$PODS] holder=$HOLDER"
        kubectl get pods -n coxswain-system
        kubectl get lease coxswain-leader-lock -n coxswain-system -o yaml
        exit 1

    # GatewayStaticAddresses (#260, #558): the test needs a "usable" address
    # coxswain can bind. coxswain provisions a static-IP Gateway's VIP as a
    # ClusterIP, so the usable address must be a free in-CIDR clusterIP. It must
    # come from the CIDR's *static lower band* (ServiceIPStaticSubrange): random
    # allocation draws from the upper band only, so a lower-band IP cannot be
    # stolen by the Services the suite's base manifests create after this step.
    # Candidates are validated by creating a Service pinned to each, starting at
    # kubernetes-Service-IP + 1 (skips fixed IPs like kube-dns automatically —
    # their creation just fails and we try the next). The "unusable" address is
    # TEST-NET-1, outside any Service CIDR.
    - name: Select a free static-band clusterIP for GatewayStaticAddresses
      id: static-addr
      shell: bash
      run: |
        K8S_SVC_IP=$(kubectl -n default get svc kubernetes -o jsonpath='{.spec.clusterIP}')
        BASE_PREFIX="${K8S_SVC_IP%.*}"
        BASE_LAST="${K8S_SVC_IP##*.}"
        USABLE=""
        for off in $(seq 1 14); do
          CAND="$BASE_PREFIX.$((BASE_LAST + off))"
          if kubectl -n coxswain-system create service clusterip \
               coxswain-static-addr-probe --tcp=80:80 --clusterip="$CAND" >/dev/null 2>&1; then
            kubectl -n coxswain-system delete service coxswain-static-addr-probe >/dev/null
            USABLE="$CAND"
            break
          fi
        done
        if [ -z "$USABLE" ]; then
          echo "no free static-band clusterIP found near $K8S_SVC_IP" >&2
          exit 1
        fi
        echo "usable=${USABLE}" >> "$GITHUB_OUTPUT"
        echo "GatewayStaticAddresses usable=${USABLE} unusable=192.0.2.1"

    - name: Run Gateway API conformance suite
      id: conformance
      shell: bash
      env:
        CONFORMANCE_USABLE_ADDR: ${{ steps.static-addr.outputs.usable }}
        CONFORMANCE_UNUSABLE_ADDR: "192.0.2.1"
      run: |
        # Clean `v0.5.0` on the tagged release commit (the tag is the ref);
        # `v0.5.0-40-g6352459` off-tag, where the hash is what identifies the
        # tree. Needs the full checkout above — shallow loses the tag entirely.
        IMPL_VERSION=$(git describe --tags --always --dirty)
        VERSION="${{ steps.gw-version.outputs.version }}"
        REPORT_DIR="${{ steps.gw-version.outputs.report-dir }}"

        # Every lookup below needs $VERSION, so it must be assigned first.
        LATEST=$(scripts/gateway-api-versions.sh --latest)
        CONFORMANCE_MODULE=$(scripts/gateway-api-versions.sh --field "$VERSION" conformanceModule)
        BUILD_TAGS=$(scripts/gateway-api-versions.sh --field "$VERSION" buildTags)
        CONFORMANCE_SKIP_TESTS=$(scripts/gateway-api-versions.sh --field "$VERSION" skipTests)
        export CONFORMANCE_SKIP_TESTS
        # Upstream's expected layout, so publishing is copy-the-tree.
        REPORT_FILE="conformance/reports/${REPORT_DIR}/coxswain-coxswain/standard-${IMPL_VERSION}-default-report.yaml"
        mkdir -p "$(dirname "$REPORT_FILE")"
        REPORT_ABS="$(cd "$(dirname "$REPORT_FILE")" && pwd)/$(basename "$REPORT_FILE")"

        cd conformance
        if [ "$VERSION" != "$LATEST" ]; then
          # Pin the suite module to match the installed CRDs. `go.mod` is
          # restored below so the job cannot leave the tree looking like an
          # intentional downgrade of the project's own dependency.
          cp go.mod go.mod.orig
          cp go.sum go.sum.orig
          # Restore on ANY exit, not just after `go test`: `go mod edit` and the
          # `go mod tidy` below run under `bash -e`, and a downgrade that fails
          # to resolve would otherwise abort the step leaving the tree pinned to
          # the older version.
          trap 'if [ -f go.mod.orig ]; then mv go.mod.orig go.mod; mv go.sum.orig go.sum; fi' EXIT
          # Whether the suite is its own module is a per-version fact from the
          # manifest: it only became separate at v1.5.0, and requiring
          # `.../conformance@v1.4.x` fails with `unknown revision`.
          go mod edit -require="sigs.k8s.io/gateway-api@${VERSION}"
          if [ "$CONFORMANCE_MODULE" = "main" ]; then
            go mod edit -droprequire="sigs.k8s.io/gateway-api/conformance"
          else
            go mod edit -require="sigs.k8s.io/gateway-api/conformance@${VERSION}"
          fi
        fi
        go mod tidy
        set +e
        go test -tags="$BUILD_TAGS" -v -timeout 55m -run TestConformance \
          -args \
          --organization=coxswain-labs \
          --project=coxswain \
          --url=https://github.com/coxswain-labs/coxswain \
          --version="${IMPL_VERSION}" \
          --contact=https://github.com/coxswain-labs/coxswain/issues \
          --report-output="${REPORT_ABS}" \
          --cleanup-base-resources=true
        STATUS=$?
        set -e
        # go.mod/go.sum are restored by the EXIT trap above.
        echo "report-file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
        exit "$STATUS"

    - uses: ./.github/actions/dump-cluster-state
      if: failure()
