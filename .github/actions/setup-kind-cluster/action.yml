name: Set up kind cluster
description: >
  Creates a kind cluster with the given name, routes the pod CIDR to the
  kind node so that test pods are reachable from the runner, and starts
  cloud-provider-kind so LoadBalancer Services receive real IPs.

inputs:
  cluster-name:
    description: Name of the kind cluster to create.
    required: true

runs:
  using: composite
  steps:
    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: ${{ inputs.cluster-name }}

    - name: Route pod CIDR to kind node
      shell: bash
      run: |
        KIND_NODE_IP=$(docker inspect ${{ inputs.cluster-name }}-control-plane \
          --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
        POD_CIDR=$(kubectl get node ${{ inputs.cluster-name }}-control-plane \
          -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
        POD_CIDR=${POD_CIDR:-10.244.0.0/16}
        echo "Routing $POD_CIDR via $KIND_NODE_IP"
        sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

    - name: Install and start cloud-provider-kind
      shell: bash
      run: |
        # cloud-provider-kind must run as a host process — it watches the Docker
        # socket and assigns IPs from the kind Docker bridge network to
        # LoadBalancer Services. An in-cluster DaemonSet does not work because
        # kind nodes are Docker containers that lack their own Docker socket.
        #
        # CI pre-installs the binary in the `build` job and ships it as an
        # artifact, so matrix/conformance jobs find it on PATH and skip the Go
        # install entirely. Local runs (with no prefab binary on PATH) fall
        # back to `go install`, using the pre-installed Go on ubuntu-latest.
        if command -v cloud-provider-kind >/dev/null 2>&1; then
          CPK_BIN="$(command -v cloud-provider-kind)"
        else
          go install sigs.k8s.io/cloud-provider-kind@latest
          CPK_BIN="$(go env GOPATH)/bin/cloud-provider-kind"
        fi
        # Run in background under sudo so it can manipulate Docker networks.
        sudo "$CPK_BIN" > /tmp/cloud-provider-kind.log 2>&1 &
        echo "cloud-provider-kind started (PID $!) using $CPK_BIN"
        # Brief pause to let it register its watch against the cluster.
        sleep 3
