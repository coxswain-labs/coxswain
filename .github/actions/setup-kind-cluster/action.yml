name: Set up kind cluster
description: >
  Creates a kind cluster with the given name, routes the pod CIDR to the
  kind node so that test pods are reachable from the runner, and starts
  cloud-provider-kind so LoadBalancer Services receive real IPs.

inputs:
  cluster-name:
    description: Name of the kind cluster to create.
    required: true

runs:
  using: composite
  steps:
    # helm/kind-action downloads the kind + kubectl binaries via curl with no
    # retry, so a transient "curl: (35) Recv failure: Connection reset by peer"
    # fails the whole job before any test runs. Wrap it in Wandalen/wretry.action
    # (purpose-built to retry a `uses:` step) so a flaky download is retried
    # instead of aborting the run.
    - name: Create kind cluster
      uses: Wandalen/wretry.action@v3.8.0
      with:
        action: helm/kind-action@v1
        with: |
          cluster_name: ${{ inputs.cluster-name }}
        attempt_limit: 3
        attempt_delay: 15000
        # Tear down any half-created cluster before retrying so the retry doesn't
        # fail on "cluster already exists"; harmless (|| true) if the failure was
        # the binary download, before any cluster existed.
        pre_retry_command: kind delete cluster --name ${{ inputs.cluster-name }} || true

    - name: Route pod CIDR to kind node
      shell: bash
      run: |
        KIND_NODE_IP=$(docker inspect ${{ inputs.cluster-name }}-control-plane \
          --format '{{ (index .NetworkSettings.Networks "kind").IPAddress }}')
        POD_CIDR=$(kubectl get node ${{ inputs.cluster-name }}-control-plane \
          -o jsonpath='{.spec.podCIDR}' 2>/dev/null)
        POD_CIDR=${POD_CIDR:-10.244.0.0/16}
        echo "Routing $POD_CIDR via $KIND_NODE_IP"
        sudo ip route add "$POD_CIDR" via "$KIND_NODE_IP"

    - name: Install and start cloud-provider-kind
      shell: bash
      run: |
        # cloud-provider-kind must run as a host process — it watches the Docker
        # socket and assigns IPs from the kind Docker bridge network to
        # LoadBalancer Services. An in-cluster DaemonSet does not work because
        # kind nodes are Docker containers that lack their own Docker socket.
        #
        # CI pre-installs the binary in the `build` job and ships it as an
        # artifact, so matrix/conformance jobs find it on PATH and skip the Go
        # install entirely. Local runs (with no prefab binary on PATH) fall
        # back to `go install`, using the pre-installed Go on ubuntu-latest.
        if command -v cloud-provider-kind >/dev/null 2>&1; then
          CPK_BIN="$(command -v cloud-provider-kind)"
        else
          go install sigs.k8s.io/cloud-provider-kind@latest
          CPK_BIN="$(go env GOPATH)/bin/cloud-provider-kind"
        fi
        # `--gateway-channel=disabled` is load-bearing, not tidiness.
        # cloud-provider-kind defaults to `standard`, which makes it INSTALL the
        # Gateway API CRDs vendored by its own build (v1.5.1 as of v0.11.1)
        # before anything else touches the cluster. A later
        # `kubectl apply -f <version>/standard-install.yaml` then only overwrites
        # the CRDs present in that bundle, so installing an OLDER release leaves
        # the extras behind at cloud-provider-kind's version — and the
        # conformance suite aborts with "multiple gateway API CRDs versions
        # detected". That is exactly how the v1.4.0/v1.4.1 legs failed while
        # v1.5.1 (same version) and v1.6.1 (a superset) passed.
        #
        # Coxswain provisions its own per-Gateway VIP Services, so it needs
        # cloud-provider-kind only as a LoadBalancer provider. Disabling the
        # channel leaves the explicit install as the single source of the CRD
        # version, which is what every caller here already assumes.
        #
        # Fail loudly if the binary predates the flag. It is started with `&`,
        # so an unsupported flag would kill it silently and every later failure
        # would look like something else.
        if ! "$CPK_BIN" --help 2>&1 | grep -q -- --gateway-channel; then
          echo "::error::$CPK_BIN has no --gateway-channel flag; it would install its own Gateway API CRDs"
          exit 1
        fi

        # Run in background under sudo so it can manipulate Docker networks.
        sudo "$CPK_BIN" --gateway-channel=disabled > /tmp/cloud-provider-kind.log 2>&1 &
        CPK_PID=$!
        echo "cloud-provider-kind started (PID $CPK_PID) using $CPK_BIN"
        # Brief pause to let it register its watch against the cluster.
        sleep 3
        if ! sudo kill -0 "$CPK_PID" 2>/dev/null; then
          echo "::error::cloud-provider-kind exited immediately; LoadBalancer Services would never get IPs"
          cat /tmp/cloud-provider-kind.log || true
          exit 1
        fi
