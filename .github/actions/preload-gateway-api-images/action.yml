name: Preload Gateway API images into kind
description: >
  Pulls the conformance echo-basic backend image (and optionally busybox) that
  the e2e / conformance suites deploy, and loads it into the named kind cluster
  for offline use. The image references are read verbatim from
  crates/coxswain-e2e/src/fixtures/images.rs — the single source of truth the
  test fixtures substitute — so the preloaded image can never drift from what the
  tests actually request. This is DECOUPLED from .gateway-api-version: the
  echo-basic backend is Gateway-API-version-agnostic and published on an
  independent cadence (there is no per-API-version tag), so deriving its tag from
  the API version silently breaks on every version bump.

inputs:
  cluster-name:
    description: Name of the kind cluster to load images into.
    required: true
  include-busybox:
    description: >
      Set to 'true' to also pull and load busybox. Required by the routing/tls
      data-plane suites; not needed for conformance.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Pull and load echo-basic into kind
      shell: bash
      run: |
        set -euo pipefail
        images=crates/coxswain-e2e/src/fixtures/images.rs
        ref=$(grep -oE 'gcr\.io/k8s-staging-gateway-api/echo-basic:[^"]+' "$images" | head -1)
        if [ -z "$ref" ]; then
          echo "could not read the echo-basic image reference from $images" >&2
          exit 1
        fi
        # `kind load` matches the loaded image by its tag; kubelet then resolves
        # the fixture's `tag@sha256:...` reference by digest (the same pattern the
        # busybox preload below relies on). Pulling the digest-pinned ref stores
        # the image untagged, so tag it explicitly before loading.
        tag=${ref%@*}
        for i in 1 2 3; do docker pull "$ref" && break; echo "pull $ref failed ($i/3), retrying in 15s"; sleep 15; done
        docker tag "$ref" "$tag"
        kind load docker-image "$tag" --name "${{ inputs.cluster-name }}"

    - name: Pull and load busybox into kind
      if: ${{ inputs.include-busybox == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        images=crates/coxswain-e2e/src/fixtures/images.rs
        ref=$(grep -oE 'busybox:[^"]+' "$images" | head -1)
        if [ -z "$ref" ]; then
          echo "could not read the busybox image reference from $images" >&2
          exit 1
        fi
        tag=${ref%@*}
        for i in 1 2 3; do docker pull "$ref" && break; echo "pull $ref failed ($i/3), retrying in 15s"; sleep 15; done
        docker tag "$ref" "$tag"
        kind load docker-image "$tag" --name "${{ inputs.cluster-name }}"
