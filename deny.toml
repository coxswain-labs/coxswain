[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots (via reqwest → hyper-rustls) uses the Community Data License Agreement
    "CDLA-Permissive-2.0",
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # pingora-core 0.8 transitive deps — no upstream fix available
    { id = "RUSTSEC-2024-0437", reason = "protobuf 2.x pulled by prometheus 0.13 via pingora-core; no upgrade path until Pingora updates" },
    { id = "RUSTSEC-2025-0069", reason = "daemonize pulled by pingora-core; unmaintained but no replacement available" },
    { id = "RUSTSEC-2024-0388", reason = "derivative pulled by pingora-core; unmaintained but no replacement available" },
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 pulled via getset → neli → local-ip-address → cf-rustracing-jaeger → pingora-cache; unmaintained but no upgrade path until Pingora updates" },
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
